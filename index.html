                    Utils.dom.text('metric-alpha-wins', this.alpha.stats.wins);
                    Utils.dom.text('metric-beta-wins', this.beta.stats.wins);
                    
                    // Learn from experience
                    if (this.alpha.brain) {
                        this.alpha.brain.learn({
                            observation: Array.from(this.alpha.sensors),
                            action: Array.from(this.alpha.lastOutput),
                            reward: winner === this.alpha ? CONFIG.REWARDS.WIN : CONFIG.REWARDS.LOSS,
                            nextObservation: Array.from(this.alpha.sensors),
                            done: true
                        });
                    }
                    
                    if (this.beta.brain) {
                        this.beta.brain.learn({
                            observation: Array.from(this.beta.sensors),
                            action: Array.from(this.beta.lastOutput),
                            reward: winner === this.beta ? CONFIG.REWARDS.WIN : CONFIG.REWARDS.LOSS,
                            nextObservation: Array.from(this.beta.sensors),
                            done: true
                        });
                    }
                    
                    Utils.log(`Round ${this.round} ended - ${this.winner} wins`, 'combat');
                    
                    // Auto next round
                    if (Utils.dom.get('chk-autotrain').checked && this.round < 20) {
                        setTimeout(() => this.nextRound(), 1500);
                    }
                },
                
                train() {
                    Utils.log('Training session started (3 rounds)', 'learn');
                    
                    let roundsDone = 0;
                    const maxRounds = 3;
                    
                    const runRound = () => {
                        if (roundsDone >= maxRounds) {
                            Utils.log('Training complete', 'learn');
                            return;
                        }
                        
                        this.start();
                        
                        const interval = setInterval(() => {
                            if (this.roundEnded) {
                                clearInterval(interval);
                                roundsDone++;
                                setTimeout(runRound, 800);
                            } else if (this.frame > 180) {
                                const w = Math.random() > 0.5 ? this.alpha : this.beta;
                                this.endRound(w);
                            }
                        }, 100);
                    };
                    
                    runRound();
                },
                
                updateUI() {
                    if (!this.alpha || !this.beta) return;
                    
                    // Health
                    Utils.bar('alpha-health-bar', this.alpha.health);
                    Utils.bar('beta-health-bar', this.beta.health);
                    Utils.dom.text('alpha-health', Math.floor(this.alpha.health));
                    Utils.dom.text('beta-health', Math.floor(this.beta.health));
                    
                    // Zones
                    Utils.dom.text('alpha-zone', this.alpha.zone);
                    Utils.dom.text('beta-zone', this.beta.zone);
                    Utils.dom.text('alpha-block', this.alpha.blocking || '—');
                    Utils.dom.text('beta-block', this.beta.blocking || '—');
                    
                    // Alpha brain data
                    if (this.alpha.brain) {
                        const emo = this.alpha.brain.getEmotions();
                        CONFIG.EMOTIONS.slice(0, 6).forEach(e => {
                            Utils.bar(`alpha-${e}-bar`, (emo[e] || 0) * 100);
                        });
                        
                        Utils.dom.text('alpha-emotion', this.alpha.brain.currentEmotion || 'NEUTRAL');
                        
                        const energy = this.alpha.brain.getCortexEnergy();
                        Utils.dom.text('alpha-cortex', energy.toFixed(3));
                        Utils.bar('alpha-cortex-bar', energy * 100);
                        
                        Utils.dom.text('alpha-pred-err', this.alpha.brain.predError.toFixed(3));
                        Utils.bar('alpha-pred-bar', (1 - this.alpha.brain.predError) * 100);
                        
                        Utils.dom.text('alpha-steps', this.alpha.brain.steps);
                    }
                    
                    // Beta brain data
                    if (this.beta.brain) {
                        const emo = this.beta.brain.getEmotions();
                        Utils.dom.text('beta-threat', (emo.fear || 0).toFixed(2));
                        Utils.dom.text('beta-aggression', (emo.aggression || 0).toFixed(2));
                        Utils.bar('beta-threat-bar', (emo.fear || 0) * 100);
                        
                        const mem = this.beta.brain.getMemoryUsage();
                        Utils.dom.text('beta-mem-work', mem.working.toFixed(3));
                        Utils.dom.text('beta-mem-perm', mem.permanent.toFixed(3));
                        Utils.dom.text('beta-mem-pred', mem.predictive.toFixed(3));
                    }
                },
                
                loop(currentTime) {
                    const dt = Math.min((currentTime - this.lastTime) / 1000, 0.033);
                    this.lastTime = currentTime;
                    
                    Perf.startFrame();
                    
                    if (this.running && !this.paused && !this.roundEnded) {
                        if (this.alpha && this.beta) {
                            if (this.alpha.isPlayer) {
                                this.alpha.update(this.beta, this.keys, dt);
                            } else {
                                this.alpha.update(this.beta, null, dt);
                            }
                            
                            if (this.beta.isPlayer) {
                                this.beta.update(this.alpha, this.keys, dt);
                            } else {
                                this.beta.update(this.alpha, null, dt);
                            }
                            
                            // Check KO
                            if (this.alpha.health <= 0 && this.beta.health <= 0) {
                                this.endRound(Math.random() > 0.5 ? this.alpha : this.beta);
                            } else if (this.alpha.health <= 0) {
                                this.endRound(this.beta);
                            } else if (this.beta.health <= 0) {
                                this.endRound(this.alpha);
                            }
                        }
                        
                        if (this.frame % 5 === 0) {
                            this.updateUI();
                        }
                    }
                    
                    Renderer.render(this.alpha, this.beta);
                    Perf.endFrame();
                    
                    this.frame++;
                    requestAnimationFrame((t) => this.loop(t));
                }
            };

            // Start the game
            window.addEventListener('load', () => {
                Game.init();
                window.Game = Game;
            });
        })();
    </script>
</body>
</html>
