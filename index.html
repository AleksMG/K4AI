<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stick Fighter Arena - Neural Learning Evolution</title>
  <style>
    /* ========== ПОЛНОСТЬЮ ТВОЙ CSS ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #050508;
      --bg-panel: #0a0a12;
      --accent-red: #ff2244;
      --accent-blue: #00ffcc;
      --accent-gold: #ffaa00;
      --accent-green: #00ff88;
      --text: #f0f0f5;
      --text-dim: #505060;
      --border: #1a1a25;
    }

    body {
      background: var(--bg-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .game-wrapper {
      width: 100%;
      max-width: 1200px;
      padding: 15px;
      display: flex;
      gap: 20px;
    }

    .game-area {
      flex: 2;
    }

    .tournament-panel {
      flex: 1;
      background: linear-gradient(180deg, rgba(10,10,18,0.95), rgba(5,5,10,0.98));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-height: 600px;
      overflow-y: auto;
      position: relative;
    }

    .tournament-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
      animation: scanLine 3s linear infinite;
    }

    @keyframes scanLine {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .panel-title {
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 3px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      text-shadow: 0 0 20px rgba(255, 170, 0, 0.5);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .stat-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      transition: all 0.3s;
    }

    .stat-card:hover {
      border-color: var(--accent-gold);
      transform: translateY(-2px);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: bold;
      color: var(--accent-green);
      text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
    }

    .fighter-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .fighter-entry {
      background: linear-gradient(90deg, rgba(255,255,255,0.03), transparent);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .fighter-entry::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent-gold);
      transform: scaleY(0);
      transition: transform 0.3s;
    }

    .fighter-entry:hover {
      border-color: var(--accent-gold);
      transform: translateX(8px);
      background: linear-gradient(90deg, rgba(255, 170, 0, 0.1), transparent);
    }

    .fighter-entry:hover::before {
      transform: scaleY(1);
    }

    .fighter-entry.selected {
      border-color: var(--accent-green);
      background: linear-gradient(90deg, rgba(0, 255, 136, 0.15), transparent);
    }

    .fighter-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .fighter-name {
      font-weight: bold;
      font-size: 0.95rem;
    }

    .fighter-stats {
      font-size: 0.7rem;
      color: var(--text-dim);
      display: flex;
      gap: 12px;
    }

    .fighter-score {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--accent-gold);
      text-shadow: 0 0 10px rgba(255, 170, 0, 0.5);
    }

    .evolution-controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .evo-btn {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
      font-family: inherit;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .evo-btn:hover {
      border-color: var(--accent-green);
      color: var(--accent-green);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
    }

    .evo-btn.primary {
      background: linear-gradient(135deg, var(--accent-green), #00aa55);
      border: none;
      color: var(--bg-dark);
      font-weight: bold;
    }

    .evo-btn.primary:hover {
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
      transform: translateY(-2px);
    }

    .generation-badge {
      font-size: 0.85rem;
      padding: 8px 12px;
      background: linear-gradient(90deg, rgba(255,170,0,0.1), transparent);
      border-left: 3px solid var(--accent-gold);
      border-radius: 0 4px 4px 0;
      color: var(--accent-gold);
      text-align: center;
    }

    /* Menu Screen */
    .menu-screen {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(10,10,20,0.98), var(--bg-dark));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.6s, visibility 0.6s;
    }

    .menu-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .menu-title {
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 50px;
      color: transparent;
      background: linear-gradient(135deg, var(--accent-red), var(--accent-gold), var(--accent-blue));
      -webkit-background-clip: text;
      background-clip: text;
      position: relative;
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2); }
    }

    .fighter-select {
      display: flex;
      gap: 50px;
      margin-bottom: 50px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .fighter-config {
      background: linear-gradient(180deg, rgba(20,20,30,0.9), rgba(10,10,15,0.95));
      border: 1px solid var(--border);
      padding: 30px;
      min-width: 300px;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }

    .fighter-config:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .fighter-config::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .fighter-config.red::before { background: linear-gradient(90deg, var(--accent-red), transparent); }
    .fighter-config.blue::before { background: linear-gradient(90deg, transparent, var(--accent-blue)); }

    .fighter-config h3 {
      font-size: 1.3rem;
      margin-bottom: 25px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 2px;
    }

    .fighter-config.red h3 { color: var(--accent-red); text-shadow: 0 0 20px rgba(255,34,68,0.5); }
    .fighter-config.blue h3 { color: var(--accent-blue); text-shadow: 0 0 20px rgba(0,255,204,0.5); }

    .config-row {
      margin-bottom: 18px;
    }

    .config-row label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .config-row select, .config-row input[type="range"] {
      width: 100%;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      border-radius: 6px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s;
    }

    .config-row select:hover, .config-row select:focus {
      border-color: var(--accent-gold);
      outline: none;
    }

    .config-row input[type="range"] {
      -webkit-appearance: none;
      height: 8px;
      padding: 0;
      background: var(--border);
    }

    .config-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--accent-gold);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(255, 170, 0, 0.5);
    }

    .start-btn {
      padding: 20px 70px;
      font-size: 1.4rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--accent-red), #cc1144);
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .start-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .start-btn:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 15px 40px rgba(255, 34, 68, 0.5);
    }

    .start-btn:hover::before {
      transform: translateX(100%);
    }

    /* Game UI */
    .game-container {
      position: relative;
    }

    .header-ui {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 15px;
    }

    .hp-section {
      flex: 1;
    }

    .player-info {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .player-name {
      font-weight: bold;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .player-name.red { color: var(--accent-red); text-shadow: 0 0 15px rgba(255,34,68,0.5); }
    .player-name.blue { color: var(--accent-blue); text-shadow: 0 0 15px rgba(0,255,204,0.5); }

    .tactic-badge {
      font-size: 0.65rem;
      padding: 4px 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
    }

    .hp-bar-bg {
      height: 20px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      border-radius: 4px;
    }

    .hp-bar-fill {
      height: 100%;
      transition: width 0.15s ease-out;
      position: relative;
    }

    .hp-bar-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, transparent 50%, rgba(0,0,0,0.2) 100%);
    }

    .hp-bar-fill.red { 
      background: linear-gradient(90deg, #aa1133, var(--accent-red));
      box-shadow: 0 0 20px rgba(255, 34, 68, 0.5);
    }
    .hp-bar-fill.blue { 
      background: linear-gradient(90deg, var(--accent-blue), #00aa88);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
    }

    .timer-display {
      font-size: 2.8rem;
      font-weight: bold;
      color: var(--accent-gold);
      text-shadow: 0 0 30px rgba(255, 170, 0, 0.6);
      font-variant-numeric: tabular-nums;
      min-width: 70px;
      text-align: center;
      animation: timerGlow 2s ease-in-out infinite;
    }

    @keyframes timerGlow {
      0%, 100% { text-shadow: 0 0 20px rgba(255, 170, 0, 0.4); }
      50% { text-shadow: 0 0 40px rgba(255, 170, 0, 0.8); }
    }

    .canvas-frame {
      position: relative;
      border: 2px solid var(--border);
      background: #050508;
      box-shadow: 0 0 60px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,0,0,0.5);
      border-radius: 8px;
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      width: 100%;
    }

    .announce-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 10;
    }

    .announce-overlay.show {
      opacity: 1;
    }

    .announce-text {
      font-size: clamp(3.5rem, 12vw, 6rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 8px;
      animation: announceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .announce-text.fight { color: var(--accent-gold); text-shadow: 0 0 50px var(--accent-gold), 0 0 100px var(--accent-gold); }
    .announce-text.ko { color: var(--accent-red); text-shadow: 0 0 50px var(--accent-red), 0 0 100px var(--accent-red); }
    .announce-text.win { color: var(--accent-blue); text-shadow: 0 0 50px var(--accent-blue), 0 0 100px var(--accent-blue); }

    @keyframes announceIn {
      0% { transform: scale(2.5) rotate(-5deg); opacity: 0; }
      50% { transform: scale(0.95) rotate(1deg); }
      100% { transform: scale(1) rotate(0); opacity: 1; }
    }

    .combo-popup {
      position: absolute;
      font-size: 2.5rem;
      font-weight: 900;
      pointer-events: none;
      opacity: 0;
      transform: translateY(0) scale(1);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      letter-spacing: 2px;
    }

    .combo-popup.show {
      opacity: 1;
      transform: translateY(-40px) scale(1.2);
    }

    .result-screen {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(5,5,10,0.95), rgba(5,5,8,0.99));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.6s;
      z-index: 20;
    }

    .result-screen.show {
      opacity: 1;
      visibility: visible;
    }

    .result-title {
      font-size: 3.5rem;
      font-weight: 900;
      margin-bottom: 20px;
      letter-spacing: 4px;
      animation: resultIn 0.8s ease-out;
    }

    @keyframes resultIn {
      0% { transform: translateY(-50px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .result-title.red { color: var(--accent-red); text-shadow: 0 0 50px var(--accent-red); }
    .result-title.blue { color: var(--accent-blue); text-shadow: 0 0 50px var(--accent-blue); }

    .result-stats {
      display: flex;
      gap: 60px;
      margin: 40px 0;
    }

    .stat-box {
      text-align: center;
    }

    .stat-box .stat-value {
      font-size: 3rem;
      font-weight: bold;
      color: var(--accent-gold);
      text-shadow: 0 0 20px rgba(255, 170, 0, 0.5);
    }

    .stat-box .stat-label {
      font-size: 0.8rem;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: 8px;
      letter-spacing: 2px;
    }

    .btn-row {
      display: flex;
      gap: 25px;
      margin-top: 40px;
    }

    .game-btn {
      padding: 14px 40px;
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }

    .game-btn:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255, 170, 0, 0.2);
    }

    .game-btn.primary {
      background: linear-gradient(135deg, var(--accent-red), #aa1133);
      border: none;
      color: white;
    }

    .game-btn.primary:hover {
      box-shadow: 0 10px 40px rgba(255, 34, 68, 0.5);
      color: white;
    }

    @media (max-width: 1000px) {
      .game-wrapper { flex-direction: column; }
      .tournament-panel { max-height: 300px; }
      .fighter-select { gap: 30px; }
      .fighter-config { min-width: 260px; padding: 20px; }
    }
  </style>
</head>
<body>
  <!-- Menu Screen -->
  <div class="menu-screen" id="menuScreen">
    <h1 class="menu-title">Stick Fighter Arena - Neural Learning</h1>
    
    <div class="fighter-select">
      <div class="fighter-config red">
        <h3>Scorpion - Red</h3>
        <div class="config-row">
          <label>Fighter Type</label>
          <select id="fighterType1">
            <option value="neural">Deep Neural Net</option>
            <option value="classic">Classic AI</option>
          </select>
        </div>
        <div class="config-row" id="classicControls1">
          <label>Combat Style</label>
          <select id="style1">
            <option value="balanced">Balanced</option>
            <option value="aggressor">Aggressor</option>
            <option value="counter">Counter Fighter</option>
            <option value="combo">Combo Master</option>
            <option value="defensive">Defensive</option>
          </select>
          <label style="margin-top:12px;">Aggression</label>
          <input type="range" id="aggression1" min="0" max="1" step="0.1" value="0.5">
        </div>
        <div class="config-row" id="neuralControls1" style="display: none;">
          <label>Select Fighter Brain</label>
          <select id="neuralFighter1" class="neural-select"></select>
        </div>
      </div>

      <div class="fighter-config blue">
        <h3>Frost - Blue</h3>
        <div class="config-row">
          <label>Fighter Type</label>
          <select id="fighterType2">
            <option value="neural">Deep Neural Net</option>
            <option value="classic">Classic AI</option>
          </select>
        </div>
        <div class="config-row" id="classicControls2">
          <label>Combat Style</label>
          <select id="style2">
            <option value="balanced">Balanced</option>
            <option value="aggressor">Aggressor</option>
            <option value="counter">Counter Fighter</option>
            <option value="combo">Combo Master</option>
            <option value="defensive">Defensive</option>
          </select>
          <label style="margin-top:12px;">Aggression</label>
          <input type="range" id="aggression2" min="0" max="1" step="0.1" value="0.5">
        </div>
        <div class="config-row" id="neuralControls2" style="display: none;">
          <label>Select Fighter Brain</label>
          <select id="neuralFighter2" class="neural-select"></select>
        </div>
      </div>
    </div>

    <button class="start-btn" id="startBtn">Start Fight</button>
  </div>

  <!-- Game Screen with Tournament Panel -->
  <div class="game-wrapper">
    <div class="game-area">
      <div class="game-container">
        <div class="header-ui">
          <div class="hp-section">
            <div class="player-info">
              <span class="player-name red" id="fighterName1">Scorpion</span>
              <span class="tactic-badge" id="tactic1">Neural</span>
            </div>
            <div class="hp-bar-bg">
              <div class="hp-bar-fill red" id="hp1" style="width: 100%"></div>
            </div>
          </div>
          <div class="timer-display" id="timer">99</div>
          <div class="hp-section">
            <div class="player-info" style="justify-content: flex-end;">
              <span class="tactic-badge" id="tactic2">Neural</span>
              <span class="player-name blue" id="fighterName2">Frost</span>
            </div>
            <div class="hp-bar-bg">
              <div class="hp-bar-fill blue" id="hp2" style="width: 100%"></div>
            </div>
          </div>
        </div>

        <div class="canvas-frame">
          <canvas id="gameCanvas" width="900" height="420"></canvas>
          <div class="announce-overlay" id="announce">
            <div class="announce-text" id="announceText"></div>
          </div>
          <div class="combo-popup" id="combo1"></div>
          <div class="combo-popup" id="combo2"></div>
          <div class="result-screen" id="resultScreen">
            <div class="result-title" id="resultTitle">WINNER</div>
            <div class="result-stats">
              <div class="stat-box">
                <div class="stat-value" id="finalHits1">0</div>
                <div class="stat-label">Hits Red</div>
              </div>
              <div class="stat-box">
                <div class="stat-value" id="maxCombo1">0</div>
                <div class="stat-label">Max Combo</div>
              </div>
              <div class="stat-box">
                <div class="stat-value" id="finalHits2">0</div>
                <div class="stat-label">Hits Blue</div>
              </div>
              <div class="stat-box">
                <div class="stat-value" id="maxCombo2">0</div>
                <div class="stat-label">Max Combo</div>
              </div>
            </div>
            <div class="btn-row">
              <button class="game-btn primary" id="rematchBtn">Rematch</button>
              <button class="game-btn" id="menuBtn">Menu</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tournament Panel -->
    <div class="tournament-panel">
      <div class="panel-title">Neural Evolution</div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Generation</div>
          <div class="stat-value" id="genCount">1</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Fighters</div>

        </div>

          <div class="stat-label">Avg Hits</div>
          <div class="stat-value" id="avgHits">0</div>
        </div>
