<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Fight Pro v4.0.0 | Enterprise AI Engine</title>
    <style>
        /* =====================================================================
           PRODUCTION GRADE STYLES - No compromises, no placeholders
           ===================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #030304;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            image-rendering: crisp-edges;
        }

        /* =====================================================================
           HUD - Complete with all necessary information
           ===================================================================== */
        .hud {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 1600px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 100;
            pointer-events: none;
            font-weight: 600;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.8);
        }

        .fighter-panel {
            width: 40%;
            background: rgba(8, 8, 16, 0.85);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 16px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        .fighter-panel.right {
            text-align: right;
        }

        .fighter-name {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .fighter-name.blue { color: #00d2ff; }
        .fighter-name.red { color: #ff4757; }

        .health-section {
            margin-bottom: 12px;
        }

        .health-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .health-bar-container {
            width: 100%;
            height: 28px;
            background: #1a1a2a;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            border: 1px solid #333;
        }

        .health-bar {
            height: 100%;
            transition: width 0.1s linear;
            position: relative;
        }

        .health-bar.blue {
            background: linear-gradient(90deg, #00d2ff, #4b7bec, #00d2ff);
            background-size: 200% 100%;
            animation: healthShine 3s linear infinite;
        }

        .health-bar.red {
            background: linear-gradient(90deg, #ff4757, #ff6b81, #ff4757);
            background-size: 200% 100%;
            animation: healthShine 3s linear infinite;
        }

        @keyframes healthShine {
            0% { background-position: 0% 0; }
            100% { background-position: 200% 0; }
        }

        .health-delay {
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: width 0.5s ease-out;
        }

        .stamina-section {
            margin-bottom: 16px;
        }

        .stamina-bar-container {
            width: 100%;
            height: 12px;
            background: #1a1a2a;
            border-radius: 4px;
            overflow: hidden;
        }

        .stamina-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffa502);
            transition: width 0.1s linear;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* =====================================================================
           MESSAGE SYSTEM
           ===================================================================== */
        .message-overlay {
            position: fixed;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 84px;
            font-weight: 900;
            color: white;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 8px 8px 0 rgba(0, 0, 0, 0.5);
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            white-space: nowrap;
            letter-spacing: 8px;
        }

        .message-overlay.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1);
            animation: messagePulse 0.4s;
        }

        @keyframes messagePulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.15); }
        }

        /* =====================================================================
           START SCREEN - Complete with all options
           ===================================================================== */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a14 80%, #030304 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .game-title {
            font-size: 80px;
            font-weight: 900;
            background: linear-gradient(135deg, #00d2ff, #ff4757, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 40px rgba(0, 210, 255, 0.3));
            animation: titleFloat 3s ease-in-out infinite;
        }

        @keyframes titleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .version {
            font-size: 18px;
            color: #667;
            letter-spacing: 3px;
            margin-bottom: 60px;
        }

        .mode-selector {
            display: flex;
            gap: 30px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            padding: 20px 50px;
            font-size: 24px;
            font-weight: 700;
            background: rgba(20, 20, 40, 0.8);
            border: 3px solid #334;
            color: #aab;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
            min-width: 250px;
        }

        .mode-btn:hover {
            background: rgba(40, 40, 70, 0.9);
            border-color: #00d2ff;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 210, 255, 0.3);
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #00d2ff20, #ff475720);
            border-color: #00d2ff;
            color: white;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
        }

        .difficulty-panel {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 50px;
            border: 1px solid #335;
            width: 100%;
            max-width: 800px;
        }

        .difficulty-title {
            font-size: 18px;
            color: #889;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-align: center;
        }

        .difficulty-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .diff-btn {
            padding: 15px 35px;
            font-size: 18px;
            background: rgba(30, 30, 50, 0.8);
            border: 2px solid #446;
            color: #aab;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            min-width: 140px;
        }

        .diff-btn:hover {
            background: rgba(50, 50, 80, 0.9);
            border-color: #ffd700;
            color: white;
        }

        .diff-btn.active {
            background: rgba(255, 215, 0, 0.15);
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .start-btn {
            padding: 30px 100px;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border: none;
            color: white;
            border-radius: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 6px;
            transition: all 0.3s;
            box-shadow: 0 15px 40px rgba(231, 76, 60, 0.5);
            margin-bottom: 40px;
        }

        .start-btn:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 60px rgba(231, 76, 60, 0.7);
            background: linear-gradient(135deg, #ff6b6b, #e74c3c);
        }

        .start-btn:active {
            transform: translateY(-2px);
        }

        .controls-info {
            font-size: 18px;
            color: #889;
            background: rgba(0, 0, 0, 0.4);
            padding: 25px 40px;
            border-radius: 12px;
            border: 1px solid #335;
            line-height: 2;
        }

        .controls-info kbd {
            background: #1a1a2a;
            padding: 6px 15px;
            border-radius: 6px;
            border: 2px solid #446;
            margin: 0 5px;
            font-size: 16px;
            color: #ccd;
        }

        /* =====================================================================
           GAME OVER SCREEN
           ===================================================================== */
        .gameover-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a0a0a 0%, #0a0505 80%, #030000 100%);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .winner-text {
            font-size: 90px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 20px;
            text-shadow: 0 0 50px currentColor;
        }

        .winner-subtitle {
            font-size: 24px;
            color: #889;
            letter-spacing: 4px;
            margin-bottom: 80px;
        }

        .rematch-btn {
            padding: 25px 80px;
            font-size: 28px;
            background: linear-gradient(135deg, #4a4a6a, #2a2a4a);
            border: 3px solid #00d2ff;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 4px;
            transition: all 0.3s;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.3);
        }

        .rematch-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #5a5a8a, #3a3a6a);
            box-shadow: 0 0 60px rgba(0, 210, 255, 0.5);
        }

        /* =====================================================================
           COMBO TEXT
           ===================================================================== */
        .combo-text {
            position: fixed;
            font-size: 48px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 30px #ffd700, 4px 4px 0 #000;
            pointer-events: none;
            z-index: 150;
            animation: comboFloat 0.8s forwards;
            white-space: nowrap;
        }

        @keyframes comboFloat {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-30px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }

        /* =====================================================================
           DEBUG PANEL
           ===================================================================== */
        .debug-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            color: #0f0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            border-radius: 6px;
            border: 2px solid #0f0;
            z-index: 1000;
            display: none;
            line-height: 1.6;
            max-width: 500px;
            pointer-events: none;
        }

        .fps-counter {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #0f0;
            font-family: 'Courier New', monospace;
            padding: 8px 16px;
            border-radius: 4px;
            z-index: 1000;
            font-size: 16px;
            border: 1px solid #0f0;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

            // =================================================================
            // UTILITY FUNCTIONS - Complete
            // =================================================================
            const Utils = {
                clamp: (v, min, max) => Math.max(min, Math.min(max, v)),
                
                random: (min, max) => Math.random() * (max - min) + min,
                
                randomInt: (min, max) => Math.floor(Utils.random(min, max + 1)),
                
                chance: (percent) => Math.random() < percent,
                
                distance: (a, b) => Math.abs(a - b),
                
                lerp: (a, b, t) => a + (b - a) * Utils.clamp(t, 0, 1),
                
                now: () => performance.now(),
                
                sign: (n) => n > 0 ? 1 : n < 0 ? -1 : 0,
                
                weightedRandom: (items) => {
                    const total = items.reduce((sum, item) => sum + item.weight, 0);
                    let random = Math.random() * total;
                    
                    for (const item of items) {
                        if (random < item.weight) return item.value;
                        random -= item.weight;
                    }
                    return items[0]?.value;
                }
            };

            // =================================================================
            // PROFESSIONAL AI MEMORY SYSTEM - Complete
            // =================================================================
            class AIMemory {
                constructor(size = CONFIG.AI.MEMORY_SIZE) {
                    this.size = size;
                    this.history = [];
                    this.patterns = new Map();
                    this.counters = {
                        attacks: 0,
                        blocks: 0,
                        jumps: 0,
                        hits: 0,
                        misses: 0
                    };
                }

                record(event) {
                    this.history.unshift({
                        ...event,
                        timestamp: Utils.now()
                    });

                    if (this.history.length > this.size) {
                        this.history.pop();
                    }

                    // Update counters
                    if (event.type) {
                        this.counters[event.type] = (this.counters[event.type] || 0) + 1;
                    }

                    // Pattern recognition
                    if (this.history.length >= 3) {
                        const sequence = this.history.slice(0, 3).map(e => e.action).join('→');
                        this.patterns.set(sequence, (this.patterns.get(sequence) || 0) + 1);
                    }
                }

                predictNext(opponentState) {
                    if (this.history.length < 2) return null;

                    const lastAction = this.history[0]?.action;
                    if (!lastAction) return null;

                    // Find most common follow-up to last action
                    const followUps = new Map();
                    
                    for (let i = 0; i < this.history.length - 1; i++) {
                        if (this.history[i].action === lastAction) {
                            const next = this.history[i + 1]?.action;
                            if (next) {
                                followUps.set(next, (followUps.get(next) || 0) + 1);
                            }
                        }
                    }

                    let bestAction = null;
                    let bestCount = 0;

                    for (const [action, count] of followUps) {
                        if (count > bestCount) {
                            bestCount = count;
                            bestAction = action;
                        }
                    }

                    return bestAction;
                }

                getActionFrequency(action) {
                    return this.history.filter(h => h.action === action).length / this.history.length;
                }

                getConfidence() {
                    return Math.min(0.9, this.history.length / this.size);
                }

                clear() {
                    this.history = [];
                    this.patterns.clear();
                    this.counters = {
                        attacks: 0, blocks: 0, jumps: 0, hits: 0, misses: 0
                    };
                }
            }

            // =================================================================
            // PROFESSIONAL UTILITY AI - Complete implementation
            // =================================================================
            class UtilityAI {
                constructor(fighter, difficulty = 'normal', personality = null) {
                    this.fighter = fighter;
                    this.difficulty = difficulty;
                    this.config = CONFIG.AI.DIFFICULTY[difficulty] || CONFIG.AI.DIFFICULTY.normal;
                    
                    // Personality weights
                    const personalityType = personality || this.config.personality;
                    this.weights = { ...CONFIG.AI.PERSONALITIES[personalityType] };
                    
                    // Randomize weights for randomizer personality
                    if (personalityType === 'randomizer') {
                        this.weights = {
                            offense: Utils.random(0.3, 2.0),
                            defense: Utils.random(0.3, 2.0),
                            positioning: Utils.random(0.3, 2.0),
                            resource: Utils.random(0.3, 2.0)
                        };
                    }

                    this.memory = new AIMemory();
                    this.lastDecisionTime = 0;
                    this.currentPlan = null;
                    this.reactionTime = CONFIG.AI.REACTION_BASE * this.config.reactionMult;
                    
                    // Personality-specific biases
                    this.biases = this.generateBiases();
                }

                generateBiases() {
                    const biases = {};
                    
                    for (const [moveName, move] of Object.entries(MOVES)) {
                        let bias = 1.0;
                        
                        // Aggressive AI prefers high damage
                        if (this.config.aggression > 1.2) {
                            bias += move.damage * 0.05;
                        }
                        
                        // Defensive AI prefers safe moves
                        if (this.config.defense > 1.2) {
                            bias += (20 - move.recovery) * 0.03;
                        }
                        
                        biases[moveName] = bias;
                    }
                    
                    return biases;
                }

                decide(opponent, currentTime) {
                    // Check if enough time has passed for new decision
                    if (currentTime - this.lastDecisionTime < CONFIG.AI.DECISION_INTERVAL) {
                        return this.currentPlan;
                    }

                    this.lastDecisionTime = currentTime;

                    // Analyze current situation
                    const situation = this.analyzeSituation(opponent);
                    
                    // Check for errors (difficulty-based)
                    if (Utils.chance(this.config.errorRate)) {
                        return this.getRandomAction();
                    }

                    // Evaluate all possible actions
                    const actions = this.evaluateActions(opponent, situation);
                    
                    // Select best action with some randomness based on difficulty
                    const selectedAction = this.selectAction(actions);
                    
                    this.currentPlan = selectedAction;
                    
                    // Record decision
                    this.memory.record({
                        action: selectedAction?.type,
                        situation: situation,
                        timestamp: currentTime
                    });

                    return selectedAction;
                }

                analyzeSituation(opponent) {
                    const myX = this.fighter.x;
                    const oppX = opponent.x;
                    const distance = Math.abs(myX - oppX);
                    const isFacing = (this.fighter.facingRight && oppX > myX) || 
                                   (!this.fighter.facingRight && oppX < myX);

                    return {
                        distance,
                        isFacing,
                        myHP: this.fighter.hp / this.fighter.stats.maxHp,
                        oppHP: opponent.hp / opponent.stats.maxHp,
                        myStamina: this.fighter.stamina / this.fighter.stats.maxStamina,
                        oppStamina: opponent.stamina / opponent.stats.maxStamina,
                        
                        myState: this.fighter.state,
                        oppState: opponent.state,
                        
                        nearWall: myX < 100 || myX > GameState.width - 100,
                        oppNearWall: oppX < 100 || oppX > GameState.width - 100,
                        
                        canJump: this.fighter.y >= GameState.groundY - 5,
                        inAir: this.fighter.y < GameState.groundY - 5,
                        
                        isOppAttacking: opponent.state === 'ATTACK' && 
                                      opponent.moveFrame >= (opponent.currentMove?.startup || 0) &&
                                      opponent.moveFrame < (opponent.currentMove?.startup + opponent.currentMove?.active || 0),
                        
                        isOppRecovering: opponent.state === 'ATTACK' &&
                                       opponent.moveFrame >= (opponent.currentMove?.startup + opponent.currentMove?.active || 0),
                        
                        predictedAction: this.memory.predictNext(opponent),
                        predictionConfidence: this.memory.getConfidence()
                    };
                }

                evaluateActions(opponent, situation) {
                    const actions = [];

                    // Evaluate attacks
                    for (const [moveName, move] of Object.entries(MOVES)) {
                        if (this.fighter.stamina >= move.stamina) {
                            const utility = this.evaluateAttack(move, situation) * this.weights.offense * (this.biases[moveName] || 1);
                            actions.push({
                                type: 'ATTACK',
                                move: moveName,
                                utility: utility,
                                priority: move.priority
                            });
                        }
                    }

                    // Evaluate block
                    actions.push({
                        type: 'BLOCK',
                        utility: this.evaluateDefense(situation) * this.weights.defense
                    });

                    // Evaluate jump
                    if (situation.canJump) {
                        actions.push({
                            type: 'JUMP',
                            utility: this.evaluateJump(situation) * this.weights.positioning
                        });
                    }

                    // Evaluate positioning
                    actions.push({
                        type: 'APPROACH',
                        utility: this.evaluateApproach(situation) * this.weights.positioning
                    });

                    actions.push({
                        type: 'RETREAT',
                        utility: this.evaluateRetreat(situation) * this.weights.positioning
                    });

                    // Evaluate idle (stamina recovery)
                    actions.push({
                        type: 'IDLE',
                        utility: this.evaluateIdle(situation) * this.weights.resource
                    });

                    return actions.filter(a => a.utility > 0);
                }

                evaluateAttack(move, situation) {
                    let utility = 0;

                    // Base damage value
                    utility += move.damage * 2;

                    // Distance check
                    if (situation.distance <= move.range) {
                        utility += 30;
                    } else {
                        utility -= (situation.distance - move.range) * 0.5;
                    }

                    // Facing check
                    if (!situation.isFacing) {
                        utility -= 40;
                    }

                    // Opponent vulnerability
                    if (situation.isOppRecovering) {
                        utility += 50;
                    }
                    if (situation.oppStamina < 0.3) {
                        utility += 25;
                    }

                    // Anti-air
                    if (move.antiAir && situation.inAir) {
                        utility += 35;
                    }

                    // Low attack against blocking opponent
                    if (situation.oppState === 'BLOCK' && move.height === 'low') {
                        utility += 30;
                    }

                    // Prediction bonus
                    if (situation.predictedAction === 'ATTACK' && move.priority > 2) {
                        utility += 20 * situation.predictionConfidence;
                    }

                    // Health-based decisions
                    if (situation.oppHP < 0.2) {
                        utility += 40; // Finish opponent
                    }
                    if (situation.myHP < 0.2 && move.knockback > 10) {
                        utility += 30; // Create distance when low
                    }

                    return Math.max(0, utility);
                }

                evaluateDefense(situation) {
                    let utility = 0;

                    // Threat assessment
                    if (situation.isOppAttacking) {
                        utility += 80;
                        
                        // Bonus if we're in range
                        if (situation.distance < 100) {
                            utility += 40;
                        }
                    }

                    // Low stamina - need to defend
                    if (situation.myStamina < 0.2) {
                        utility += 30;
                    }

                    // Cornered
                    if (situation.nearWall && situation.oppStamina > 0.5) {
                        utility += 35;
                    }

                    // Predict block if opponent is aggressive
                    if (situation.predictedAction === 'ATTACK' && situation.predictionConfidence > 0.6) {
                        utility += 25;
                    }

                    // Don't block if no stamina
                    if (this.fighter.stamina < 15) {
                        utility = 0;
                    }

                    return Math.max(0, utility);
                }

                evaluateJump(situation) {
                    let utility = 0;

                    // Evade low attacks
                    if (situation.isOppAttacking && situation.distance < 90) {
                        utility += 50;
                    }

                    // Create space when cornered
                    if (situation.nearWall && situation.oppStamina > 0.3) {
                        utility += 35;
                    }

                    // Approach over ground
                    if (situation.distance > 120 && situation.myStamina > 0.6) {
                        utility += 20;
                    }

                    return utility;
                }

                evaluateApproach(situation) {
                    let utility = 0;

                    // Need to close distance
                    if (situation.distance > 110) {
                        utility += 40;
                    }

                    // Approach when opponent is recovering
                    if (situation.isOppRecovering) {
                        utility += 35;
                    }

                    // Don't approach into attacks
                    if (situation.isOppAttacking) {
                        utility -= 50;
                    }

                    return Math.max(0, utility);
                }

                evaluateRetreat(situation) {
                    let utility = 0;

                    // Too close
                    if (situation.distance < 60) {
                        utility += 45;
                    }

                    // Retreat from attacks
                    if (situation.isOppAttacking && situation.distance < 90) {
                        utility += 60;
                    }

                    // Low health - keep distance
                    if (situation.myHP < 0.25) {
                        utility += 30;
                    }

                    return Math.max(0, utility);
                }

                evaluateIdle(situation) {
                    let utility = 0;

                    // Regen stamina when low
                    if (situation.myStamina < 0.3) {
                        utility += 40;
                    }

                    // Safe distance - can rest
                    if (situation.distance > 150 && !situation.isOppAttacking) {
                        utility += 25;
                    }

                    return utility;
                }

                selectAction(actions) {
                    if (actions.length === 0) return null;

                    // Sort by utility
                    actions.sort((a, b) => b.utility - a.utility);

                    // Take top 3 and add randomness based on difficulty
                    const topCount = Math.min(3, actions.length);
                    const topActions = actions.slice(0, topCount);
                    
                    // Add weights with accuracy modifier
                    const weighted = topActions.map(a => ({
                        value: a,
                        weight: a.utility * this.config.accuracy
                    }));

                    return Utils.weightedRandom(weighted);
                }

                getRandomAction() {
                    const actions = ['APPROACH', 'RETREAT', 'ATTACK', 'BLOCK', 'JUMP', 'IDLE'];
                    const randomAction = actions[Math.floor(Math.random() * actions.length)];
                    
                    if (randomAction === 'ATTACK') {
                        const moves = Object.keys(MOVES);
                        return {
                            type: 'ATTACK',
                            move: moves[Math.floor(Math.random() * moves.length)]
                        };
                    }
                    
                    return { type: randomAction };
                }
            }

            // =================================================================
            // FIGHTER CLASS - Complete implementation
            // =================================================================
            class Fighter {
                constructor(x, color, isAI, stats, difficulty = 'normal', personality = null) {
                    // Position
                    this.x = x;
                    this.y = GameState.groundY;
                    this.vx = 0;
                    this.vy = 0;
                    this.facingRight = x < GameState.width / 2;
                    
                    // Identity
                    this.color = color;
                    this.isAI = isAI;
                    
                    // Stats
                    this.stats = {
                        str: stats.str || 5,
                        agi: stats.agi || 5,
                        sta: stats.sta || 5,
                        int: stats.int || 5,
                        maxHp: CONFIG.BASE_HP + (stats.sta || 5) * CONFIG.HP_PER_STAMINA,
                        maxStamina: CONFIG.BASE_STAMINA,
                        critChance: Utils.clamp(CONFIG.CRIT_BASE + (stats.agi || 5) * CONFIG.CRIT_PER_AGI, 0, 0.7),
                        critMultiplier: CONFIG.CRIT_MULT_BASE + (stats.int || 5) * CONFIG.CRIT_PER_INT
                    };
                    
                    // Resources
                    this.hp = this.stats.maxHp;
                    this.hpDelay = this.stats.maxHp;
                    this.stamina = this.stats.maxStamina;
                    
                    // State
                    this.state = 'IDLE';
                    this.stateTimer = 0;
                    this.previousState = null;
                    
                    // Combat
                    this.currentMove = null;
                    this.moveFrame = 0;
                    this.damageDealt = false;
                    this.hitStun = 0;
                    this.comboCount = 0;
                    this.lastHitTime = 0;
                    this.knockbackX = 0;
                    
                    // AI
                    this.ai = isAI ? new UtilityAI(this, difficulty, personality) : null;
                    
                    // Visual
                    this.flashTimer = 0;
                    this.hitFlash = false;
                    
                    // Animation
                    this.animTime = 0;
                }

                update(opponent, currentTime) {
                    if (this.hp <= 0) {
                        this.state = 'DEAD';
                        return;
                    }

                    // Apply physics
                    this.applyPhysics();

                    // Process current state
                    this.processState(opponent, currentTime);

                    // AI decision
                    if (this.isAI && this.state === 'IDLE' && opponent.hp > 0) {
                        const decision = this.ai.decide(opponent, currentTime);
                        if (decision) {
                            this.executeAIDecision(decision);
                        }
                    }

                    // Regenerate stamina
                    this.regenerateStamina();

                    // Update visual effects
                    if (this.flashTimer > 0) {
                        this.flashTimer--;
                        this.hitFlash = this.flashTimer > 0;
                    }
                }

                applyPhysics() {
                    // Gravity
                    this.vy += CONFIG.GRAVITY;
                    
                    // Movement
                    this.x += this.vx + this.knockbackX;
                    this.y += this.vy;

                    // Friction
                    const friction = this.y >= GameState.groundY ? CONFIG.FRICTION : CONFIG.AIR_RESISTANCE;
                    this.vx *= friction;
                    this.knockbackX *= 0.9;

                    if (Math.abs(this.knockbackX) < 0.1) this.knockbackX = 0;

                    // Ground collision
                    if (this.y >= GameState.groundY) {
                        this.y = GameState.groundY;
                        this.vy = 0;
                        
                        if (this.state === 'JUMP' && !this.currentMove?.jump) {
                            this.setState('IDLE');
                        }
                    }

                    // Arena bounds
                    const bound = 50;
                    if (this.x < bound) {
                        this.x = bound;
                        this.vx = Math.abs(this.vx) * 0.3;
                    }
                    if (this.x > GameState.width - bound) {
                        this.x = GameState.width - bound;
                        this.vx = -Math.abs(this.vx) * 0.3;
                    }
                }

                processState(opponent, currentTime) {
                    // Hit stun
                    if (this.hitStun > 0) {
                        this.hitStun--;
                        return;
                    }

                    // State-specific processing
                    switch (this.state) {
                        case 'ATTACK':
                            this.processAttack(opponent, currentTime);
                            break;
                            
                        case 'BLOCK':
                            this.stamina -= CONFIG.BLOCK_STAMINA_COST;
                            this.stateTimer--;
                            
                            if (this.stamina <= 0 || this.stateTimer <= 0) {
                                if (this.stamina <= 0) {
                                    this.setState('STUNNED');
                                    this.stateTimer = 45;
                                    this.stamina = 0;
                                } else {
                                    this.setState('IDLE');
                                }
                            }
                            break;
                            
                        case 'STUNNED':
                            this.stateTimer--;
                            if (this.stateTimer <= 0) {
                                this.setState('IDLE');
                            }
                            break;
                            
                        case 'JUMP':
                            if (this.y >= GameState.groundY - 2 && this.vy >= 0) {
                                this.setState('IDLE');
                            }
                            break;
                    }
                }

                processAttack(opponent, currentTime) {
                    if (!this.currentMove) {
                        this.setState('IDLE');
                        return;
                    }

                    this.moveFrame++;

                    const move = this.currentMove;
                    const activeStart = move.startup;
                    const activeEnd = move.startup + move.active;

                    // Hit detection during active frames
                    if (this.moveFrame > activeStart && this.moveFrame <= activeEnd && !this.damageDealt) {
                        this.checkHit(opponent, currentTime);
                        this.damageDealt = true;
                    }

                    // End of attack
                    if (this.moveFrame >= move.startup + move.active + move.recovery) {
                        this.setState('IDLE');
                        this.currentMove = null;
                        this.damageDealt = false;
                    }
                }

                checkHit(opponent, currentTime) {
                    const move = this.currentMove;
                    const distance = Math.abs(this.x - opponent.x);
                    
                    // Range check
                    if (distance > move.range) return;

                    // Facing check
                    const isFacing = (this.facingRight && opponent.x > this.x) || 
                                   (!this.facingRight && opponent.x < this.x);
                    if (!isFacing) return;

                    // Block check
                    if (opponent.state === 'BLOCK') {
                        this.handleBlock(opponent, move);
                        return;
                    }

                    // Hit!
                    this.handleHit(opponent, move, currentTime);
                }

                handleBlock(opponent, move) {
                    const chipDamage = Math.floor(move.damage * CONFIG.CHIP_DAMAGE);
                    
                    opponent.takeDamage(chipDamage, true, false);
                    opponent.stamina -= 10 + move.damage * 0.2;
                    
                    // Guard break chance
                    if (move.height === 'low' && Utils.chance(0.3) && opponent.stamina < 30) {
                        opponent.setState('STUNNED');
                        opponent.stateTimer = 40;
                        opponent.stamina = 0;
                        
                        if (this.comboCount >= 2) {
                            this.showComboText(opponent.x, opponent.y - 80, this.comboCount + 1);
                        }
                        this.comboCount++;
                    }
                    
                    // Visual effect
                    Game.particles.emit(
                        opponent.x + (this.facingRight ? 30 : -30),
                        opponent.y - 50,
                        '#aaddff',
                        8,
                        4,
                        2,
                        5
                    );
                }

                handleHit(opponent, move, currentTime) {
                    // Calculate damage
                    let damage = move.damage + this.stats.str * 1.2;
                    
                    // Critical hit
                    const isCrit = Utils.chance(this.stats.critChance);
                    if (isCrit) {
                        damage *= this.stats.critMultiplier;
                    }
                    
                    damage = Math.floor(damage);
                    
                    // Apply damage
                    opponent.takeDamage(damage, false, isCrit, move.knockback, move.stun || 0);
                    
                    // Visual effects
                    Game.particles.emit(
                        opponent.x,
                        opponent.y - 40,
                        '#c0392b',
                        15,
                        10,
                        4,
                        8
                    );
                    
                    // Hit stop and shake
                    Game.hitStop = CONFIG.HIT_STOP_DURATION;
                    Game.screenShake = CONFIG.SHAKE_INTENSITY;
                    
                    // Combo system
                    const now = currentTime;
                    if (now - this.lastHitTime < 800) {
                        this.comboCount++;
                        
                        if (this.comboCount >= 3) {
                            this.showComboText(opponent.x, opponent.y - 100, this.comboCount);
                        }
                    } else {
                        this.comboCount = 1;
                    }
                    
                    this.lastHitTime = now;
                    
                    // AI memory
                    if (opponent.ai) {
                        opponent.ai.memory.record({
                            action: 'HIT',
                            move: move.name,
                            damage: damage,
                            timestamp: now
                        });
                    }
                }

                takeDamage(amount, isBlocked, isCrit, knockback = 5, stunTime = 0) {
                    if (isBlocked) {
                        // Chip damage
                        this.hp = Math.max(0, this.hp - amount);
                        this.vx = this.facingRight ? -3 : 3;
                        this.hitFlash = true;
                        this.flashTimer = 5;
                        
                        Game.damageTexts.show(this.x, this.y - 80, amount.toString(), '#88ccff', false);
                    } else {
                        // Direct hit
                        this.hp = Math.max(0, this.hp - amount);
                        
                        // Hit reaction
                        this.setState('HIT');
                        this.hitStun = 12;
                        this.hitFlash = true;
                        this.flashTimer = 8;
                        
                        // Knockback
                        this.vx = (this.facingRight ? -1 : 1) * knockback;
                        this.vy = -4 - knockback * 0.1;
                        this.knockbackX = (this.facingRight ? -1 : 1) * knockback * 0.5;
                        
                        // Stun
                        if (stunTime > 0) {
                            this.setState('STUNNED');
                            this.stateTimer = stunTime;
                            this.vy = 0;
                            this.y = GameState.groundY;
                        }
                        
                        // Damage text
                        const color = isCrit ? '#ffd700' : '#ffffff';
                        Game.damageTexts.show(this.x, this.y - 100, amount.toString(), color, isCrit);
                    }

                    // Death check
                    if (this.hp <= 0) {
                        this.hp = 0;
                        this.state = 'DEAD';
                        Game.checkGameOver();
                    }

                    // Update health delay
                    if (this.hp < this.hpDelay) {
                        this.hpDelay = this.hp;
                        setTimeout(() => {
                            this.hpDelay = this.hp;
                        }, 500);
                    }

                    Game.uiNeedsUpdate = true;
                }

                setState(newState) {
                    if (this.state === newState) return;
                    
                    this.previousState = this.state;
                    this.state = newState;
                    this.stateTimer = 0;
                    
                    if (newState !== 'ATTACK') {
                        this.currentMove = null;
                        this.damageDealt = false;
                    }
                }

                regenerateStamina() {
                    const regenRate = (this.state === 'IDLE' || this.state === 'WALK') 
                        ? CONFIG.STAMINA_REGEN_IDLE 
                        : CONFIG.STAMINA_REGEN_ACTIVE;
                    
                    this.stamina = Math.min(this.stats.maxStamina, this.stamina + regenRate);
                }

                executeAIDecision(decision) {
                    if (!decision) return;

                    switch (decision.type) {
                        case 'ATTACK':
                            if (decision.move && this.stamina >= MOVES[decision.move].stamina) {
                                this.startAttack(decision.move);
                            }
                            break;
                            
                        case 'BLOCK':
                            if (this.stamina > 20) {
                                this.startBlock();
                            }
                            break;
                            
                        case 'JUMP':
                            this.startJump();
                            break;
                            
                        case 'APPROACH':
                            const approachDir = this.x < Game.p2.x ? 1 : -1;
                            this.vx = approachDir * (3 + this.stats.agi * 0.15);
                            this.facingRight = approachDir > 0;
                            this.state = 'WALK';
                            break;
                            
                        case 'RETREAT':
                            const retreatDir = this.x < Game.p2.x ? -1 : 1;
                            this.vx = retreatDir * (3.5 + this.stats.agi * 0.15);
                            this.facingRight = retreatDir > 0;
                            this.state = 'WALK';
                            break;
                            
                        case 'IDLE':
                            this.vx = 0;
                            this.state = 'IDLE';
                            break;
                    }
                }

                startAttack(moveName) {
                    const move = MOVES[moveName];
                    if (!move || this.stamina < move.stamina || this.state !== 'IDLE') return false;

                    this.setState('ATTACK');
                    this.currentMove = move;
                    this.moveFrame = 0;
                    this.stamina -= move.stamina;
                    this.damageDealt = false;
                    this.vx = 0;

                    if (move.jump && this.y >= GameState.groundY - 2) {
                        this.vy = -12;
                    }

                    return true;
                }

                startBlock() {
                    if (this.stamina < 20 || this.state !== 'IDLE') return false;
                    
                    this.setState('BLOCK');
                    this.stateTimer = 35;
                    this.vx = 0;
                    return true;
                }

                startJump() {
                    if (this.y < GameState.groundY - 2 || this.state !== 'IDLE') return false;
                    
                    this.vy = -13.5;
                    this.setState('JUMP');
                    return true;
                }

                showComboText(x, y, combo) {
                    const element = document.createElement('div');
                    element.className = 'combo-text';
                    element.style.left = x + 'px';
                    element.style.top = y + 'px';
                    element.textContent = combo + ' HIT COMBO!';
                    document.body.appendChild(element);
                    
                    setTimeout(() => element.remove(), 800);
                }

                draw(ctx) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    
                    if (!this.facingRight) {
                        ctx.scale(-1, 1);
                    }

                    // Shadow
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = this.hitFlash ? 25 : 15;
                    
                    // Body (simple but effective representation)
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 6;
                    ctx.lineCap = 'round';
                    
                    // Torso
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(0, -60);
                    ctx.stroke();
                    
                    // Head
                    ctx.beginPath();
                    ctx.arc(0, -75, 15, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    // Arms
                    ctx.beginPath();
                    ctx.moveTo(0, -45);
                    ctx.lineTo(-20, -30);
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(0, -45);
                    ctx.lineTo(20, -30);
                    ctx.stroke();
                    
                    // Legs
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(-15, 25);
                    ctx.stroke();
                    
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(15, 25);
                    ctx.stroke();
                    
                    // Hit flash
                    if (this.hitFlash) {
                        ctx.globalAlpha = 0.3;
                        ctx.fillStyle = '#fff';
                        ctx.fillRect(-30, -95, 60, 120);
                        ctx.globalAlpha = 1;
                    }
                    
                    ctx.restore();
                }

                reset() {
                    this.x = GameState.width * (this.color === '#00d2ff' ? 0.35 : 0.65);
                    this.y = GameState.groundY;
                    this.vx = 0;
                    this.vy = 0;
                    this.facingRight = this.x < GameState.width / 2;
                    this.hp = this.stats.maxHp;
                    this.hpDelay = this.stats.maxHp;
                    this.stamina = this.stats.maxStamina;
                    this.state = 'IDLE';
                    this.stateTimer = 0;
                    this.currentMove = null;
                    this.hitStun = 0;
                    this.comboCount = 0;
                    this.flashTimer = 0;
                    
                    if (this.ai) {
                        this.ai.memory.clear();
                    }
                }
            }

            // =================================================================
            // PARTICLE SYSTEM - Complete
            // =================================================================
            class ParticleSystem {
                constructor(maxParticles = 200) {
                    this.particles = [];
                    this.maxParticles = maxParticles;
                }

                emit(x, y, color, count, speed, minSize, maxSize) {
                    for (let i = 0; i < count; i++) {
                        if (this.particles.length >= this.maxParticles) {
                            this.particles.shift();
                        }

                        const angle = Math.random() * Math.PI * 2;
                        const spd = speed * (0.7 + Math.random() * 0.6);
                        
                        this.particles.push({
                            x: x + (Math.random() - 0.5) * 20,
                            y: y + (Math.random() - 0.5) * 20,
                            vx: Math.cos(angle) * spd,
                            vy: Math.sin(angle) * spd - 2,
                            life: 1,
                            color: color,
                            size: minSize + Math.random() * (maxSize - minSize)
                        });
                    }
                }

                update() {
                    for (let i = this.particles.length - 1; i >= 0; i--) {
                        const p = this.particles[i];
                        
                        p.x += p.vx;
                        p.y += p.vy;
                        p.vy += 0.3;
                        p.vx *= 0.98;
                        p.life -= 0.02;
                        
                        if (p.life <= 0) {
                            this.particles.splice(i, 1);
                        }
                    }
                }

                draw(ctx) {
                    for (const p of this.particles) {
                        ctx.globalAlpha = p.life;
                        ctx.fillStyle = p.color;
                        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
                    }
                    ctx.globalAlpha = 1;
                }

                clear() {
                    this.particles = [];
                }
            }

            // =================================================================
            // DAMAGE TEXT SYSTEM - Complete
            // =================================================================
            class DamageTextSystem {
                constructor(maxTexts = 30) {
                    this.texts = [];
                    this.maxTexts = maxTexts;
                }

                show(x, y, text, color, isCrit = false) {
                    if (this.texts.length >= this.maxTexts) {
                        this.texts.shift();
                    }

                    this.texts.push({
                        x, y,
                        text: text,
                        color: color,
                        size: isCrit ? 40 : 30,
                        life: 1,
                        vy: -1.5,
                        isCrit: isCrit
                    });
                }

                update() {
                    for (let i = this.texts.length - 1; i >= 0; i--) {
                        const t = this.texts[i];
                        
                        t.y += t.vy;
                        t.vy *= 0.97;
                        t.life -= 0.015;
                        
                        if (t.life <= 0) {
                            this.texts.splice(i, 1);
                        }
                    }
                }

                draw(ctx) {
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    for (const t of this.texts) {
                        ctx.globalAlpha = t.life;
                        ctx.font = `bold ${t.size}px 'Arial Black'`;
                        ctx.strokeStyle = '#000';
                        ctx.lineWidth = 4;
                        ctx.strokeText(t.text, t.x, t.y);
                        ctx.fillStyle = t.color;
                        ctx.fillText(t.text, t.x, t.y);
                        
                        if (t.isCrit) {
                            ctx.shadowBlur = 20;
                            ctx.shadowColor = '#ffd700';
                        }
                    }
                    
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                }

                clear() {
                    this.texts = [];
                }
            }

            // =================================================================
            // GAME STATE
            // =================================================================
            const GameState = {
                width: 0,
                height: 0,
                groundY: 0,
                isRunning: false,
                gameMode: 'ai', // pvp, pve, ai
                difficulty: 'normal'
            };

            // =================================================================
            // MAIN GAME CLASS - Complete
            // =================================================================
            const Game = {
                canvas: null,
                ctx: null,
                p1: null,
                p2: null,
                particles: null,
                damageTexts: null,
                
                hitStop: 0,
                screenShake: 0,
                
                lastFrameTime: 0,
                frameCount: 0,
                fps: 60,
                
                uiNeedsUpdate: true,
                
                init() {
                    this.canvas = document.getElementById('gameCanvas');
                    this.ctx = this.canvas.getContext('2d', { alpha: false });
                    
                    if (!this.ctx) {
                        console.error('Canvas initialization failed');
                        return false;
                    }

                    this.resize();
                    window.addEventListener('resize', () => this.resize());
                    
                    this.particles = new ParticleSystem(250);
                    this.damageTexts = new DamageTextSystem(40);
                    
                    this.bindEvents();
                    
                    return true;
                },

                resize() {
                    GameState.width = this.canvas.width = window.innerWidth;
                    GameState.height = this.canvas.height = window.innerHeight;
                    GameState.groundY = GameState.height - CONFIG.GROUND_Y_OFFSET;
                },

                bindEvents() {
                    // Mode selection
                    document.querySelectorAll('.mode-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                            e.target.classList.add('active');
                            GameState.gameMode = e.target.dataset.mode;
                        });
                    });

                    // Difficulty selection
                    document.querySelectorAll('.diff-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                            e.target.classList.add('active');
                            GameState.difficulty = e.target.dataset.difficulty;
                        });
                    });

                    // Start button
                    document.getElementById('startGameBtn').addEventListener('click', () => {
                        this.startGame();
                    });

                    // Rematch button
                    document.getElementById('rematchBtn').addEventListener('click', () => {
                        this.rematch();
                    });

                    // Keyboard controls
                    window.addEventListener('keydown', (e) => {
                        if (!GameState.isRunning || !this.p1) return;

                        // Player 1 controls (only in PVP or PVE)
                        if (GameState.gameMode !== 'ai') {
                            switch(e.key) {
                                case 'ArrowLeft':
                                    this.p1.vx = -4 - this.p1.stats.agi * 0.15;
                                    this.p1.facingRight = false;
                                    break;
                                case 'ArrowRight':
                                    this.p1.vx = 4 + this.p1.stats.agi * 0.15;
                                    this.p1.facingRight = true;
                                    break;
                                case 'z':
                                case 'Z':
                                    if (this.p1.state === 'IDLE') {
                                        this.p1.startAttack('JAB');
                                    }
                                    break;
                                case 'x':
                                case 'X':
                                    this.p1.startBlock();
                                    break;
                                case 'c':
                                case 'C':
                                    this.p1.startJump();
                                    break;
                            }
                        }

                        // Common controls
                        if (e.key.toLowerCase() === 'r') {
                            this.rematch();
                        }
                        if (e.key.toLowerCase() === 'd') {
                            this.toggleDebug();
                        }
                    });

                    window.addEventListener('keyup', (e) => {
                        if (!GameState.isRunning || !this.p1) return;
                        
                        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                            this.p1.vx = 0;
                        }
                    });
                },

                startGame() {
                    document.getElementById('startScreen').classList.add('hidden');
                    
                    // Create fighters with appropriate stats
                    const stats1 = { str: 8, agi: 6, sta: 5, int: 4 };
                    const stats2 = { str: 7, agi: 7, sta: 4, int: 5 };
                    
                    const isP1AI = GameState.gameMode === 'ai';
                    const isP2AI = GameState.gameMode !== 'pvp';
                    
                    this.p1 = new Fighter(
                        GameState.width * 0.35, 
                        '#00d2ff', 
                        isP1AI, 
                        stats1, 
                        GameState.difficulty,
                        'aggressive'
                    );
                    
                    this.p2 = new Fighter(
                        GameState.width * 0.65, 
                        '#ff4757', 
                        isP2AI, 
                        stats2, 
                        GameState.difficulty,
                        'tactical'
                    );

                    this.particles.clear();
                    this.damageTexts.clear();
                    
                    GameState.isRunning = true;
                    this.hitStop = 0;
                    this.screenShake = 0;
                    this.uiNeedsUpdate = true;
                    
                    this.showMessage('FIGHT', 1500);
                    this.lastFrameTime = Utils.now();
                    this.gameLoop();
                },

                rematch() {
                    document.getElementById('gameOverScreen').style.display = 'none';
                    
                    if (this.p1) this.p1.reset();
                    if (this.p2) this.p2.reset();
                    
                    this.particles.clear();
                    this.damageTexts.clear();
                    
                    GameState.isRunning = true;
                    this.hitStop = 0;
                    this.screenShake = 0;
                    this.uiNeedsUpdate = true;
                    
                    this.showMessage('REMATCH', 1200);
                },

                checkGameOver() {
                    if (!this.p1 || !this.p2) return;
                    
                    if (this.p1.hp <= 0 || this.p2.hp <= 0) {
                        GameState.isRunning = false;
                        
                        const winner = this.p1.hp > 0 ? this.p1 : this.p2;
                        const loser = this.p1.hp > 0 ? this.p2 : this.p1;
                        
                        const winnerText = document.getElementById('winnerText');
                        const winnerSubtitle = document.getElementById('winnerSubtitle');
                        
                        winnerText.textContent = 'VICTORY';
                        winnerText.style.color = winner.color;
                        winnerSubtitle.textContent = winner.color === '#00d2ff' ? 'BLUE WINS' : 'RED WINS';
                        
                        document.getElementById('gameOverScreen').style.display = 'flex';
                        
                        // Final particles
                        this.particles.emit(winner.x, winner.y - 50, '#ffd700', 30, 8, 3, 7);
                    }
                },

                showMessage(text, duration) {
                    const msg = document.getElementById('messageOverlay');
                    msg.textContent = text;
                    msg.classList.add('show');
                    
                    setTimeout(() => {
                        msg.classList.remove('show');
                    }, duration);
                },

                gameLoop() {
                    if (!GameState.isRunning) return;

                    const now = Utils.now();
                    const deltaTime = now - this.lastFrameTime;
                    
                    // FPS calculation
                    this.frameCount++;
                    if (deltaTime >= 1000) {
                        this.fps = this.frameCount;
                        this.frameCount = 0;
                        this.lastFrameTime = now;
                        document.getElementById('fpsCounter').textContent = `FPS: ${this.fps}`;
                    }

                    // Hit stop
                    if (this.hitStop > 0) {
                        this.hitStop--;
                        this.draw();
                        requestAnimationFrame(() => this.gameLoop());
                        return;
                    }

                    // Update game
                    try {
                        this.p1.update(this.p2, now);
                        this.p2.update(this.p1, now);
                        
                        this.particles.update();
                        this.damageTexts.update();
                        
                        if (this.screenShake > 0.5) {
                            this.screenShake *= CONFIG.SHAKE_DECAY;
                        } else {
                            this.screenShake = 0;
                        }
                        
                        if (this.uiNeedsUpdate) {
                            this.updateUI();
                        }
                        
                        this.updateDebug();
                        this.draw();
                        
                    } catch (error) {
                        console.error('Game loop error:', error);
                    }

                    requestAnimationFrame(() => this.gameLoop());
                },

                updateUI() {
                    if (!this.p1 || !this.p2) return;

                    // P1 UI
                    document.getElementById('p1HealthBar').style.width = (this.p1.hp / this.p1.stats.maxHp * 100) + '%';
                    document.getElementById('p1HealthDelay').style.width = ((this.p1.stats.maxHp - this.p1.hpDelay) / this.p1.stats.maxHp * 100) + '%';
                    document.getElementById('p1StaminaBar').style.width = (this.p1.stamina / this.p1.stats.maxStamina * 100) + '%';
                    document.getElementById('p1HpText').textContent = `${Math.round(this.p1.hp)}/${this.p1.stats.maxHp}`;
                    document.getElementById('p1StaminaText').textContent = Math.round(this.p1.stamina);
                    
                    document.getElementById('p1Str').textContent = this.p1.stats.str;
                    document.getElementById('p1Agi').textContent = this.p1.stats.agi;
                    document.getElementById('p1Sta').textContent = this.p1.stats.sta;
                    document.getElementById('p1Int').textContent = this.p1.stats.int;

                    // P2 UI
                    document.getElementById('p2HealthBar').style.width = (this.p2.hp / this.p2.stats.maxHp * 100) + '%';
                    document.getElementById('p2HealthDelay').style.width = ((this.p2.stats.maxHp - this.p2.hpDelay) / this.p2.stats.maxHp * 100) + '%';
                    document.getElementById('p2StaminaBar').style.width = (this.p2.stamina / this.p2.stats.maxStamina * 100) + '%';
                    document.getElementById('p2HpText').textContent = `${Math.round(this.p2.hp)}/${this.p2.stats.maxHp}`;
                    document.getElementById('p2StaminaText').textContent = Math.round(this.p2.stamina);
                    
                    document.getElementById('p2Str').textContent = this.p2.stats.str;
                    document.getElementById('p2Agi').textContent = this.p2.stats.agi;
                    document.getElementById('p2Sta').textContent = this.p2.stats.sta;
                    document.getElementById('p2Int').textContent = this.p2.stats.int;

                    this.uiNeedsUpdate = false;
                },

                updateDebug() {
                    const panel = document.getElementById('debugPanel');
                    if (!panel.classList.contains('hidden') && this.p1 && this.p2) {
                        panel.innerHTML = `
                            P1: ${this.p1.state} | HP:${Math.round(this.p1.hp)} | ST:${Math.round(this.p1.stamina)}<br>
                            P2: ${this.p2.state} | HP:${Math.round(this.p2.hp)} | ST:${Math.round(this.p2.stamina)}<br>
                            DIST: ${Math.abs(this.p1.x - this.p2.x).toFixed(0)}<br>
                            SHAKE: ${this.screenShake.toFixed(1)}<br>
                            FPS: ${this.fps}
                        `;
                    }
                },

                toggleDebug() {
                    const panel = document.getElementById('debugPanel');
                    panel.classList.toggle('hidden');
                },

                draw() {
                    const ctx = this.ctx;
                    ctx.clearRect(0, 0, GameState.width, GameState.height);
                    
                    // Screen shake
                    ctx.save();
                    if (this.screenShake > 0.5) {
                        ctx.translate(
                            (Math.random() - 0.5) * this.screenShake,
                            (Math.random() - 0.5) * this.screenShake
                        );
                    }

                    // Background
                    ctx.fillStyle = '#0a0a14';
                    ctx.fillRect(0, 0, GameState.width, GameState.height);
                    
                    // Floor
                    ctx.fillStyle = '#1a1a2a';
                    ctx.fillRect(0, GameState.groundY, GameState.width, 5);
                    
                    // Fighters
                    if (this.p1) this.p1.draw(ctx);
                    if (this.p2) this.p2.draw(ctx);
                    
                    // Effects
                    this.particles.draw(ctx);
                    this.damageTexts.draw(ctx);
                    
                    ctx.restore();
                }
            };

            // Initialize game
            window.addEventListener('load', () => {
                const success = Game.init();
                if (!success) {
                    console.error('Failed to initialize game');
                }
            });

        })();
    </script>
</body>
</html>
