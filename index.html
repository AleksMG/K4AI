// SECTION 9: MAIN GAME ENGINE (Orchestration Layer)
// ════════════════════════════════════════════════════════════════════════════
// ============================================================================

class GameEngine {
    constructor() {
        this.eventBus = new EventBus();
        this.random = new Random();
        
        this.canvas = document.getElementById('mainCanvas');
        this.occupancyCanvas = document.getElementById('occupancyCanvas');
        this.latentCanvas = document.getElementById('latentCanvas');
        
        this.width = 800;
        this.height = 600;
        this.worldBounds = { minX: 30, maxX: 770, minY: 30, maxY: 570 };
        
        this.obstacles = [];
        this.entities = [];
        this.projectiles = [];
        this.particleSystem = new ParticleSystem();
        
        this.teamWorldModels = {};
        this.globalState = { entities: [], obstacles: [] };
        
        this.running = false;
        this.paused = false;
        this.training = false;
        this.frameCount = 0;
        
        this.stats = {
            fps: 60, shots: 0, hits: 0, kills: 0,
            wmUpdates: 0, lastFrameTime: 0
        };
        
        this.ui = {};
        this.renderer = null;
        
        this.#init();
    }
    
    #init() {
        try {
            this.#setupRenderer();
            this.#setupWorld();
            this.#setupEntities();
            this.#setupUI();
            this.#bindEvents();
            this.#log('AGI', 'World Model AGI Autopilot initialized');
            this.#render();
        } catch (e) {
            console.error('[GameEngine] Init error:', e);
            alert('Initialization error: ' + e.message);
        }
    }
    
    #setupRenderer() {
        this.renderer = new Renderer(this.canvas, this.occupancyCanvas, this.latentCanvas);
        this.renderer.resize(this.width, this.height);
    }
    
    #setupWorld() {
        this.#generateObstacles();
        this.globalState.obstacles = this.obstacles;
        
        // Create team world models (one per team)
        this.teamWorldModels[0] = new TeamWorldModel(0, this.globalState);
        this.teamWorldModels[1] = new TeamWorldModel(1, this.globalState);
    }
    
    #generateObstacles() {
        this.obstacles = [];
        const count = 12;
        for (let i = 0; i < count; i++) {
            let valid = false, attempts = 0, center, radius;
            while (!valid && attempts < 50) {
                center = new Vector2(this.random.range(100, 700), this.random.range(100, 500));
                radius = this.random.range(25, 45);
                valid = true;
                for (const obs of this.obstacles) {
                    if (center.dist(obs.center) < obs.radius + radius + 40) { valid = false; break; }
                }
                attempts++;
            }
            if (valid) this.obstacles.push({ center, radius });
        }
    }
    
    #setupEntities() {
        this.entities = [];
        this.projectiles = [];
        
        for (let i = 0; i < 6; i++) {
            this.#spawnTank();
        }
    }
    
    #spawnTank() {
        const team = this.entities.length % 2;
        const pos = new Vector2(this.random.range(100, 700), this.random.range(100, 500));
        const entity = new TankEntity(this.entities.length, pos, team);
        
        const autopilot = new AGIAutopilot(
            entity,
            this.teamWorldModels[team],
            this.eventBus,
            { training: this.training }
        );
        
        this.entities.push({ entity, autopilot });
        this.#log('SYS', `Tank #${entity.id} spawned (Team ${team + 1})`);
    }
    
    #setupUI() {
        this.ui = {
            fps: document.getElementById('stat-fps'),
            entities: document.getElementById('stat-entities'),
            wm: document.getElementById('stat-wm'),
            uncertainty: document.getElementById('stat-uncertainty'),
            teamBlue: document.getElementById('team-blue'),
            teamRed: document.getElementById('team-red'),
            targets: document.getElementById('stat-targets'),
            sync: document.getElementById('stat-sync'),
            trajs: document.getElementById('stat-trajs'),
            hypo: document.getElementById('stat-hypo'),
            conf: document.getElementById('stat-conf'),
            episode: document.getElementById('neural-episode'),
            wmLoss: document.getElementById('neural-wm-loss'),
            policyLoss: document.getElementById('neural-policy-loss'),
            buffer: document.getElementById('neural-buffer'),
            log: document.getElementById('log')
        };
    }
    
    #bindEvents() {
        document.getElementById('btn-start')?.addEventListener('click', () => this.#start());
        document.getElementById('btn-pause')?.addEventListener('click', () => this.#togglePause());
        document.getElementById('btn-reset')?.addEventListener('click', () => this.#reset());
        document.getElementById('btn-occupancy')?.addEventListener('click', () => {
            this.renderer.showOccupancy = !this.renderer.showOccupancy;
            this.occupancyCanvas.style.display = this.renderer.showOccupancy ? 'block' : 'none';
        });
        document.getElementById('btn-latent')?.addEventListener('click', () => {
            this.renderer.showLatent = !this.renderer.showLatent;
            this.latentCanvas.style.display = this.renderer.showLatent ? 'block' : 'none';
        });
        document.getElementById('btn-predictions')?.addEventListener('click', () => {
            this.renderer.showPredictions = !this.renderer.showPredictions;
        });
        document.getElementById('btn-team')?.addEventListener('click', () => {
            this.renderer.showTeamView = !this.renderer.showTeamView;
        });
        document.getElementById('btn-training')?.addEventListener('click', () => {
            this.training = !this.training;
            this.#log('AGI', `Training mode: ${this.training ? 'ON' : 'OFF'}`);
        });
        
        this.eventBus.on('tank:fire', (data) => this.#handleFire(data));
        this.eventBus.on('tank:destroyed', (data) => this.#handleDestroyed(data));
        
        window.addEventListener('resize', () => {
            const viewport = document.getElementById('viewport');
            if (viewport) {
                this.width = viewport.clientWidth;
                this.height = viewport.clientHeight;
                this.renderer.resize(this.width, this.height);
            }
        });
    }
    
    #start() {
        if (this.running && !this.paused) return;
        this.running = true;
        this.paused = false;
        this.stats.lastFrameTime = performance.now();
        this.#log('SYS', 'Battle started');
        this.#loop();
    }
    
    #togglePause() {
        if (!this.running) return;
        this.paused = !this.paused;
        this.#log('SYS', this.paused ? 'Paused' : 'Resumed');
        if (!this.paused) this.#loop();
    }
    
    #reset() {
        this.running = false;
        this.paused = false;
        this.entities = [];
        this.projectiles = [];
        this.particleSystem.clear();
        this.stats = { fps: 60, shots: 0, hits: 0, kills: 0, wmUpdates: 0, lastFrameTime: 0 };
        this.frameCount = 0;
        
        this.#generateObstacles();
        this.globalState.obstacles = this.obstacles;
        this.teamWorldModels[0] = new TeamWorldModel(0, this.globalState);
        this.teamWorldModels[1] = new TeamWorldModel(1, this.globalState);
        
        for (let i = 0; i < 6; i++) this.#spawnTank();
        
        this.#log('SYS', 'Battle reset');
        this.#render();
    }
    
    #loop() {
        if (!this.running || this.paused) return;
        
        const now = performance.now();
        const dt = Math.min((now - this.stats.lastFrameTime) / 1000, 0.1);
        this.stats.lastFrameTime = now;
        this.stats.fps = Math.round(1 / dt) || 60;
        
        this.#update(dt);
        this.#render();
        this.#updateUI();
        
        this.frameCount++;
        requestAnimationFrame(() => this.#loop());
    }
    
    #update(dt) {
        const allEntities = this.entities.map(e => e.entity).filter(e => e);
        this.globalState.entities = allEntities;
        
        // 1. Sync team world models (fleet learning)
        for (const teamId of [0, 1]) {
            const teamTanks = allEntities.filter(e => e.team === teamId && e.alive);
            this.teamWorldModels[teamId].syncFromTeam(teamTanks, allEntities);
            this.stats.wmUpdates++;
        }
        
        // 2. Update autopilots
        for (const { entity, autopilot } of this.entities) {
            if (entity.alive && autopilot) {
                autopilot.update(dt, allEntities, this.obstacles);
                entity.applyPhysics(dt, this.worldBounds, allEntities, this.obstacles);
            }
        }
        
        // 3. Update projectiles
        for (const proj of this.projectiles) {
            proj.update(this.worldBounds, this.obstacles);
        }
        this.projectiles = this.projectiles.filter(p => p.alive);
        
        // 4. Collision detection
        this.#checkCollisions();
        
        // 5. Particles
        this.particleSystem.update(dt);
    }
    
    #checkCollisions() {
        for (const proj of this.projectiles) {
            if (!proj.alive) continue;
            
            for (const { entity } of this.entities) {
                if (!entity.alive || entity.id === proj.ownerId || entity.team === proj.team) continue;
                
                const dist = proj.pos.dist(entity.pos);
                if (dist < entity.config.radius + 5) {
                    proj.alive = false;
                    const destroyed = entity.takeDamage(proj.damage);
                    this.stats.hits++;
                    
                    if (destroyed) {
                        const killer = this.entities.find(e => e.entity.id === proj.ownerId);
                        if (killer) killer.entity.addKill();
                        this.stats.kills++;
                        this.particleSystem.emit(entity.pos.x, entity.pos.y, '#ff6600', 30, 5, 1.2);
                        this.eventBus.emit('tank:destroyed', { pos: entity.pos });
                        this.#log('COMBAT', `Tank #${entity.id} destroyed`);
                    }
                    break;
                }
            }
        }
    }
    
    #handleFire(data) {
        const proj = new Projectile(
            this.projectiles.length,
            data.position,
            data.direction,
            data.tankId,
            data.team
        );
        this.projectiles.push(proj);
        this.stats.shots++;
    }
    
    #handleDestroyed(data) {
        // Handled in #checkCollisions
    }
    
    #render() {
        if (!this.renderer) return;
        
        this.renderer.clear();
        this.renderer.drawGrid(this.width, this.height);
        this.renderer.drawObstacles(this.obstacles);
        
        // Draw team coordination
        this.renderer.drawTeamView(this.teamWorldModels, this.entities.map(e => e.entity));
        
        // Draw predictions
        this.renderer.drawPredictions(this.teamWorldModels);
        
        // Draw entities
        for (const { entity } of this.entities) {
            this.renderer.drawTank(entity);
        }
        
        // Draw projectiles
        for (const proj of this.projectiles) {
            this.renderer.drawProjectile(proj);
        }
        
        // Draw particles
        this.renderer.drawParticles(this.particleSystem);
        
        // Draw trajectories
        for (const { entity, autopilot } of this.entities) {
            if (entity.alive && autopilot?.currentTrajectory) {
                this.renderer.drawTrajectory(autopilot.currentTrajectory);
            }
        }
        
        // Overlays
        this.renderer.drawOccupancy(this.teamWorldModels);
        this.renderer.drawLatent(this.teamWorldModels);
    }
    
    #updateUI() {
        if (this.ui.fps) this.ui.fps.textContent = this.stats.fps;
        if (this.ui.entities) this.ui.entities.textContent = this.entities.filter(e => e.entity.alive).length;
        if (this.ui.wm) this.ui.wm.textContent = this.stats.wmUpdates;
        
        // Team stats
        let blue = 0, red = 0, totalTargets = 0;
        for (const { entity } of this.entities) {
            if (entity.alive) {
                if (entity.team === 0) blue++; else red++;
            }
        }
        for (const twm of Object.values(this.teamWorldModels)) {
            totalTargets += twm.targetAssignments.size;
        }
        
        if (this.ui.teamBlue) this.ui.teamBlue.textContent = blue;
        if (this.ui.teamRed) this.ui.teamRed.textContent = red;
        if (this.ui.targets) this.ui.targets.textContent = totalTargets;
        
        // Prediction stats
        let totalTrajs = 0, totalHypo = 0, totalConf = 0;
        for (const twm of Object.values(this.teamWorldModels)) {
            for (const pred of twm.enemyPredictions.values()) {
                totalTrajs++;
                totalHypo += pred.hypotheses?.length ?? 0;
                totalConf += pred.confidence ?? 0;
            }
        }
        const avgConf = totalTrajs > 0 ? (totalConf / totalTrajs * 100) : 0;
        
        if (this.ui.trajs) this.ui.trajs.textContent = totalTrajs;
        if (this.ui.hypo) this.ui.hypo.textContent = totalHypo;
        if (this.ui.conf) this.ui.conf.textContent = avgConf.toFixed(0) + '%';
        if (this.ui.uncertainty) {
            const avgUnc = Object.values(this.teamWorldModels).reduce((a, b) => a + b.uncertainty, 0) / 2;
            this.ui.uncertainty.textContent = avgUnc.toFixed(1) + '%';
        }
    }
    
    #log(level, message) {
        if (!this.ui.log) return;
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span class="log-${level.toLowerCase()}">[${level}]</span> ${message}`;
        this.ui.log.insertBefore(entry, this.ui.log.firstChild);
        while (this.ui.log.children.length > 100) {
            this.ui.log.removeChild(this.ui.log.lastChild);
        }
    }
}

// SECTION 10: INITIALIZATION

(function() {
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => { window.game = new GameEngine(); });
    } else {
        window.game = new GameEngine();
    }
})();
</script>
