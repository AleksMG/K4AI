<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stick Fighter Arena - Deep Neural Evolution</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-dark: #080810;
      --bg-panel: #0f0f1a;
      --accent-red: #ff3355;
      --accent-blue: #33ccff;
      --accent-gold: #ffcc00;
      --accent-green: #33ff99;
      --text: #e0e0e8;
      --text-dim: #606070;
      --border: #252535;
    }

    body {
      background: var(--bg-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .game-wrapper {
      width: 100%;
      max-width: 1200px;
      padding: 15px;
      display: flex;
      gap: 20px;
    }

    /* Main Game Area */
    .game-area {
      flex: 2;
    }

    /* Tournament Panel */
    .tournament-panel {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-height: 600px;
      overflow-y: auto;
    }

    .panel-title {
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 2px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .stat-card {
      background: var(--bg-dark);
      padding: 10px;
      border-radius: 4px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent-green);
    }

    .fighter-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .fighter-entry {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .fighter-entry:hover {
      border-color: var(--accent-gold);
      transform: translateX(5px);
    }

    .fighter-entry.selected {
      border-color: var(--accent-green);
      background: rgba(51, 255, 153, 0.1);
    }

    .fighter-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .fighter-name {
      font-weight: bold;
    }

    .fighter-stats {
      font-size: 0.7rem;
      color: var(--text-dim);
      display: flex;
      gap: 10px;
    }

    .fighter-score {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--accent-gold);
    }

    .evolution-controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .evo-btn {
      flex: 1;
      padding: 10px;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .evo-btn:hover {
      border-color: var(--accent-green);
      color: var(--accent-green);
    }

    .evo-btn.primary {
      background: linear-gradient(135deg, var(--accent-green), #119944);
      border: none;
      color: var(--bg-dark);
      font-weight: bold;
    }

    .generation-badge {
      font-size: 0.9rem;
      padding: 5px 10px;
      background: var(--bg-dark);
      border-radius: 4px;
      color: var(--accent-gold);
      text-align: center;
    }

    /* Pre-fight Menu */
    .menu-screen {
      position: fixed;
      inset: 0;
      background: rgba(8, 8, 16, 0.98);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s, visibility 0.5s;
    }

    .menu-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .menu-title {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 40px;
      background: linear-gradient(135deg, var(--accent-red), var(--accent-gold), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .fighter-select {
      display: flex;
      gap: 40px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .fighter-config {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 25px;
      min-width: 280px;
      border-radius: 8px;
    }

    .fighter-config h3 {
      font-size: 1.2rem;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .fighter-config.red h3 { color: var(--accent-red); }
    .fighter-config.blue h3 { color: var(--accent-blue); }

    .config-row {
      margin-bottom: 15px;
    }

    .config-row label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .config-row select, .config-row input[type="range"] {
      width: 100%;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 4px;
      font-family: inherit;
      cursor: pointer;
    }

    .config-row select:focus {
      outline: none;
      border-color: var(--accent-gold);
    }

    .start-btn {
      padding: 18px 60px;
      font-size: 1.3rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 3px;
      background: linear-gradient(135deg, var(--accent-red), #aa1133);
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 4px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .start-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255, 51, 85, 0.4);
    }

    .start-btn:active {
      transform: translateY(0);
    }

    /* Game UI */
    .game-container {
      position: relative;
    }

    .header-ui {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 15px;
    }

    .hp-section {
      flex: 1;
    }

    .player-info {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
    }

    .player-name {
      font-weight: bold;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .player-name.red { color: var(--accent-red); }
    .player-name.blue { color: var(--accent-blue); }

    .tactic-badge {
      font-size: 0.65rem;
      padding: 3px 8px;
      background: var(--border);
      border-radius: 3px;
      color: var(--text-dim);
    }

    .hp-bar-bg {
      height: 18px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .hp-bar-fill {
      height: 100%;
      transition: width 0.2s ease-out;
    }

    .hp-bar-fill.red { background: linear-gradient(90deg, #aa1133, var(--accent-red)); }
    .hp-bar-fill.blue { background: linear-gradient(90deg, var(--accent-blue), #1199dd); }

    .hp-bar-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .timer-display {
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--accent-gold);
      text-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
      font-variant-numeric: tabular-nums;
      min-width: 60px;
      text-align: center;
    }

    .canvas-frame {
      position: relative;
      border: 2px solid var(--border);
      background: #0a0a14;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    #gameCanvas {
      display: block;
      width: 100%;
    }

    .announce-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 10;
    }

    .announce-overlay.show {
      opacity: 1;
    }

    .announce-text {
      font-size: clamp(3rem, 10vw, 5rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 5px;
      animation: announceIn 0.5s ease-out;
      text-shadow: 0 0 30px currentColor;
    }

    .announce-text.fight { color: var(--accent-gold); }
    .announce-text.ko { color: var(--accent-red); }
    .announce-text.win { color: var(--accent-blue); }

    @keyframes announceIn {
      0% { transform: scale(2); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .combo-popup {
      position: absolute;
      font-size: 2rem;
      font-weight: bold;
      pointer-events: none;
      opacity: 0;
      transform: translateY(0);
      transition: all 0.4s ease-out;
      text-shadow: 0 0 15px currentColor;
    }

    .combo-popup.show {
      opacity: 1;
      transform: translateY(-30px);
    }

    .result-screen {
      position: absolute;
      inset: 0;
      background: rgba(8, 8, 16, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.5s;
      z-index: 20;
    }

    .result-screen.show {
      opacity: 1;
      visibility: visible;
    }

    .result-title {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .result-title.red { color: var(--accent-red); text-shadow: 0 0 30px var(--accent-red); }
    .result-title.blue { color: var(--accent-blue); text-shadow: 0 0 30px var(--accent-blue); }

    .result-stats {
      display: flex;
      gap: 50px;
      margin: 30px 0;
    }

    .stat-box {
      text-align: center;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--accent-gold);
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: 5px;
    }

    .btn-row {
      display: flex;
      gap: 20px;
      margin-top: 30px;
    }

    .game-btn {
      padding: 12px 35px;
      font-size: 1rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }

    .game-btn:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      transform: translateY(-2px);
    }

    .game-btn.primary {
      background: linear-gradient(135deg, var(--accent-red), #991133);
      border: none;
      color: white;
    }

    .game-btn.primary:hover {
      box-shadow: 0 5px 25px rgba(255, 51, 85, 0.5);
      color: white;
    }

    @media (max-width: 1000px) {
      .game-wrapper { flex-direction: column; }
      .tournament-panel { max-height: 300px; }
    }
  </style>
</head>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // === DEEP NEURAL NETWORK ===
    class NeuralNetwork {
      constructor(inputSize = 32, hidden1Size = 64, hidden2Size = 32, outputSize = 12) {
        this.inputSize = inputSize;
        this.hidden1Size = hidden1Size;
        this.hidden2Size = hidden2Size;
        this.outputSize = outputSize;
        
        // Xavier/He Initialization
        this.W1 = this.randomMatrix(hidden1Size, inputSize, inputSize);
        this.b1 = new Array(hidden1Size).fill(0.1);
        
        this.W2 = this.randomMatrix(hidden2Size, hidden1Size, hidden1Size);
        this.b2 = new Array(hidden2Size).fill(0.1);
        
        this.W3 = this.randomMatrix(outputSize, hidden2Size, hidden2Size);
        this.b3 = new Array(outputSize).fill(0.1);
      }

      randomMatrix(rows, cols, fanIn) {
        const matrix = [];
        const scale = Math.sqrt(2.0 / fanIn); // He initializer
        for (let i = 0; i < rows; i++) {
          matrix[i] = [];
          for (let j = 0; j < cols; j++) {
            matrix[i][j] = (Math.random() * 2 - 1) * scale;
          }
        }
        return matrix;
      }

      relu(x) { return Math.max(0, x); }
      
      softmax(arr) {
        const max = Math.max(...arr);
        const exps = arr.map(x => Math.exp(x - max));
        const sum = exps.reduce((a, b) => a + b);
        return exps.map(x => x / sum);
      }

      forward(input) {
        // Layer 1
        let h1 = [];
        for (let i = 0; i < this.hidden1Size; i++) {
          let sum = this.b1[i];
          for (let j = 0; j < this.inputSize; j++) {
            sum += this.W1[i][j] * input[j];
          }
          h1[i] = this.relu(sum);
        }

        // Layer 2
        let h2 = [];
        for (let i = 0; i < this.hidden2Size; i++) {
          let sum = this.b2[i];
          for (let j = 0; j < this.hidden1Size; j++) {
            sum += this.W2[i][j] * h1[j];
          }
          h2[i] = this.relu(sum);
        }

        // Output
        let output = [];
        for (let i = 0; i < this.outputSize; i++) {
          let sum = this.b3[i];
          for (let j = 0; j < this.hidden2Size; j++) {
            sum += this.W3[i][j] * h2[j];
          }
          output[i] = sum;
        }

        return this.softmax(output);
      }

      crossover(other) {
        const child = new NeuralNetwork();
        
        const crossMat = (A, B, C) => {
          for(let i=0; i<A.length; i++) {
            for(let j=0; j<A[i].length; j++) {
              C[i][j] = Math.random() < 0.5 ? A[i][j] : B[i][j];
            }
          }
        };
        
        crossMat(this.W1, other.W1, child.W1);
        crossMat(this.W2, other.W2, child.W2);
        crossMat(this.W3, other.W3, child.W3);
        
        child.mutate(0.08);
        return child;
      }

      mutate(rate) {
        const mutateMat = (M) => {
          for(let i=0; i<M.length; i++) {
            for(let j=0; j<M[i].length; j++) {
              if (Math.random() < rate) {
                M[i][j] += (Math.random() - 0.5) * 0.5;
              }
            }
          }
        };
        mutateMat(this.W1); mutateMat(this.W2); mutateMat(this.W3);
      }

      clone() {
        const cl = new NeuralNetwork();
        const copyMat = (S, D) => { for(let i=0; i<S.length; i++) for(let j=0; j<S[i].length; j++) D[i][j] = S[i][j]; };
        copyMat(this.W1, cl.W1); copyMat(this.W2, cl.W2); copyMat(this.W3, cl.W3);
        cl.b1 = [...this.b1]; cl.b2 = [...this.b2]; cl.b3 = [...this.b3];
        return cl;
      }

      toJSON() { return { W1: this.W1, b1: this.b1, W2: this.W2, b2: this.b2, W3: this.W3, b3: this.b3 }; }
      fromJSON(json) { this.W1 = json.W1; this.b1 = json.b1; this.W2 = json.W2; this.b2 = json.b2; this.W3 = json.W3; this.b3 = json.b3; }
    }

    // === CONFIGURATION ===
    const CONFIG = {
      RANGE: 55,
      JUST_DEFEND_WINDOW: 180,
      BLOCK_COOLDOWN: 400,
      COMBO_WINDOW: 800,
      JUMP_FORCE: -12,
      GRAVITY: 0.6,
      DASH_SPEED: 9,
      GROUND_Y: 320
    };

    // === ATTACK DATABASE ===
    const ATTACKS = {
      jab: { name: 'Jab', damage: 4, startup: 6, active: 3, recovery: 8, hitstun: 12, knockback: 2, level: 'high', move: 'hand' },
      straight: { name: 'Straight', damage: 7, startup: 10, active: 4, recovery: 12, hitstun: 16, knockback: 4, level: 'high', move: 'hand' },
      hook: { name: 'Hook', damage: 9, startup: 12, active: 5, recovery: 14, hitstun: 18, knockback: 5, level: 'mid', move: 'hand' },
      uppercut: { name: 'Uppercut', damage: 11, startup: 14, active: 5, recovery: 18, hitstun: 22, knockback: 3, level: 'mid', launch: true, move: 'hand' },
      lowKick: { name: 'Low Kick', damage: 5, startup: 10, active: 4, recovery: 12, hitstun: 14, knockback: 3, level: 'low', move: 'leg' },
      midKick: { name: 'Mid Kick', damage: 8, startup: 13, active: 5, recovery: 16, hitstun: 18, knockback: 6, level: 'mid', move: 'leg' },
      highKick: { name: 'High Kick', damage: 10, startup: 15, active: 6, recovery: 20, hitstun: 20, knockback: 7, level: 'high', move: 'leg' },
      sweep: { name: 'Sweep', damage: 4, startup: 14, active: 6, recovery: 18, hitstun: 25, knockback: 2, level: 'low', trip: true, move: 'leg' },
      spinKick: { name: 'Spin Kick', damage: 13, startup: 18, active: 8, recovery: 24, hitstun: 24, knockback: 10, level: 'mid', spin: true, move: 'leg' }
    };

    // === COMBO SEQUENCES (Restored) ===
    const COMBOS = {
      basic: ['jab', 'straight'],
      boxer: ['jab', 'jab', 'straight', 'hook'],
      kickboxer: ['lowKick', 'midKick', 'highKick'],
      finisher: ['jab', 'hook', 'uppercut'],
      heavy: ['straight', 'spinKick'],
      trip: ['lowKick', 'sweep']
    };

    // === AI STYLES (Restored) ===
    const AI_STYLES = {
      balanced: { preferredRange: [50, 90], comboChance: 0.4, whiffPunish: 0.5, defensiveReaction: 0.4 },
      aggressor: { preferredRange: [30, 60], comboChance: 0.6, whiffPunish: 0.3, defensiveReaction: 0.2 },
      counter: { preferredRange: [60, 100], comboChance: 0.5, whiffPunish: 0.8, defensiveReaction: 0.7 },
      combo: { preferredRange: [40, 70], comboChance: 0.85, whiffPunish: 0.4, defensiveReaction: 0.3 },
      defensive: { preferredRange: [70, 120], comboChance: 0.3, whiffPunish: 0.6, defensiveReaction: 0.8 }
    };

    // === NEURAL FIGHTER ===
    class NeuralFighter {
      constructor(x, facingRight, color, name, brain = null) {
        this.x = x;
        this.y = CONFIG.GROUND_Y;
        this.vx = 0;
        this.vy = 0;
        this.facingRight = facingRight;
        this.color = color;
        this.name = name;
        
        this.hp = 100;
        this.maxHp = 100;
        this.state = 'idle';
        this.grounded = true;
        
        this.currentAttack = null;
        this.attackFrame = 0;
        this.attackPhase = 'none';
        this.hasHit = false;
        
        this.blocking = false;
        this.blockTimer = 0;
        this.justDefended = false;
        this.blockCooldown = 0;
        
        this.hitstun = 0;
        this.invincible = 0;
        this.knockedDown = false;
        this.getUpTimer = 0;
        
        this.animFrame = 0;
        this.spinAngle = 0;
        
        this.brain = brain || new NeuralNetwork();
        this.actionTimer = 0;
        this.currentAction = 'idle';
        
        this.hitCount = 0;
        this.comboCount = 0;
        this.maxCombo = 0;
        this.lastHitTime = 0;
        this.damageDealt = 0;
        this.fightsWon = 0;
        this.fightsLost = 0;
        
        this.actionHistory = [0,0,0,0];
      }

      getSensors(opponent) {
        const dx = opponent.x - this.x;
        const dy = opponent.y - this.y;
        const dist = Math.abs(dx);
        
        const sensors = [
          this.hp / 100,                      // 1
          opponent.hp / 100,                  // 2
          this.x / 900,                       // 3
          opponent.x / 900,                   // 4
          (this.y - CONFIG.GROUND_Y) / 100,   // 5
          (opponent.y - CONFIG.GROUND_Y) / 100, // 6
          this.vx / 10,                       // 7
          this.vy / 10,                       // 8
          opponent.vx / 10,                   // 9
          opponent.vy / 10,                   // 10
          dist / 500,                         // 11
          Math.atan2(dy, dx) / Math.PI,       // 12
          this.facingRight ? 1 : 0,           // 13
          (opponent.x > this.x) === this.facingRight ? 1 : 0, // 14
          this.state === 'attacking' ? 1 : 0, // 15
          this.attackPhase === 'active' ? 1 : 0, // 16
          opponent.state === 'attacking' ? 1 : 0, // 17
          opponent.attackPhase === 'active' ? 1 : 0, // 18
          this.hitstun > 0 ? 1 : 0,           // 19
          opponent.hitstun > 0 ? 1 : 0,       // 20
          this.blocking ? 1 : 0,              // 21
          opponent.blocking ? 1 : 0,          // 22
          this.grounded ? 0 : 1,              // 23
          opponent.grounded ? 0 : 1,          // 24
          this.comboCount / 5,                // 25
          opponent.comboCount / 5,            // 26
          game.timer / 99,                    // 27
          this.actionHistory[0],              // 28
          this.actionHistory[1],              // 29
          this.actionHistory[2],              // 30
          this.actionHistory[3],              // 31
          Math.random()                       // 32
        ];
        
        return sensors;
      }

      update(opponent) {
        // Timers
        if (this.hitstun > 0) this.hitstun--;
        if (this.invincible > 0) this.invincible--;
        if (this.blockCooldown > 0) this.blockCooldown--;
        
        // Knocked down
        if (this.knockedDown) {
          this.getUpTimer--;
          if (this.getUpTimer <= 0) {
            this.knockedDown = false;
            this.state = 'idle';
          }
        }
        
        // Attack state machine
        if (this.state === 'attacking') {
          this.attackFrame++;
          const atk = ATTACKS[this.currentAttack];
          
          const totalFrames = atk.startup + atk.active + atk.recovery;
          
          if (this.attackFrame <= atk.startup) {
            this.attackPhase = 'startup';
          } else if (this.attackFrame <= atk.startup + atk.active) {
            this.attackPhase = 'active';
          } else {
            this.attackPhase = 'recovery';
            this.hasHit = false;
          }
          
          if (atk.spin) {
            const progress = this.attackFrame / totalFrames;
            this.spinAngle = progress * Math.PI * 2 * (this.facingRight ? 1 : -1);
          }
          
          if (this.attackFrame > totalFrames) {
            this.state = 'idle';
            this.currentAttack = null;
            this.attackPhase = 'none';
            this.spinAngle = 0;
          }
        }
        
        // Neural network control
        if (this.hitstun <= 0 && !this.knockedDown && this.state === 'idle') {
          this.runNeuralAI(opponent);
        }
        
        // Physics
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.88;
        
        if (!this.grounded) {
          this.vy += CONFIG.GRAVITY;
        }
        
        if (this.y >= CONFIG.GROUND_Y) {
          this.y = CONFIG.GROUND_Y;
          this.vy = 0;
          this.grounded = true;
        }
        
        // Collision with opponent
        this.resolveCollision(opponent);
        
        // Bounds
        this.x = Math.max(40, Math.min(860, this.x));
        
        // Face opponent
        if (this.state === 'idle' && this.hitstun <= 0 && !this.knockedDown) {
          this.facingRight = opponent.x > this.x;
        }
        
        // Animation
        this.animFrame++;
      }

      runNeuralAI(opponent) {
        this.actionTimer--;
        
        if (this.actionTimer <= 0) {
          const sensors = this.getSensors(opponent);
          const output = this.brain.forward(sensors);
          
          let maxIndex = 0;
          let maxValue = output[0];
          for (let i = 1; i < output.length; i++) {
            if (output[i] > maxValue) {
              maxValue = output[i];
              maxIndex = i;
            }
          }
          
          this.actionHistory.unshift(maxIndex / 12);
          this.actionHistory.pop();
          
          this.actionTimer = 5 + Math.floor(Math.random() * 10);
          this.executeDecision(maxIndex, opponent);
        }
      }

      executeDecision(index, opponent) {
        const attackKeys = Object.keys(ATTACKS);
        const dir = opponent.x > this.x ? 1 : -1;
        
        if (index < 9) {
          // Attack
          this.startAttack(attackKeys[index]);
        } else if (index === 9) {
          // Forward / Dash
          if (Math.abs(opponent.x - this.x) > 150) {
            this.vx = dir * CONFIG.DASH_SPEED; // Dash
          } else {
            this.vx = dir * 3; // Walk
          }
        } else if (index === 10) {
          // Back / Jump
          if (this.grounded) {
             this.vy = CONFIG.JUMP_FORCE;
             this.vx = -dir * 4;
          }
        } else if (index === 11) {
          // Block / Parry
          if (this.blockCooldown <= 0) {
            this.blocking = true;
            this.blockTimer = 0;
            this.justDefended = false;
            setTimeout(() => {
              if (!this.justDefended) {
                this.blocking = false;
                this.blockCooldown = CONFIG.BLOCK_COOLDOWN;
              }
            }, CONFIG.JUST_DEFEND_WINDOW);
          }
        }
      }

      startAttack(name) {
        const atk = ATTACKS[name];
        if (!atk) return;
        
        this.state = 'attacking';
        this.currentAttack = name;
        this.attackFrame = 0;
        this.attackPhase = 'startup';
        this.hasHit = false;
        this.vx *= 0.3;
        this.blocking = false;
        
        this.x += (this.facingRight ? 1 : -1) * 5;
      }

      getHitbox() {
        if (this.state !== 'attacking' || this.attackPhase !== 'active') return null;
        
        const atk = ATTACKS[this.currentAttack];
        const dir = this.facingRight ? 1 : -1;
        
        let y = this.y - 50;
        if (atk.level === 'high') y = this.y - 75;
        if (atk.level === 'low') y = this.y - 15;
        
        return {
          x: this.x + dir * CONFIG.RANGE,
          y: y,
          w: 30,
          h: 20
        };
      }

      getHurtbox() {
        return {
          x: this.x,
          y: this.y - 45,
          w: 35,
          h: 70
        };
      }

      resolveCollision(opponent) {
        const minDist = 45;
        const dx = opponent.x - this.x;
        const dist = Math.abs(dx);
        
        if (dist < minDist && dist > 0) {
          const overlap = minDist - dist;
          const push = dx > 0 ? -1 : 1;
          this.x += push * overlap * 0.5;
          opponent.x -= push * overlap * 0.5;
        }
      }

      takeHit(attacker, attack) {
        if (this.invincible > 0) return false;
        
        if (this.blocking && this.blockTimer < CONFIG.JUST_DEFEND_WINDOW && !this.justDefended) {
          this.justDefended = true;
          this.blocking = false;
          this.blockTimer = 0;
          
          spawnEffect('parry', this.x, this.y - 50, '#ffffff');
          shake(3, 5);
          this.invincible = 15;
          return false;
        }
        
        const dir = attacker.facingRight ? 1 : -1;
        this.hp = Math.max(0, this.hp - attack.damage);
        this.hitstun = attack.hitstun;
        this.invincible = 10;
        this.vx = dir * attack.knockback;
        
        if (attack.launch) {
          this.vy = -8;
          this.grounded = false;
        }
        
        if (attack.trip) {
          this.knockedDown = true;
          this.getUpTimer = 50;
          this.vx = dir * 5;
        }
        
        spawnParticles(this.x, this.y - 50, this.color, attack.damage > 8 ? 12 : 6);
        spawnEffect('hit', this.x, this.y - 50, this.color);
        
        if (attack.damage > 10) {
          shake(6, 10);
          game.slowmo = 8;
        }
        
        attacker.hitCount++;
        attacker.comboCount++;
        attacker.maxCombo = Math.max(attacker.maxCombo, attacker.comboCount);
        attacker.lastHitTime = game.frame;
        attacker.damageDealt += attack.damage;
        
        return true;
      }

      draw() {
        ctx.save();
        
        // Trail for dashing
        if (Math.abs(this.vx) > 5) {
          ctx.globalAlpha = 0.3;
          ctx.strokeStyle = this.color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(this.x, this.y - 50);
          ctx.lineTo(this.x - this.vx * 3, this.y - 50);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
        
        if (this.hitstun > 0 && Math.floor(this.hitstun / 3) % 2 === 0) {
          ctx.globalAlpha = 0.6;
        }
        if (this.invincible > 0 && Math.floor(this.invincible / 2) % 2 === 0) {
          ctx.globalAlpha = 0.4;
        }
        
        if (this.knockedDown) {
          this.drawKnockedDown();
          ctx.restore();
          return;
        }
        
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15;
        
        if (this.spinAngle !== 0) {
          ctx.translate(this.x, this.y - 50);
          ctx.rotate(this.spinAngle);
          ctx.translate(-this.x, -(this.y - 50));
        }
        
        const breathe = Math.sin(this.animFrame * 0.08) * 2;
        const crouch = this.blocking ? 15 : 0;
        
        // Head
        const headY = this.y - 80 + crouch + breathe;
        ctx.beginPath();
        ctx.arc(this.x, headY, 15, 0, Math.PI * 2);
        ctx.stroke();
        
        // Body
        ctx.beginPath();
        ctx.moveTo(this.x, headY + 15);
        ctx.lineTo(this.x, this.y - 25 + crouch);
        ctx.stroke();
        
        this.drawLimbs(crouch, breathe);
        
        if (this.blocking) {
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(this.x, this.y - 50, 35, 0, Math.PI * 2);
          ctx.stroke();
        }
        
        if (this.state === 'attacking' && this.attackPhase === 'active') {
          this.drawAttackEffect();
        }
        
        ctx.restore();
      }
      
      drawLimbs(crouch, breathe) {
        const dir = this.facingRight ? 1 : -1;
        const shoulderY = this.y - 70 + crouch;
        const hipY = this.y - 25 + crouch;
        
        if (this.state === 'attacking') {
          const atk = ATTACKS[this.currentAttack];
          const extend = this.attackPhase === 'active' ? 1 : (this.attackPhase === 'startup' ? 0.5 : 0.2);
          
          if (atk.move === 'hand') {
            let targetY = this.y - 55;
            if (atk.level === 'high') targetY = this.y - 75;
            if (atk.level === 'low') targetY = this.y - 30;
            
            ctx.beginPath();
            ctx.moveTo(this.x, shoulderY);
            ctx.lineTo(this.x + dir * CONFIG.RANGE * extend, targetY);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(this.x, shoulderY);
            ctx.lineTo(this.x - dir * 15, shoulderY + 20);
            ctx.stroke();
          } else {
            ctx.beginPath();
            ctx.moveTo(this.x, shoulderY);
            ctx.lineTo(this.x - dir * 18, shoulderY + 18);
            ctx.lineTo(this.x - dir * 12, shoulderY + 30);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(this.x, shoulderY);
            ctx.lineTo(this.x + dir * 12, shoulderY + 20);
            ctx.stroke();
          }
          
          if (atk.move === 'leg') {
            let kickY = this.y - 50;
            if (atk.level === 'high') kickY = this.y - 70;
            if (atk.level === 'low') kickY = this.y - 10;
            
            ctx.beginPath();
            ctx.moveTo(this.x, hipY);
            ctx.lineTo(this.x + dir * CONFIG.RANGE * extend, kickY);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(this.x, hipY);
            ctx.lineTo(this.x - dir * 12, this.y);
            ctx.stroke();
          } else {
            ctx.beginPath();
            ctx.moveTo(this.x, hipY);
            ctx.lineTo(this.x - 10, this.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(this.x, hipY);
            ctx.lineTo(this.x + 10, this.y);
            ctx.stroke();
          }
        } else if (this.blocking) {
          ctx.beginPath();
          ctx.moveTo(this.x, shoulderY);
          ctx.lineTo(this.x + dir * 8, this.y - 60 + crouch);
          ctx.moveTo(this.x, shoulderY);
          ctx.lineTo(this.x - dir * 8, this.y - 60 + crouch);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(this.x, hipY);
          ctx.lineTo(this.x - 12, this.y);
          ctx.moveTo(this.x, hipY);
          ctx.lineTo(this.x + 12, this.y);
          ctx.stroke();
        } else {
          const sway = Math.sin(this.animFrame * 0.1) * 3;
          
          ctx.beginPath();
          ctx.moveTo(this.x, shoulderY);
          ctx.quadraticCurveTo(this.x + dir * 18 + sway, shoulderY + 15, this.x + dir * 12, shoulderY + 25);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(this.x, shoulderY);
          ctx.quadraticCurveTo(this.x - dir * 18 - sway, shoulderY + 15, this.x - dir * 12, shoulderY + 25);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(this.x, hipY);
          ctx.lineTo(this.x - 10 - sway, this.y);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(this.x, hipY);
          ctx.lineTo(this.x + 10 + sway, this.y);
          ctx.stroke();
        }
      }

      drawAttackEffect() {
        const atk = ATTACKS[this.currentAttack];
        if (!atk) return;
        
        ctx.globalAlpha = 0.5 + Math.random() * 0.2;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3;
        ctx.shadowBlur = 25;
        ctx.shadowColor = '#ffffff';
        
        ctx.beginPath();
        ctx.arc(this.x, this.y - 50, CONFIG.RANGE, 
          this.facingRight ? -0.5 : Math.PI + 0.5,
          this.facingRight ? 0.5 : Math.PI - 0.5
        );
        ctx.stroke();
        
        ctx.globalAlpha = 1;
      }

      drawKnockedDown() {
        const dir = this.facingRight ? 1 : -1;
        
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 4;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15;
        
        ctx.translate(this.x + dir * 10, this.y - 20);
        ctx.rotate(dir * 0.3);
        
        ctx.beginPath();
        ctx.arc(dir * 25, -5, 14, 0, Math.PI * 2);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(dir * 11, -5);
        ctx.lineTo(-dir * 25, 5);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(dir * 5, 0);
        ctx.lineTo(dir * 20, 18);
        ctx.moveTo(-dir * 15, 5);
        ctx.lineTo(-dir * 30, 20);
        ctx.moveTo(dir * 5, -10);
        ctx.lineTo(dir * 22, -15);
        ctx.moveTo(-dir * 12, -2);
        ctx.lineTo(-dir * 28, -18);
        ctx.stroke();
      }
    }

    // === CLASSIC FIGHTER (Restored Full Logic) ===
    class ClassicFighter {
      constructor(x, facingRight, color, name, style, aggression) {
        this.x = x;
        this.y = CONFIG.GROUND_Y;
        this.vx = 0;
        this.vy = 0;
        this.facingRight = facingRight;
        this.color = color;
        this.name = name;
        
        this.hp = 100;
        this.maxHp = 100;
        this.state = 'idle';
        this.grounded = true;
        
        this.currentAttack = null;
        this.attackFrame = 0;
        this.attackPhase = 'none';
        this.hasHit = false;
        
        this.blocking = false;
        this.blockTimer = 0;
        this.justDefended = false;
        this.blockCooldown = 0;
        
        this.hitstun = 0;
        this.invincible = 0;
        this.knockedDown = false;
        this.getUpTimer = 0;
        
        this.animFrame = 0;
        this.spinAngle = 0;
        
        // AI Logic
        this.aiStyle = AI_STYLES[style];
        this.aiAggression = parseFloat(aggression);
        this.aiThinkTimer = 0;
        this.aiAction = null;
        this.currentCombo = null;
        this.comboStep = 0;
        this.whiffDetected = false;
        this.lastOpponentState = 'idle';
        
        this.hitCount = 0;
        this.comboCount = 0;
        this.maxCombo = 0;
        this.lastHitTime = 0;
        this.damageDealt = 0;
        this.fightsWon = 0;
        this.fightsLost = 0;
      }

      update(opponent) {
        // Timers
        if (this.hitstun > 0) this.hitstun--;
        if (this.invincible > 0) this.invincible--;
        if (this.blockCooldown > 0) this.blockCooldown--;
        
        // Knocked down
        if (this.knockedDown) {
          this.getUpTimer--;
          if (this.getUpTimer <= 0) {
            this.knockedDown = false;
            this.state = 'idle';
          }
        }
        
        // Attack state machine
        if (this.state === 'attacking') {
          this.attackFrame++;
          const atk = ATTACKS[this.currentAttack];
          
          const totalFrames = atk.startup + atk.active + atk.recovery;
          
          if (this.attackFrame <= atk.startup) {
            this.attackPhase = 'startup';
          } else if (this.attackFrame <= atk.startup + atk.active) {
            this.attackPhase = 'active';
          } else {
            this.attackPhase = 'recovery';
            this.hasHit = false;
          }
          
          if (atk.spin) {
            const progress = this.attackFrame / totalFrames;
            this.spinAngle = progress * Math.PI * 2 * (this.facingRight ? 1 : -1);
          }
          
          if (this.attackFrame > totalFrames) {
            this.state = 'idle';
            this.currentAttack = null;
            this.attackPhase = 'none';
            this.spinAngle = 0;
          }
        }
        
        // Combo continuation
        if (this.currentCombo && this.state === 'idle') {
          if (this.comboStep < this.currentCombo.length) {
            const nextAttack = this.currentCombo[this.comboStep];
            this.startAttack(nextAttack);
            this.comboStep++;
          } else {
            this.currentCombo = null;
            this.comboStep = 0;
          }
        }
        
        // AI control
        if (this.hitstun <= 0 && !this.knockedDown && this.state === 'idle') {
          this.runAI(opponent);
        }
        
        // Physics
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.88;
        
        if (!this.grounded) {
          this.vy += CONFIG.GRAVITY;
        }
        
        if (this.y >= CONFIG.GROUND_Y) {
          this.y = CONFIG.GROUND_Y;
          this.vy = 0;
          this.grounded = true;
        }
        
        this.resolveCollision(opponent);
        
        this.x = Math.max(40, Math.min(860, this.x));
        
        if (this.state === 'idle' && this.hitstun <= 0 && !this.knockedDown) {
          this.facingRight = opponent.x > this.x;
        }
        
        this.animFrame++;
      }

      resolveCollision(opponent) {
        const minDist = 45;
        const dx = opponent.x - this.x;
        const dist = Math.abs(dx);
        
        if (dist < minDist && dist > 0) {
          const overlap = minDist - dist;
          const push = dx > 0 ? -1 : 1;
          this.x += push * overlap * 0.5;
          opponent.x -= push * overlap * 0.5;
        }
      }

      runAI(opponent) {
        this.aiThinkTimer--;
        
        // Detect opponent whiff
        if (opponent.state === 'attacking' && opponent.attackPhase === 'recovery') {
          if (this.lastOpponentState === 'active') {
            this.whiffDetected = true;
          }
        }
        this.lastOpponentState = opponent.attackPhase;
        
        if (this.aiThinkTimer <= 0) {
          this.aiThinkTimer = 3 + Math.floor(Math.random() * 4);
          
          const dist = Math.abs(this.x - opponent.x);
          const inRange = dist < CONFIG.RANGE + 15;
          const opponentAttacking = opponent.state === 'attacking' && opponent.attackPhase === 'active';
          const opponentRecovery = opponent.state === 'attacking' && opponent.attackPhase === 'recovery';
          
          let action = 'idle';
          
          // WHIFF PUNISH
          if (this.whiffDetected && opponentRecovery && Math.random() < this.aiStyle.whiffPunish) {
            action = 'punish';
            this.whiffDetected = false;
          }
          // REACTION TO ATTACK
          else if (opponentAttacking && Math.random() < this.aiStyle.defensiveReaction) {
            action = 'react';
          }
          // IN RANGE
          else if (inRange && this.hitstun <= 0) {
            if (Math.random() < this.aiAggression) {
              if (Math.random() < this.aiStyle.comboChance && !this.currentCombo) {
                action = 'startCombo';
              } else {
                action = 'attack';
              }
            } else if (Math.random() < 0.3) {
              action = 'backdash';
            }
          }
          // OUT OF RANGE
          else {
            const [minRange, maxRange] = this.aiStyle.preferredRange;
            
            if (dist < minRange) {
              action = Math.random() < 0.6 ? 'backdash' : 'attack';
            } else if (dist > maxRange) {
              action = Math.random() < 0.7 ? 'forward' : 'idle';
            } else {
              action = Math.random() < 0.3 ? 'forward' : 'idle';
            }
          }
          
          this.aiAction = action;
        }
        
        this.executeAIAction(opponent);
      }

      executeAIAction(opponent) {
        const moveSpeed = 3;
        const dir = opponent.x > this.x ? 1 : -1;
        
        switch (this.aiAction) {
          case 'forward':
            if (Math.abs(opponent.x - this.x) > 150 && this.grounded) {
                this.vx = dir * CONFIG.DASH_SPEED; // Dash if far
            } else {
                this.vx = dir * moveSpeed;
            }
            break;
            
          case 'backdash':
            if (this.grounded) {
                this.vx = -dir * moveSpeed * 1.2;
                // Jump back sometimes
                if (Math.random() < 0.3) this.vy = CONFIG.JUMP_FORCE;
            }
            break;
            
          case 'attack':
            this.pickSingleAttack(opponent);
            this.aiAction = null;
            break;
            
          case 'startCombo':
            this.startCombo();
            this.aiAction = null;
            break;
            
          case 'punish':
            this.startAttack('uppercut');
            this.aiAction = null;
            this.whiffDetected = false;
            break;
            
          case 'react':
            this.attemptJustDefend();
            this.aiAction = null;
            break;
        }
      }

      pickSingleAttack(opponent) {
        const attacks = ['jab', 'straight', 'hook', 'lowKick', 'midKick'];
        const attack = attacks[Math.floor(Math.random() * attacks.length)];
        this.startAttack(attack);
      }

      startCombo() {
        const comboNames = Object.keys(COMBOS);
        const combo = COMBOS[comboNames[Math.floor(Math.random() * comboNames.length)]];
        this.currentCombo = [...combo];
        this.comboStep = 0;
      }

      startAttack(name) {
        const atk = ATTACKS[name];
        if (!atk) return;
        
        this.state = 'attacking';
        this.currentAttack = name;
        this.attackFrame = 0;
        this.attackPhase = 'startup';
        this.hasHit = false;
        this.vx *= 0.3;
        this.blocking = false;
        
        this.x += (this.facingRight ? 1 : -1) * 5;
      }

      attemptJustDefend() {
        if (this.blockCooldown > 0) return;
        
        this.blocking = true;
        this.blockTimer = 0;
        this.justDefended = false;
        
        setTimeout(() => {
          if (!this.justDefended) {
            this.blocking = false;
            this.blockCooldown = CONFIG.BLOCK_COOLDOWN;
          }
        }, CONFIG.JUST_DEFEND_WINDOW);
      }

      getHitbox() {
        if (this.state !== 'attacking' || this.attackPhase !== 'active') return null;
        
        const atk = ATTACKS[this.currentAttack];
        const dir = this.facingRight ? 1 : -1;
        
        let y = this.y - 50;
        if (atk.level === 'high') y = this.y - 75;
        if (atk.level === 'low') y = this.y - 15;
        
        return {
          x: this.x + dir * CONFIG.RANGE,
          y: y,
          w: 30,
          h: 20
        };
      }

      getHurtbox() {
        return {
          x: this.x,
          y: this.y - 45,
          w: 35,
          h: 70
        };
      }

      takeHit(attacker, attack) {
        if (this.invincible > 0) return false;
        
        if (this.blocking && this.blockTimer < CONFIG.JUST_DEFEND_WINDOW && !this.justDefended) {
          this.justDefended = true;
          this.blocking = false;
          this.blockTimer = 0;
          
          spawnEffect('parry', this.x, this.y - 50, '#ffffff');
          shake(3, 5);
          this.invincible = 15;
          return false;
        }
        
        const dir = attacker.facingRight ? 1 : -1;
        this.hp = Math.max(0, this.hp - attack.damage);
        this.hitstun = attack.hitstun;
        this.invincible = 10;
        this.vx = dir * attack.knockback;
        
        if (attack.launch) {
          this.vy = -8;
          this.grounded = false;
        }
        
        if (attack.trip) {
          this.knockedDown = true;
          this.getUpTimer = 50;
          this.vx = dir * 5;
        }
        
        spawnParticles(this.x, this.y - 50, this.color, attack.damage > 8 ? 12 : 6);
        spawnEffect('hit', this.x, this.y - 50, this.color);
        
        if (attack.damage > 10) {
          shake(6, 10);
          game.slowmo = 8;
        }
        
        attacker.hitCount++;
        attacker.comboCount++;
        attacker.maxCombo = Math.max(attacker.maxCombo, attacker.comboCount);
        attacker.lastHitTime = game.frame;
        attacker.damageDealt += attack.damage;
        
        return true;
      }

      draw() {
        ctx.save();
        
        if (this.hitstun > 0 && Math.floor(this.hitstun / 3) % 2 === 0) {
          ctx.globalAlpha = 0.6;
        }
        if (this.invincible > 0 && Math.floor(this.invincible / 2) % 2 === 0) {
          ctx.globalAlpha = 0.4;
        }
        
        if (this.knockedDown) {
          this.drawKnockedDown();
          ctx.restore();
          return;
        }
        
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15;
        
        if (this.spinAngle !== 0) {
          ctx.translate(this.x, this.y - 50);
          ctx.rotate(this.spinAngle);
          ctx.translate(-this.x, -(this.y - 50));
        }
        
        const breathe = Math.sin(this.animFrame * 0.08) * 2;
        const crouch = this.blocking ? 15 : 0;
        
        const headY = this.y - 80 + crouch + breathe;
        ctx.beginPath();
        ctx.arc(this.x, headY, 15, 0, Math.PI * 2);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(this.x, headY + 15);
        ctx.lineTo(this.x, this.y - 25 + crouch);
        ctx.stroke();
        
        this.drawLimbs(crouch, breathe);
        
        if (this.blocking) {
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(this.x, this.y - 50, 35, 0, Math.PI * 2);
          ctx.stroke();
        }
        
        if (this.state === 'attacking' && this.attackPhase === 'active') {
          this.drawAttackEffect();
        }
        
        ctx.restore();
      }
      
      drawLimbs(crouch, breathe) {
        const dir = this.facingRight ? 1 : -1;
        const shoulderY = this.y - 70 + crouch;
        const hipY = this.y - 25 + crouch;
        
        if (this.state === 'attacking') {
          const atk = ATTACKS[this.currentAttack];
          const extend = this.attackPhase === 'active' ? 1 : (this.attackPhase === 'startup' ? 0.5 : 0.2);
          
          if (atk.move === 'hand') {
            let targetY = this.y - 55;
            if (atk.level === 'high') targetY = this.y - 75;
            if (atk.level === 'low') targetY = this.y - 30;
            
            ctx.beginPath();
            ctx.moveTo(this.x, shoulderY);
            ctx.lineTo(this.x + dir * CONFIG.RANGE * extend, targetY);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(this.x, shoulderY);
            ctx.lineTo(this.x - dir * 15, shoulderY + 20);
            ctx.stroke();
          } else {
            ctx.beginPath();
            ctx.moveTo(this.x, shoulderY);
            ctx.lineTo(this.x - dir * 18, shoulderY + 18);
            ctx.lineTo(this.x - dir * 12, shoulderY + 30);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(this.x, shoulderY);
            ctx.lineTo(this.x + dir * 12, shoulderY + 20);
            ctx.stroke();
          }
          
          if (atk.move === 'leg') {
            let kickY = this.y - 50;
            if (atk.level === 'high') kickY = this.y - 70;
            if (atk.level === 'low') kickY = this.y - 10;
            
            ctx.beginPath();
            ctx.moveTo(this.x, hipY);
            ctx.lineTo(this.x + dir * CONFIG.RANGE * extend, kickY);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(this.x, hipY);
            ctx.lineTo(this.x - dir * 12, this.y);
            ctx.stroke();
          } else {
            ctx.beginPath();
            ctx.moveTo(this.x, hipY);
            ctx.lineTo(this.x - 10, this.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(this.x, hipY);
            ctx.lineTo(this.x + 10, this.y);
            ctx.stroke();
          }
        } else if (this.blocking) {
          ctx.beginPath();
          ctx.moveTo(this.x, shoulderY);
          ctx.lineTo(this.x + dir * 8, this.y - 60 + crouch);
          ctx.moveTo(this.x, shoulderY);
          ctx.lineTo(this.x - dir * 8, this.y - 60 + crouch);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(this.x, hipY);
          ctx.lineTo(this.x - 12, this.y);
          ctx.moveTo(this.x, hipY);
          ctx.lineTo(this.x + 12, this.y);
          ctx.stroke();
        } else {
          const sway = Math.sin(this.animFrame * 0.1) * 3;
          
          ctx.beginPath();
          ctx.moveTo(this.x, shoulderY);
          ctx.quadraticCurveTo(this.x + dir * 18 + sway, shoulderY + 15, this.x + dir * 12, shoulderY + 25);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(this.x, shoulderY);
          ctx.quadraticCurveTo(this.x - dir * 18 - sway, shoulderY + 15, this.x - dir * 12, shoulderY + 25);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(this.x, hipY);
          ctx.lineTo(this.x - 10 - sway, this.y);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(this.x, hipY);
          ctx.lineTo(this.x + 10 + sway, this.y);
          ctx.stroke();
        }
      }

      drawAttackEffect() {
        const atk = ATTACKS[this.currentAttack];
        if (!atk) return;
        
        ctx.globalAlpha = 0.5 + Math.random() * 0.2;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3;
        ctx.shadowBlur = 25;
        ctx.shadowColor = '#ffffff';
        
        ctx.beginPath();
        ctx.arc(this.x, this.y - 50, CONFIG.RANGE, 
          this.facingRight ? -0.5 : Math.PI + 0.5,
          this.facingRight ? 0.5 : Math.PI - 0.5
        );
        ctx.stroke();
        
        ctx.globalAlpha = 1;
      }

      drawKnockedDown() {
        const dir = this.facingRight ? 1 : -1;
        
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 4;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15;
        
        ctx.translate(this.x + dir * 10, this.y - 20);
        ctx.rotate(dir * 0.3);
        
        ctx.beginPath();
        ctx.arc(dir * 25, -5, 14, 0, Math.PI * 2);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(dir * 11, -5);
        ctx.lineTo(-dir * 25, 5);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(dir * 5, 0);
        ctx.lineTo(dir * 20, 18);
        ctx.moveTo(-dir * 15, 5);
        ctx.lineTo(-dir * 30, 20);
        ctx.moveTo(dir * 5, -10);
        ctx.lineTo(dir * 22, -15);
        ctx.moveTo(-dir * 12, -2);
        ctx.lineTo(-dir * 28, -18);
        ctx.stroke();
      }
    }

    // === GAME STATE ===
    const game = {
      running: false,
      timer: 99,
      round: 1,
      frame: 0,
      slowmo: 0,
      shake: { x: 0, y: 0, time: 0 }
    };

    const particles = [];
    const effects = [];

    // === TOURNAMENT SYSTEM ===
    class Tournament {
      constructor() {
        this.fighters = [];
        this.generation = 1;
        this.populationSize = 8;
        this.champions = [];
        
        this.loadFromStorage();
        if(this.fighters.length === 0) this.initPopulation();
      }

      initPopulation() {
        this.fighters = [];
        for (let i = 0; i < this.populationSize; i++) {
          const brain = new NeuralNetwork();
          const fighter = {
            id: i,
            name: `Neural #${i + 1}`,
            brain: brain,
            wins: 0,
            losses: 0,
            damageDealt: 0,
            maxCombo: 0,
            generation: this.generation
          };
          this.fighters.push(fighter);
        }
        this.updateUI();
      }

      runTournament() {
        this.fighters.forEach(f => {
          f.wins = 0;
          f.losses = 0;
          f.damageDealt = 0;
          f.maxCombo = 0;
        });

        for (let i = 0; i < this.fighters.length; i++) {
          for (let j = i + 1; j < this.fighters.length; j++) {
            const result = this.simulateFight(this.fighters[i], this.fighters[j]);
            
            if (result.winner === i) {
              this.fighters[i].wins++;
              this.fighters[j].losses++;
            } else {
              this.fighters[j].wins++;
              this.fighters[i].losses++;
            }
            
            this.fighters[i].damageDealt += result.damage1;
            this.fighters[j].damageDealt += result.damage2;
            
            this.fighters[i].maxCombo = Math.max(this.fighters[i].maxCombo, result.combo1);
            this.fighters[j].maxCombo = Math.max(this.fighters[j].maxCombo, result.combo2);
          }
        }

        this.fighters.sort((a, b) => b.wins - a.wins);
        
        if (this.fighters.length > 0) {
          this.champions.push({
            name: this.fighters[0].name,
            wins: this.fighters[0].wins,
            generation: this.generation
          });
        }
        
        this.evolve();
        return this.fighters;
      }

      simulateFight(f1, f2) {
        const fighter1 = new NeuralFighter(250, true, '#ff3355', f1.name, f1.brain.clone());
        const fighter2 = new NeuralFighter(650, false, '#33ccff', f2.name, f2.brain.clone());
        
        let damage1 = 0;
        let damage2 = 0;
        let combo1 = 0;
        let combo2 = 0;
        
        for (let i = 0; i < 600; i++) {
          fighter1.update(fighter2);
          fighter2.update(fighter1);
          
          if (checkHit(fighter1, fighter2)) {
            if (fighter2.takeHit(fighter1, ATTACKS[fighter1.currentAttack])) {
              fighter1.hasHit = true;
              damage1 += ATTACKS[fighter1.currentAttack].damage;
              combo1 = Math.max(combo1, fighter1.comboCount);
            }
          }
          
          if (checkHit(fighter2, fighter1)) {
            if (fighter1.takeHit(fighter2, ATTACKS[fighter2.currentAttack])) {
              fighter2.hasHit = true;
              damage2 += ATTACKS[fighter2.currentAttack].damage;
              combo2 = Math.max(combo2, fighter2.comboCount);
            }
          }
        }
        
        const winner = damage1 > damage2 ? 0 : 1;
        
        return { winner, damage1, damage2, combo1, combo2 };
      }

      evolve() {
        const elite = this.fighters.slice(0, 2);
        const newFighters = [];
        
        elite.forEach(e => {
          newFighters.push({
            id: newFighters.length,
            name: `Elite #${e.id + 1}`,
            brain: e.brain.clone(),
            wins: 0,
            losses: 0,
            damageDealt: 0,
            maxCombo: 0,
            generation: this.generation + 1
          });
        });
        
        for (let i = 0; i < this.populationSize - 2; i++) {
          const parent1 = elite[Math.floor(Math.random() * elite.length)];
          const parent2 = elite[Math.floor(Math.random() * elite.length)];
          
          const childBrain = parent1.brain.crossover(parent2.brain);
          
          newFighters.push({
            id: newFighters.length,
            name: `Neural #${i + 3}`,
            brain: childBrain,
            wins: 0,
            losses: 0,
            damageDealt: 0,
            maxCombo: 0,
            generation: this.generation + 1
          });
        }
        
        this.fighters = newFighters;
        this.generation++;
        
        this.updateUI();
      }

      updateUI() {
        document.getElementById('genCount').textContent = this.generation;
        document.getElementById('fighterCount').textContent = this.fighters.length;
        
        let totalDamage = 0;
        let maxCombo = 0;
        this.fighters.forEach(f => {
          totalDamage += f.damageDealt;
          maxCombo = Math.max(maxCombo, f.maxCombo);
        });
        
        document.getElementById('avgDamage').textContent = Math.round(totalDamage / this.fighters.length);
        document.getElementById('globalMaxCombo').textContent = maxCombo;
        document.getElementById('generationInfo').textContent = `Generation #${this.generation} - Elite ${this.fighters.length}`;
        
        const list = document.getElementById('fighterList');
        list.innerHTML = '';
        
        this.fighters.forEach((f, index) => {
          const div = document.createElement('div');
          div.className = 'fighter-entry' + (index < 2 ? ' selected' : '');
          div.innerHTML = `
            <div class="fighter-info">
              <span class="fighter-name">${f.name}</span>
              <div class="fighter-stats">
                <span>W:${f.wins}</span>
                <span>L:${f.losses}</span>
                <span>⚔️${f.damageDealt}</span>
              </div>
            </div>
            <div class="fighter-score">${f.wins * 100}</div>
          `;
          list.appendChild(div);
        });
        
        this.updateNeuralSelect();
      }

      updateNeuralSelect() {
        const select1 = document.getElementById('neuralFighter1');
        const select2 = document.getElementById('neuralFighter2');
        
        select1.innerHTML = '';
        select2.innerHTML = '';
        
        this.fighters.forEach((f, index) => {
          const option1 = document.createElement('option');
          option1.value = index;
          option1.textContent = `${f.name} (W:${f.wins})`;
          select1.appendChild(option1);
          
          const option2 = document.createElement('option');
          option2.value = index;
          option2.textContent = `${f.name} (W:${f.wins})`;
          select2.appendChild(option2);
        });
      }

      saveToStorage() {
        const data = {
          generation: this.generation,
          fighters: this.fighters.map(f => ({
            name: f.name,
            brain: f.brain.toJSON(),
            wins: f.wins,
            generation: f.generation
          })),
          champions: this.champions
        };
        localStorage.setItem('neuralTournament', JSON.stringify(data));
      }

      loadFromStorage() {
        const data = localStorage.getItem('neuralTournament');
        if (data) {
          const parsed = JSON.parse(data);
          this.generation = parsed.generation;
          this.champions = parsed.champions || [];
          
          this.fighters = parsed.fighters.map((f, i) => {
            const brain = new NeuralNetwork();
            brain.fromJSON(f.brain);
            return {
              id: i,
              name: f.name,
              brain: brain,
              wins: f.wins,
              losses: 0,
              damageDealt: 0,
              maxCombo: 0,
              generation: f.generation
            };
          });
          
          this.updateUI();
        }
      }
    }

    // === EFFECTS (Restored) ===
    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 5;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 3,
          life: 1,
          color,
          size: 3 + Math.random() * 4
        });
      }
    }

    function spawnEffect(type, x, y, color) {
      effects.push({ type, x, y, life: 1, color });
    }

    function shake(intensity, duration) {
      game.shake = { x: intensity, y: intensity, time: duration };
    }

    function updateEffects() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2;
        p.life -= 0.03;
        if (p.life <= 0) particles.splice(i, 1);
      }
      
      for (let i = effects.length - 1; i >= 0; i--) {
        effects[i].life -= 0.05;
        if (effects[i].life <= 0) effects.splice(i, 1);
      }
      
      if (game.shake.time > 0) {
        game.shake.time--;
        game.shake.x = (Math.random() - 0.5) * game.shake.x;
        game.shake.y = (Math.random() - 0.5) * game.shake.y;
      }
    }

    function drawEffects() {
      for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      
      for (const e of effects) {
        ctx.globalAlpha = e.life;
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 3;
        
        if (e.type === 'hit') {
          const size = 40 + (1 - e.life) * 20;
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = (i / 6) * Math.PI * 2;
            const r = i % 2 === 0 ? size : size * 0.4;
            const px = e.x + Math.cos(a) * r;
            const py = e.y + Math.sin(a) * r;
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.stroke();
        } else if (e.type === 'parry') {
          ctx.beginPath();
          ctx.arc(e.x, e.y, 30 * (2 - e.life), 0, Math.PI * 2);
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;
    }

    // === BACKGROUND (Restored) ===
    function drawBackground() {
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, '#080812');
      grad.addColorStop(0.6, '#101020');
      grad.addColorStop(1, '#181830');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      for (let i = 0; i < 30; i++) {
        const x = (i * 31 + Math.sin(game.frame * 0.01 + i) * 2) % canvas.width;
        const y = (i * 19) % 180;
        ctx.fillRect(x, y, 1, 1);
      }
      
      ctx.fillStyle = '#ffffee';
      ctx.shadowColor = '#ffffee';
      ctx.shadowBlur = 40;
      ctx.beginPath();
      ctx.arc(780, 45, 28, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      ctx.fillStyle = '#0c0c18';
      ctx.beginPath();
      ctx.moveTo(0, 300);
      ctx.lineTo(200, 220);
      ctx.lineTo(400, 270);
      ctx.lineTo(600, 200);
      ctx.lineTo(800, 250);
      ctx.lineTo(900, 230);
      ctx.lineTo(900, 420);
      ctx.lineTo(0, 420);
      ctx.fill();
      
      ctx.fillStyle = '#141428';
      ctx.fillRect(0, 320, canvas.width, 100);
      
      ctx.strokeStyle = 'rgba(60,60,100,0.15)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 12; i++) {
        const y = 325 + i * 8;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    // === COLLISION ===
    function checkHit(attacker, defender) {
      if (attacker.state !== 'attacking' || attacker.attackPhase !== 'active') return false;
      if (attacker.hasHit) return false;
      
      const hitbox = attacker.getHitbox();
      const hurtbox = defender.getHurtbox();
      
      if (!hitbox || !hurtbox) return false;
      
      const dx = Math.abs(hitbox.x - hurtbox.x);
      const dy = Math.abs(hitbox.y - hurtbox.y);
      
      return dx < (hitbox.w + hurtbox.w) / 2 && dy < (hitbox.h + hurtbox.h) / 2;
    }

    // === UI ===
    function updateUI() {
      if (fighter1) document.getElementById('hp1').style.width = `${fighter1.hp}%`;
      if (fighter2) document.getElementById('hp2').style.width = `${fighter2.hp}%`;
      document.getElementById('timer').textContent = Math.ceil(game.timer);
      
      if (fighter1 && fighter1.comboCount > 2) showCombo(1, fighter1.comboCount, fighter1.color);
      if (fighter2 && fighter2.comboCount > 2) showCombo(2, fighter2.comboCount, fighter2.color);
    }

    function showCombo(side, count, color) {
      const el = document.getElementById('combo' + side);
      el.textContent = count + ' COMBO!';
      el.style.color = color;
      el.style.left = side === 1 ? '20%' : '80%';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 500);
    }

    function announce(text, type) {
      const el = document.getElementById('announce');
      const textEl = document.getElementById('announceText');
      textEl.textContent = text;
      textEl.className = 'announce-text ' + type;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1500);
    }

    function showResult(winner) {
      const screen = document.getElementById('resultScreen');
      const title = document.getElementById('resultTitle');
      
      title.textContent = winner.name.toUpperCase() + ' WINS';
      title.className = 'result-title ' + (winner.color === '#ff3355' ? 'red' : 'blue');
      
      document.getElementById('finalHits1').textContent = fighter1.hitCount;
      document.getElementById('maxCombo1').textContent = fighter1.maxCombo;
      document.getElementById('finalHits2').textContent = fighter2.hitCount;
      document.getElementById('maxCombo2').textContent = fighter2.maxCombo;
      
      tournament.updateUI();
      screen.classList.add('show');
    }

    // === GAME INIT ===
    let fighter1, fighter2;
    let f1Index = 0, f2Index = 1;
    let timerInterval;
    let tournament;

    tournament = new Tournament();

    function initGame() {
      const type1 = document.getElementById('fighterType1').value;
      const type2 = document.getElementById('fighterType2').value;
      
      if (type1 === 'neural') {
        f1Index = parseInt(document.getElementById('neuralFighter1').value) || 0;
        const neuralData = tournament.fighters[f1Index];
        const brain = neuralData.brain.clone();
        fighter1 = new NeuralFighter(250, true, '#ff3355', neuralData.name, brain);
        document.getElementById('fighterName1').textContent = neuralData.name;
        document.getElementById('tactic1').textContent = '🧠 Neural';
      } else {
        const style1 = document.getElementById('style1').value;
        const aggr1 = document.getElementById('aggression1').value;
        fighter1 = new ClassicFighter(250, true, '#ff3355', 'Scorpion', style1, aggr1);
        document.getElementById('fighterName1').textContent = 'Scorpion';
        document.getElementById('tactic1').textContent = style1.toUpperCase();
      }
      
      if (type2 === 'neural') {
        f2Index = parseInt(document.getElementById('neuralFighter2').value) || 1;
        const neuralData = tournament.fighters[f2Index];
        const brain = neuralData.brain.clone();
        fighter2 = new NeuralFighter(650, false, '#33ccff', neuralData.name, brain);
        document.getElementById('fighterName2').textContent = neuralData.name;
        document.getElementById('tactic2').textContent = '🧠 Neural';
      } else {
        const style2 = document.getElementById('style2').value;
        const aggr2 = document.getElementById('aggression2').value;
        fighter2 = new ClassicFighter(650, false, '#33ccff', 'Frost', style2, aggr2);
        document.getElementById('fighterName2').textContent = 'Frost';
        document.getElementById('tactic2').textContent = style2.toUpperCase();
      }
      
      game.running = false;
      game.timer = 99;
      game.frame = 0;
      
      particles.length = 0;
      effects.length = 0;
      
      document.getElementById('resultScreen').classList.remove('show');
      document.getElementById('hp1').style.width = '100%';
      document.getElementById('hp2').style.width = '100%';
    }

    function startFight() {
      initGame();
      
      document.getElementById('menuScreen').classList.add('hidden');
      
      setTimeout(() => announce('ROUND ' + game.round, 'fight'), 500);
      setTimeout(() => announce('FIGHT!', 'fight'), 1500);
      setTimeout(() => {
        game.running = true;
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          if (game.running && game.timer > 0) {
            game.timer -= 1;
            if (game.timer <= 0) {
              endRound(fighter1.hp >= fighter2.hp ? fighter1 : fighter2);
            }
          }
        }, 1000);
      }, 2000);
    }

    function endRound(winner) {
      game.running = false;
      if (timerInterval) clearInterval(timerInterval);
      
      setTimeout(() => announce('K.O.!', 'ko'), 300);
      setTimeout(() => showResult(winner), 1500);
    }

    // === GAME LOOP ===
    function gameLoop() {
      requestAnimationFrame(gameLoop);
      
      if (game.running) {
        if (game.slowmo > 0) {
          game.slowmo--;
          if (game.frame % 3 !== 0) return;
        }
        
        fighter1.update(fighter2);
        fighter2.update(fighter1);
        
        if (game.frame - fighter1.lastHitTime > CONFIG.COMBO_WINDOW / 16) fighter1.comboCount = 0;
        if (game.frame - fighter2.lastHitTime > CONFIG.COMBO_WINDOW / 16) fighter2.comboCount = 0;
        
        if (checkHit(fighter1, fighter2)) {
          if (fighter2.takeHit(fighter1, ATTACKS[fighter1.currentAttack])) {
            fighter1.hasHit = true;
          }
        }
        
        if (checkHit(fighter2, fighter1)) {
          if (fighter1.takeHit(fighter2, ATTACKS[fighter2.currentAttack])) {
            fighter2.hasHit = true;
          }
        }
        
        if (fighter1.hp <= 0 || fighter2.hp <= 0) {
          endRound(fighter1.hp <= 0 ? fighter2 : fighter1);
        }
        
        updateEffects();
        updateUI();
      }
      
      ctx.save();
      if (game.shake.time > 0) {
        ctx.translate(game.shake.x, game.shake.y);
      }
      
      drawBackground();
      drawEffects();
      
      const sorted = [fighter1, fighter2].sort((a, b) => a.y - b.y);
      sorted.forEach(f => f.draw());
      
      ctx.restore();
      
      game.frame++;
    }

    // === EVENT LISTENERS ===
    document.getElementById('startBtn').addEventListener('click', startFight);
    
    document.getElementById('rematchBtn').addEventListener('click', () => {
      game.round++;
      startFight();
    });
    
    document.getElementById('menuBtn').addEventListener('click', () => {
      game.round = 1;
      document.getElementById('menuScreen').classList.remove('hidden');
      document.getElementById('resultScreen').classList.remove('show');
    });

    document.getElementById('fighterType1').addEventListener('change', (e) => {
      const classic = document.getElementById('classicControls1');
      const neural = document.getElementById('neuralControls1');
      if (e.target.value === 'neural') {
        classic.style.display = 'none';
        neural.style.display = 'block';
      } else {
        classic.style.display = 'block';
        neural.style.display = 'none';
      }
    });

    document.getElementById('fighterType2').addEventListener('change', (e) => {
      const classic = document.getElementById('classicControls2');
      const neural = document.getElementById('neuralControls2');
      if (e.target.value === 'neural') {
        classic.style.display = 'none';
        neural.style.display = 'block';
      } else {
        classic.style.display = 'block';
        neural.style.display = 'none';
      }
    });

    document.getElementById('newGenBtn').addEventListener('click', () => {
      tournament.evolve();
    });

    document.getElementById('tournamentBtn').addEventListener('click', () => {
      tournament.runTournament();
      announce('TOURNAMENT COMPLETE!', 'fight');
    });

    document.getElementById('saveBrainsBtn').addEventListener('click', () => {
      tournament.saveToStorage();
      announce('CHAMPIONS SAVED!', 'fight');
    });

    // Start
    initGame();
    gameLoop();
  </script>
</body>
</html>
