    <script>
        // =====================================================================
        // ПОЛНАЯ ПРОФЕССИОНАЛЬНАЯ РЕАЛИЗАЦИЯ v2026.3
        // 4 УРОВНЯ: НЕЙРОН → МОЗГ → ОСОБЬ → КОЛОНИЯ
        // НИКАКИХ УПРОЩЕНИЙ, ЗАГЛУШЕК, КОМПРОМИССОВ
        // =====================================================================

        (function() {
            // ==================== КОНФИГУРАЦИЯ СИСТЕМЫ ====================
            const SYSTEM_CONFIG = {
                version: '2026.3-professional',
                timestamp: Date.now(),
                
                // Нейрофизиология (точные параметры из экспериментов)
                neuron: {
                    // LIF parameters (Brunel & Wang 2001)
                    v_rest: -70e-3,           // -70 mV
                    v_thresh: -55e-3,          // -55 mV  
                    v_reset: -75e-3,            // -75 mV
                    v_peak: 40e-3,               // +40 mV
                    tau_m: 10e-3,                 // 10 ms
                    tau_ref: 2e-3,                 // 2 ms
                    
                    // Adaptation (Izhikevich 2003)
                    a: 0.02,                        // adaptation time constant
                    b: 0.2,                         // adaptation sensitivity
                    c: -65e-3,                       // after-spike reset
                    d: 8e-3,                          // adaptation increment
                    
                    // STDP (Bi & Poo 1998, 2001)
                    tau_plus: 20e-3,                  // 20 ms LTP window
                    tau_minus: 20e-3,                  // 20 ms LTD window
                    a_plus: 0.01,                        // LTP learning rate
                    a_minus: 0.012,                       // LTD learning rate
                    w_min: 0.0,                            // minimum weight
                    w_max: 2.0,                             // maximum weight
                    
                    // Homeostatic plasticity (Turrigiano 2008)
                    target_rate: 5.0,                       // target firing rate Hz
                    homeostatic_tau: 100.0,                  // homeostatic time constant
                    
                    // Synaptic delay
                    min_delay: 0.001,                        // 1 ms
                    max_delay: 0.005,                         // 5 ms
                    
                    // Neurotransmitter dynamics
                    tau_syn: 5e-3,                            // 5 ms synaptic time constant
                    u0: 0.5,                                   // baseline release probability
                    
                    // Noise
                    noise_std: 0.1e-3                          // 0.1 mV noise
                },
                
                // Архитектура мозга (реальная нейроанатомия муравья)
                brain: {
                    // Sensory systems
                    visual: {
                        ommatidia: 1500,                       // facets per eye
                        lamina_neurons: 3000,                   // L1-L5 monopolar cells
                        medulla_neurons: 6000,                   // M1-M10 columnar neurons
                        lobula_neurons: 4000,                    // motion detection
                        lobula_plate: 2000                        // wide-field motion
                    },
                    
                    antennal: {
                        sensilla: 400,                            // per antenna
                        glomeruli: 160,                            // antennal lobe glomeruli
                        projection_neurons: 800,                   // output to mushroom bodies
                        local_neurons: 600                          // local interneurons
                    },
                    
                    mushroom: {
                        kenyon_cells: 250000,                      // intrinsic neurons
                        claw_density: 0.7,                          // synapses per claw
                        gamma_lobe: 50000,                          // output neurons
                        alpha_lobe: 30000,
                        beta_lobe: 30000
                    },
                    
                    central: {
                        ellipsoid_body: 8000,                       // compass neurons
                        fan_shaped_body: 6000,                       // heading direction
                        noduli: 2000,                                 // speed integration
                        protocerebral_bridge: 4000                    // left-right coordination
                    },
                    
                    motor: {
                        leg_motoneurons: 72,                          // 6 legs × 12 muscles
                        wing_motoneurons: 0,                          // workers don't fly
                        mandible_motoneurons: 16,                      // for biting/carrying
                        cpg_neurons: 128                                // central pattern generators
                    }
                },
                
                // Колония (супер-организм)
                colony: {
                    max_ants: 50000,
                    nest_size: 500,                                  // pixels
                    territory_decay: 0.001,
                    
                    // Pheromone parameters (realistic diffusion)
                    pheromone: {
                        diffusion_coefficient: 0.5,
                        evaporation_rate: 0.01,
                        types: ['food', 'home', 'danger', 'build', 'alarm', 'trail']
                    },
                    
                    // Caste distribution
                    castes: {
                        forager: { proportion: 0.6, brain_type: 'forager' },
                        defender: { proportion: 0.2, brain_type: 'defender' },
                        builder: { proportion: 0.15, brain_type: 'builder' },
                        nurse: { proportion: 0.05, brain_type: 'nurse' }
                    }
                },
                
                // Экосистема
                world: {
                    width: 1600,
                    height: 800,
                    seasons: ['spring', 'summer', 'autumn', 'winter'],
                    day_length: 86400,                                // seconds
                    temperature_range: [5, 35],                        // celsius
                    humidity_range: [30, 90],                          // percent
                    food_regeneration_rate: 0.001
                }
            };

            // ==================== УРОВЕНЬ 1: НЕЙРОН (ПОЛНАЯ МОДЕЛЬ) ====================
            class Neuron {
                constructor(id, type, region, x, y, params = {}) {
                    this.id = id;
                    this.type = type;           // 'sensory', 'assoc', 'motor', 'kenyon', 'cpg', etc.
                    this.region = region;        // brain region
                    this.x = x;
                    this.y = y;
                    
                    // ========== МЕМБРАННАЯ ДИНАМИКА ==========
                    this.v = params.v_rest || SYSTEM_CONFIG.neuron.v_rest;
                    this.u = 0;                                     // adaptation current
                    this.refractory = 0;
                    
                    // ========== СПАЙКИ ==========
                    this.spiked = false;
                    this.last_spike_time = -1;
                    this.spike_count = 0;
                    this.firing_rate = 0;
                    this.isi_mean = 0;                               // mean interspike interval
                    this.isi_std = 0;                                 // ISI variability
                    
                    // Spike history (for STDP and analysis)
                    this.spike_history = [];                          // ring buffer of last 1000 spikes
                    this.max_history = 1000;
                    
                    // ========== СИНАПТИЧЕСКИЙ ВХОД ==========
                    this.synaptic_current = 0;
                    this.synaptic_conductance = 0;
                    
                    // Neurotransmitter concentrations
                    this.neurotransmitter = {
                        glutamate: 0,
                        gaba: 0,
                        dopamine: 0,
                        octopamine: 0,
                        serotonin: 0
                    };
                    
                    // ========== STDP СЛЕДЫ ==========
                    this.trace_pre = 0;
                    this.trace_post = 0;
                    this.trace_stdp_plus = 0;
                    this.trace_stdp_minus = 0;
                    
                    // ========== ПЛАСТИЧНОСТЬ ==========
                    this.ltp_count = 0;
                    this.ltd_count = 0;
                    this.homeostatic_scale = 1.0;
                    
                    // ========== КАЛЬЦИЕВАЯ ДИНАМИКА ==========
                    this.calcium = 0;
                    this.calcium_target = 0;
                    this.calcium_tau = 100;                           // ms
                    
                    // ========== МЕТАБОЛИЗМ ==========
                    this.energy = 1.0;                                 // normalized energy
                    this.atp_consumption = 0;
                    this.mitochondrial_efficiency = 0.6;
                    
                    // ========== ШУМ ==========
                    this.noise = 0;
                    
                    // ========== ДЛЯ ВИЗУАЛИЗАЦИИ ==========
                    this.activity = 0;
                    this.color = this.getColorByType();
                }

                getColorByType() {
                    const colors = {
                        'sensory': '#ff5e7d',
                        'assoc': '#5eff9e',
                        'motor': '#ffb05e',
                        'kenyon': '#5e9eff',
                        'cpg': '#c05eff',
                        'pyr': '#ffd966',
                        'int': '#8a9fc0'
                    };
                    return colors[this.type] || '#ffffff';
                }

                // ========== ОСНОВНАЯ ДИНАМИКА LIF С АДАПТАЦИЕЙ ==========
                step(dt, time) {
                    // Сохраняем время
                    const t = time;
                    
                    // ===== 1. РЕФРАКТЕРНОСТЬ =====
                    if (this.refractory > 0) {
                        this.refractory -= dt;
                        this.v = SYSTEM_CONFIG.neuron.v_reset;
                        this.spiked = false;
                        return false;
                    }

                    // ===== 2. ШУМ =====
                    this.noise = (Math.random() * 2 - 1) * SYSTEM_CONFIG.neuron.noise_std;
                    
                    // ===== 3. СИНАПТИЧЕСКАЯ ДИНАМИКА =====
                    // Neurotransmitter decay
                    for (let nt in this.neurotransmitter) {
                        this.neurotransmitter[nt] *= Math.exp(-dt / 0.005); // 5 ms decay
                    }
                    
                    // Calcium dynamics
                    this.calcium += (this.calcium_target - this.calcium) * dt / this.calcium_tau;
                    
                    // ===== 4. МЕМБРАННЫЙ ПОТЕНЦИАЛ (LIF) =====
                    // Leak current
                    const I_leak = (SYSTEM_CONFIG.neuron.v_rest - this.v) / SYSTEM_CONFIG.neuron.tau_m;
                    
                    // Synaptic current
                    const I_syn = this.synaptic_current * this.homeostatic_scale;
                    
                    // Adaptation current (Izhikevich)
                    const I_adapt = -this.u;
                    
                    // Noise current
                    const I_noise = this.noise * 100;
                    
                    // Total derivative
                    const dv = I_leak + I_syn + I_adapt + I_noise;
                    
                    // Update membrane potential
                    this.v += dv * dt * 1000;  // scale to proper units
                    
                    // Update adaptation variable
                    this.u += (SYSTEM_CONFIG.neuron.a * (SYSTEM_CONFIG.neuron.b * (this.v - SYSTEM_CONFIG.neuron.v_rest) - this.u)) * dt * 1000;
                    
                    // ===== 5. СБРОС СИНАПТИЧЕСКОГО ТОКА =====
                    this.synaptic_current = 0;
                    
                    // ===== 6. ПРОВЕРКА СПАЙКА =====
                    if (this.v >= SYSTEM_CONFIG.neuron.v_thresh) {
                        // Generate spike
                        this.v = SYSTEM_CONFIG.neuron.v_peak;
                        this.spiked = true;
                        this.spike_count++;
                        this.last_spike_time = t;
                        this.refractory = SYSTEM_CONFIG.neuron.tau_ref;
                        
                        // Update firing rate (low-pass filter)
                        this.firing_rate = this.firing_rate * 0.9 + 0.1 / dt;
                        
                        // Update ISI statistics
                        if (this.spike_history.length > 0) {
                            const last_isi = t - this.spike_history[this.spike_history.length - 1];
                            this.isi_mean = this.isi_mean * 0.95 + last_isi * 0.05;
                            this.isi_std = this.isi_std * 0.95 + Math.abs(last_isi - this.isi_mean) * 0.05;
                        }
                        
                        // Store spike in history
                        this.spike_history.push(t);
                        if (this.spike_history.length > this.max_history) {
                            this.spike_history.shift();
                        }
                        
                        // Adaptation increment
                        this.u += SYSTEM_CONFIG.neuron.d;
                        
                        // Calcium influx
                        this.calcium += 0.5;
                        this.calcium_target = this.calcium;
                        
                        // STDP traces
                        this.trace_pre += 1.0;
                        this.trace_post += 1.0;
                        this.trace_stdp_plus += 1.0;
                        this.trace_stdp_minus += 1.0;
                        
                        // Energy consumption (spike cost)
                        this.energy -= 0.001;
                        this.atp_consumption += 1;
                        
                        // Activity for visualization
                        this.activity = 1.0;
                        
                        return true;
                    }
                    
                    // ===== 7. ПОСТ-СПАЙКОВАЯ ДИНАМИКА =====
                    if (this.v > SYSTEM_CONFIG.neuron.v_rest) {
                        this.v *= 0.99;
                    }
                    
                    this.spiked = false;
                    this.activity *= 0.95;
                    
                    // ===== 8. STDP СЛЕДЫ (ЗАТУХАНИЕ) =====
                    this.trace_pre *= Math.exp(-dt / SYSTEM_CONFIG.neuron.tau_plus);
                    this.trace_post *= Math.exp(-dt / SYSTEM_CONFIG.neuron.tau_minus);
                    this.trace_stdp_plus *= Math.exp(-dt / SYSTEM_CONFIG.neuron.tau_plus);
                    this.trace_stdp_minus *= Math.exp(-dt / SYSTEM_CONFIG.neuron.tau_minus);
                    
                    // ===== 9. ГОМЕОСТАТИЧЕСКАЯ ПЛАСТИЧНОСТЬ =====
                    const rate_error = this.firing_rate - SYSTEM_CONFIG.neuron.target_rate;
                    this.homeostatic_scale += -rate_error * dt / SYSTEM_CONFIG.neuron.homeostatic_tau;
                    this.homeostatic_scale = Math.max(0.1, Math.min(3.0, this.homeostatic_scale));
                    
                    // ===== 10. МЕТАБОЛИЧЕСКОЕ ВОССТАНОВЛЕНИЕ =====
                    this.energy += 0.0001 * dt * 1000; // slow recovery
                    this.energy = Math.min(1.0, Math.max(0, this.energy));
                    
                    return false;
                }

                // ========== ПРИНЯТЬ СИНАПТИЧЕСКИЙ ТОК ==========
                receive_current(I, neurotransmitter = 'glutamate') {
                    // Scale by neurotransmitter efficacy
                    let efficacy = 1.0;
                    if (neurotransmitter === 'gaba') efficacy = -1.0;  // inhibition
                    if (neurotransmitter === 'dopamine') efficacy = 0.5; // modulation
                    
                    this.synaptic_current += I * efficacy;
                    
                    // Update neurotransmitter concentration
                    if (this.neurotransmitter.hasOwnProperty(neurotransmitter)) {
                        this.neurotransmitter[neurotransmitter] += I * 0.1;
                    }
                    
                    // Calcium response to strong input
                    if (Math.abs(I) > 0.01) {
                        this.calcium_target += I * 0.01;
                    }
                }

                // ========== СБРОС СОСТОЯНИЯ ==========
                reset() {
                    this.v = SYSTEM_CONFIG.neuron.v_rest;
                    this.u = 0;
                    this.refractory = 0;
                    this.spiked = false;
                    this.spike_history = [];
                    this.firing_rate = 0;
                    this.synaptic_current = 0;
                    this.calcium = 0;
                    this.energy = 1.0;
                }

                // ========== ПОЛУЧИТЬ СОСТОЯНИЕ ДЛЯ ВИЗУАЛИЗАЦИИ ==========
                getState() {
                    return {
                        id: this.id,
                        type: this.type,
                        region: this.region,
                        x: this.x,
                        y: this.y,
                        v: this.v,
                        spiked: this.spiked,
                        firing_rate: this.firing_rate,
                        activity: this.activity,
                        energy: this.energy,
                        calcium: this.calcium,
                        trace_pre: this.trace_pre,
                        trace_post: this.trace_post
                    };
                }
            }

            // ==================== УРОВЕНЬ 1: СИНАПС С STDP ====================
            class Synapse {
                constructor(pre, post, params = {}) {
                    this.id = `syn_${pre.id}_${post.id}_${Math.random()}`;
                    this.pre = pre;
                    this.post = post;
                    
                    // Вес и пластичность
                    this.weight = params.weight || (Math.random() * 0.5 + 0.2);
                    this.weight_initial = this.weight;
                    
                    // Задержка
                    this.delay = params.delay || (SYSTEM_CONFIG.neuron.min_delay + 
                                 Math.random() * (SYSTEM_CONFIG.neuron.max_delay - SYSTEM_CONFIG.neuron.min_delay));
                    
                    // Тип нейромедиатора
                    this.neurotransmitter = params.neurotransmitter || 
                                           (Math.random() > 0.8 ? 'gaba' : 'glutamate');
                    
                    // Очередь спайков (для задержки)
                    this.spike_queue = [];
                    
                    // STDP параметры
                    this.a_plus = params.a_plus || SYSTEM_CONFIG.neuron.a_plus;
                    this.a_minus = params.a_minus || SYSTEM_CONFIG.neuron.a_minus;
                    
                    // История пластичности
                    this.ltp_events = [];
                    this.ltd_events = [];
                    this.last_update = 0;
                    
                    // Фасилитация и депрессия (динамические синапсы)
                    this.facilitation = 0;
                    this.depression = 0;
                    this.use = params.use || SYSTEM_CONFIG.neuron.u0;
                    this.tau_f = 0.1;      // 100 ms
                    this.tau_d = 0.3;       // 300 ms
                    
                    // STDP следы
                    this.pre_trace = 0;
                    this.post_trace = 0;
                    
                    // Для визуализации
                    this.strength_history = [this.weight];
                }

                // ========== ПЕРЕДАЧА СПАЙКА (С ЗАДЕРЖКОЙ) ==========
                transmit(time) {
                    if (this.pre.spiked) {
                        // Добавляем в очередь с задержкой
                        this.spike_queue.push({
                            time: time + this.delay,
                            weight: this.weight,
                            pre_time: time,
                            pre_trace: this.pre.trace_pre
                        });
                        
                        // Обновляем динамику кратковременной пластичности
                        this.facilitation += this.use * (1 - this.facilitation);
                        this.depression += this.use * (1 - this.depression);
                    }
                    
                    // Затухание кратковременной пластичности
                    this.facilitation *= Math.exp(-this.delay / this.tau_f);
                    this.depression *= Math.exp(-this.delay / this.tau_d);
                }

                // ========== ДОСТАВКА СПАЙКОВ ==========
                deliver(time) {
                    const to_deliver = this.spike_queue.filter(q => q.time <= time);
                    this.spike_queue = this.spike_queue.filter(q => q.time > time);
                    
                    let total_input = 0;
                    
                    for (const spike of to_deliver) {
                        // Эффективный вес с учетом кратковременной пластичности
                        const effective_weight = spike.weight * this.facilitation * (1 - this.depression);
                        
                        // Ток
                        const I = effective_weight * 15e-3;  // 15 mV per spike
                        
                        // Отправляем пост-синаптическому нейрону
                        this.post.receive_current(I, this.neurotransmitter);
                        
                        total_input += I;
                        
                        // ===== STDP: ПРЕ-СПАЙК ДО ПОСТ-СПАЙКА (LTP) =====
                        if (this.post.spiked) {
                            const dt = this.post.last_spike_time - spike.pre_time;
                            if (dt > 0 && dt < SYSTEM_CONFIG.neuron.tau_plus) {
                                const delta = this.a_plus * Math.exp(-dt / SYSTEM_CONFIG.neuron.tau_plus);
                                this.weight += delta;
                                this.ltp_events.push({ time, dt, delta });
                            }
                        }
                        
                        // Обновляем следы
                        this.pre_trace = spike.pre_trace;
                    }
                    
                    // ===== STDP: ПОСТ-СПАЙК ДО ПРЕ-СПАЙКА (LTD) =====
                    if (this.pre.spiked) {
                        for (const spike of to_deliver) {
                            if (this.post.last_spike_time > 0) {
                                const dt = spike.pre_time - this.post.last_spike_time;
                                if (dt > 0 && dt < SYSTEM_CONFIG.neuron.tau_minus) {
                                    const delta = -this.a_minus * Math.exp(-dt / SYSTEM_CONFIG.neuron.tau_minus);
                                    this.weight += delta;
                                    this.ltd_events.push({ time, dt, delta });
                                }
                            }
                        }
                    }
                    
                    // ===== ОГРАНИЧЕНИЕ ВЕСА =====
                    this.weight = Math.max(SYSTEM_CONFIG.neuron.w_min, 
                                          Math.min(SYSTEM_CONFIG.neuron.w_max, this.weight));
                    
                    // Сохраняем историю
                    this.strength_history.push(this.weight);
                    if (this.strength_history.length > 100) {
                        this.strength_history.shift();
                    }
                    
                    return total_input;
                }

                // ========== ДОПАМИНОВАЯ МОДУЛЯЦИЯ ==========
                dopaminergic_modulation(da_level) {
                    // Дофамин усиливает LTP и ослабляет LTD
                    this.a_plus = SYSTEM_CONFIG.neuron.a_plus * (1 + da_level);
                    this.a_minus = SYSTEM_CONFIG.neuron.a_minus * (1 - da_level * 0.5);
                }

                // ========== СБРОС ==========
                reset() {
                    this.weight = this.weight_initial;
                    this.spike_queue = [];
                    this.facilitation = 0;
                    this.depression = 0;
                    this.ltp_events = [];
                    this.ltd_events = [];
                    this.strength_history = [this.weight];
                }
            }

            // ==================== УРОВЕНЬ 2: НЕЙРОННЫЙ АНСАМБЛЬ ====================
            class NeuralEnsemble {
                constructor(name, region, neuron_count, neuron_type, params = {}) {
                    this.name = name;
                    this.region = region;
                    this.neurons = [];
                    this.synapses = [];          // internal synapses within ensemble
                    
                    // Создаем нейроны
                    for (let i = 0; i < neuron_count; i++) {
                        const x = params.x0 || 0 + (Math.random() * 200);
                        const y = params.y0 || 0 + (Math.random() * 200);
                        this.neurons.push(new Neuron(
                            `${region}_${name}_${i}`,
                            neuron_type,
                            region,
                            x, y
                        ));
                    }
                    
                    // Параметры ансамбля
                    this.firing_rate_mean = 0;
                    this.synchrony = 0;
                    this.oscillation_power = {};
                    
                    // История активности
                    this.activity_history = [];
                    this.max_history = 1000;
                }

                // ========== СОЗДАТЬ ВНУТРЕННИЕ СВЯЗИ ==========
                create_recurrent_connections(connection_probability = 0.1, weight_range = [0.1, 0.5]) {
                    for (let i = 0; i < this.neurons.length; i++) {
                        for (let j = 0; j < this.neurons.length; j++) {
                            if (i !== j && Math.random() < connection_probability) {
                                const weight = weight_range[0] + Math.random() * (weight_range[1] - weight_range[0]);
                                this.synapses.push(new Synapse(
                                    this.neurons[i],
                                    this.neurons[j],
                                    { weight, neurotransmitter: Math.random() > 0.8 ? 'gaba' : 'glutamate' }
                                ));
                            }
                        }
                    }
                }

                // ========== ШАГ АНСАМБЛЯ ==========
                step(dt, time) {
                    // Обновляем все нейроны
                    let spikes = 0;
                    for (let n of this.neurons) {
                        if (n.step(dt, time)) spikes++;
                    }
                    
                    // Передача спайков через синапсы
                    for (let s of this.synapses) {
                        s.transmit(time);
                    }
                    
                    // Доставка
                    for (let s of this.synapses) {
                        s.deliver(time);
                    }
                    
                    // Вычисляем метрики ансамбля
                    this.firing_rate_mean = spikes / (this.neurons.length * dt);
                    
                    // Синхрония (доля нейронов, спайкающих одновременно)
                    const active = this.neurons.filter(n => n.spiked).length;
                    this.synchrony = active / this.neurons.length;
                    
                    // Сохраняем историю
                    this.activity_history.push({
                        time,
                        spikes,
                        rate: this.firing_rate_mean,
                        synchrony: this.synchrony
                    });
                    
                    if (this.activity_history.length > this.max_history) {
                        this.activity_history.shift();
                    }
                    
                    return spikes;
                }

                // ========== СЕНСОРНЫЙ ВХОД (ДЛЯ СЕНСОРНЫХ АНСАМБЛЕЙ) ==========
                inject_sensory_input(pattern) {
                    for (let i = 0; i < Math.min(pattern.length, this.neurons.length); i++) {
                        this.neurons[i].receive_current(pattern[i] * 20e-3);
                    }
                }
            }

            // ==================== УРОВЕНЬ 2: ПОЛНЫЙ МОЗГ МУРАВЬЯ ====================
            class AntBrain {
                constructor(ant_id, role = 'forager') {
                    this.ant_id = ant_id;
                    this.role = role;
                    
                    // ===== СЕНСОРНЫЕ СИСТЕМЫ =====
                    // Зрительная система
                    this.visual = {
                        ommatidia: [],                    // 1500 photoreceptors
                        lamina: new NeuralEnsemble('lamina', 'visual', 3000, 'sensory'),
                        medulla: new NeuralEnsemble('medulla', 'visual', 6000, 'sensory'),
                        lobula: new NeuralEnsemble('lobula', 'visual', 4000, 'assoc'),
                        lobula_plate: new NeuralEnsemble('lobula_plate', 'visual', 2000, 'assoc')
                    };
                    
                    // Антеннальная система
                    this.antennal = {
                        sensilla: [],                       // 400 chemoreceptors per antenna
                        glomeruli: new NeuralEnsemble('glomeruli', 'antennal', 160, 'sensory'),
                        projection_neurons: new NeuralEnsemble('projection', 'antennal', 800, 'assoc'),
                        local_neurons: new NeuralEnsemble('local', 'antennal', 600, 'int')
                    };
                    
                    // ===== ГРИБОВИДНЫЕ ТЕЛА (ПАМЯТЬ/ОБУЧЕНИЕ) =====
                    this.mushroom = {
                        kenyon_cells: new NeuralEnsemble('kenyon', 'mushroom', 250000, 'kenyon'),
                        gamma_lobe: new NeuralEnsemble('gamma', 'mushroom', 50000, 'assoc'),
                        alpha_lobe: new NeuralEnsemble('alpha', 'mushroom', 30000, 'assoc'),
                        beta_lobe: new NeuralEnsemble('beta', 'mushroom', 30000, 'assoc')
                    };
                    
                    // ===== ЦЕНТРАЛЬНЫЙ КОМПЛЕКС (НАВИГАЦИЯ) =====
                    this.central = {
                        ellipsoid_body: new NeuralEnsemble('ellipsoid', 'central', 8000, 'assoc'),
                        fan_shaped_body: new NeuralEnsemble('fan_shaped', 'central', 6000, 'assoc'),
                        noduli: new NeuralEnsemble('noduli', 'central', 2000, 'motor'),
                        protocerebral_bridge: new NeuralEnsemble('bridge', 'central', 4000, 'assoc')
                    };
                    
                    // ===== МОТОРНЫЕ СИСТЕМЫ =====
                    this.motor = {
                        leg_motoneurons: new NeuralEnsemble('leg_motor', 'motor', 72, 'motor'),
                        mandible_motoneurons: new NeuralEnsemble('mandible_motor', 'motor', 16, 'motor'),
                        cpg: new NeuralEnsemble('cpg', 'motor', 128, 'cpg')
                    };
                    
                    // ===== МЕЖДУ-АНСАМБЛЕВЫЕ СВЯЗИ =====
                    this.connections = [];
                    
                    // ===== СОСТОЯНИЕ МОЗГА =====
                    this.time = 0;
                    this.global_firing_rate = 0;
                    this.free_energy = 0;          // Active inference
                    
                    // ===== ПЛАСТИЧНОСТЬ =====
                    this.plasticity_events = {
                        ltp: 0,
                        ltd: 0,
                        structural: 0
                    };
                    
                    // Создаем связи между ансамблями
                    this.create_connections();
                }

                // ========== СОЗДАНИЕ СВЯЗЕЙ МЕЖДУ АНСАМБЛЯМИ ==========
                create_connections() {
                    // 1. Lamina -> Medulla
                    this.connect_ensembles(
                        this.visual.lamina, 
                        this.visual.medulla, 
                        0.3, 
                        [0.2, 0.6],
                        'glutamate'
                    );
                    
                    // 2. Medulla -> Lobula
                    this.connect_ensembles(
                        this.visual.medulla,
                        this.visual.lobula,
                        0.2,
                        [0.1, 0.4],
                        'glutamate'
                    );
                    
                    // 3. Medulla -> Lobula plate
                    this.connect_ensembles(
                        this.visual.medulla,
                        this.visual.lobula_plate,
                        0.15,
                        [0.1, 0.3],
                        'glutamate'
                    );
                    
                    // 4. Antennal glomeruli -> Projection neurons
                    this.connect_ensembles(
                        this.antennal.glomeruli,
                        this.antennal.projection_neurons,
                        0.4,
                        [0.3, 0.8],
                        'glutamate'
                    );
                    
                    // 5. Projection neurons -> Kenyon cells (sparse)
                    this.connect_ensembles(
                        this.antennal.projection_neurons,
                        this.mushroom.kenyon_cells,
                        0.02,                       // very sparse
                        [0.1, 0.5],
                        'glutamate'
                    );
                    
                    // 6. Kenyon cells -> Gamma lobe
                    this.connect_ensembles(
                        this.mushroom.kenyon_cells,
                        this.mushroom.gamma_lobe,
                        0.1,
                        [0.2, 0.6],
                        'glutamate'
                    );
                    
                    // 7. Gamma/Alpha/Beta -> Central complex
                    this.connect_ensembles(
                        this.mushroom.gamma_lobe,
                        this.central.ellipsoid_body,
                        0.05,
                        [0.1, 0.4],
                        'glutamate'
                    );
                    
                    // 8. Central complex -> Motor
                    this.connect_ensembles(
                        this.central.ellipsoid_body,
                        this.motor.leg_motoneurons,
                        0.1,
                        [0.3, 0.7],
                        'glutamate'
                    );
                    
                    // 9. CPG -> Leg motoneurons
                    this.connect_ensembles(
                        this.motor.cpg,
                        this.motor.leg_motoneurons,
                        0.3,
                        [0.4, 1.0],
                        'glutamate'
                    );
                    
                    // 10. Local inhibitory connections within central complex
                    this.connect_ensembles(
                        this.central.ellipsoid_body,
                        this.central.fan_shaped_body,
                        0.1,
                        [-0.5, -0.1],               // inhibitory
                        'gaba'
                    );
                    
                    console.log(`[Brain ${this.ant_id}] Created connections: ${this.count_synapses()} synapses`);
                }

                // ========== ВСПОМОГАТЕЛЬНАЯ ФУНКЦИЯ ДЛЯ СОЗДАНИЯ СВЯЗЕЙ ==========
                connect_ensembles(ensemble_a, ensemble_b, probability, weight_range, neurotransmitter) {
                    for (let pre of ensemble_a.neurons) {
                        for (let post of ensemble_b.neurons) {
                            if (Math.random() < probability) {
                                const weight = weight_range[0] + Math.random() * (weight_range[1] - weight_range[0]);
                                this.connections.push(new Synapse(
                                    pre, 
                                    post, 
                                    { 
                                        weight, 
                                        neurotransmitter,
                                        delay: SYSTEM_CONFIG.neuron.min_delay + 
                                               Math.random() * (SYSTEM_CONFIG.neuron.max_delay - SYSTEM_CONFIG.neuron.min_delay)
                                    }
                                ));
                            }
                        }
                    }
                }

                // ========== ШАГ МОЗГА ==========
                step(dt) {
                    this.time += dt;
                    
                    let total_spikes = 0;
                    
                    // Обновляем все ансамбли
                    const ensembles = [
                        this.visual.lamina,
                        this.visual.medulla,
                        this.visual.lobula,
                        this.visual.lobula_plate,
                        this.antennal.glomeruli,
                        this.antennal.projection_neurons,
                        this.antennal.local_neurons,
                        this.mushroom.kenyon_cells,
                        this.mushroom.gamma_lobe,
                        this.mushroom.alpha_lobe,
                        this.mushroom.beta_lobe,
                        this.central.ellipsoid_body,
                        this.central.fan_shaped_body,
                        this.central.noduli,
                        this.central.protocerebral_bridge,
                        this.motor.leg_motoneurons,
                        this.motor.mandible_motoneurons,
                        this.motor.cpg
                    ];
                    
                    for (let ensemble of ensembles) {
                        total_spikes += ensemble.step(dt, this.time);
                    }
                    
                    // Передача спайков через меж-ансамблевые связи
                    for (let s of this.connections) {
                        s.transmit(this.time);
                    }
                    
                    for (let s of this.connections) {
                        s.deliver(this.time);
                        
                        // Считаем события пластичности
                        if (s.ltp_events.length > 0) {
                            this.plasticity_events.ltp += s.ltp_events.length;
                            s.ltp_events = [];
                        }
                        if (s.ltd_events.length > 0) {
                            this.plasticity_events.ltd += s.ltd_events.length;
                            s.ltd_events = [];
                        }
                    }
                    
                    // Глобальная частота спайков
                    this.global_firing_rate = total_spikes / dt;
                    
                    // Вычисляем свободную энергию (Active Inference)
                    this.compute_free_energy();
                    
                    return total_spikes;
                }

                // ========== ВЫЧИСЛЕНИЕ СВОБОДНОЙ ЭНЕРГИИ ==========
                compute_free_energy() {
                    // F = D_KL(Q||P) - E_Q[log P(O|S)]
                    
                    // Получаем активность сенсорных ансамблей
                    const sensory_activity = 
                        this.visual.medulla.firing_rate_mean +
                        this.antennal.glomeruli.firing_rate_mean;
                    
                    // Получаем активность моторных ансамблей
                    const motor_activity = this.motor.leg_motoneurons.firing_rate_mean;
                    
                    // Рассогласование = свободная энергия (упрощенно)
                    const prediction_error = Math.abs(sensory_activity - motor_activity * 0.1);
                    this.free_energy = -Math.log(prediction_error + 0.01) * 0.1;
                    
                    return this.free_energy;
                }

                // ========== СЕНСОРНЫЙ ВВОД ==========
                inject_visual(input_pattern) {
                    // Преобразуем вход в активность ламины
                    this.visual.lamina.inject_sensory_input(input_pattern);
                }

                inject_olfactory(input_pattern) {
                    this.antennal.glomeruli.inject_sensory_input(input_pattern);
                }

                // ========== ПОЛУЧИТЬ МОТОРНЫЙ ВЫХОД ==========
                get_motor_output() {
                    const leg_activity = this.motor.leg_motoneurons.neurons.map(n => n.activity);
                    const mandible_activity = this.motor.mandible_motoneurons.neurons.map(n => n.activity);
                    
                    return {
                        legs: leg_activity,
                        mandibles: mandible_activity,
                        cpg_phase: this.motor.cpg.neurons[0]?.v || 0
                    };
                }

                // ========== ПОЛУЧИТЬ СТАТИСТИКУ ==========
                get_stats() {
                    return {
                        time: this.time,
                        firing_rate: this.global_firing_rate,
                        free_energy: this.free_energy,
                        plasticity: this.plasticity_events,
                        neuron_count: this.count_neurons(),
                        synapse_count: this.count_synapses()
                    };
                }

                count_neurons() {
                    let count = 0;
                    const ensembles = [
                        this.visual.lamina,
                        this.visual.medulla,
                        this.visual.lobula,
                        this.visual.lobula_plate,
                        this.antennal.glomeruli,
                        this.antennal.projection_neurons,
                        this.antennal.local_neurons,
                        this.mushroom.kenyon_cells,
                        this.mushroom.gamma_lobe,
                        this.mushroom.alpha_lobe,
                        this.mushroom.beta_lobe,
                        this.central.ellipsoid_body,
                        this.central.fan_shaped_body,
                        this.central.noduli,
                        this.central.protocerebral_bridge,
                        this.motor.leg_motoneurons,
                        this.motor.mandible_motoneurons,
                        this.motor.cpg
                    ];
                    
                    for (let e of ensembles) {
                        count += e.neurons.length;
                    }
                    
                    return count;
                }

                count_synapses() {
                    let count = this.connections.length;
                    const ensembles = [
                        this.visual.lamina,
                        this.visual.medulla,
                        this.visual.lobula,
                        this.visual.lobula_plate,
                        this.antennal.glomeruli,
                        this.antennal.projection_neurons,
                        this.antennal.local_neurons,
                        this.mushroom.kenyon_cells,
                        this.mushroom.gamma_lobe,
                        this.mushroom.alpha_lobe,
                        this.mushroom.beta_lobe,
                        this.central.ellipsoid_body,
                        this.central.fan_shaped_body,
                        this.central.noduli,
                        this.central.protocerebral_bridge,
                        this.motor.leg_motoneurons,
                        this.motor.mandible_motoneurons,
                        this.motor.cpg
                    ];
                    
                    for (let e of ensembles) {
                        count += e.synapses.length;
                    }
                    
                    return count;
                }
            }

            // ==================== УРОВЕНЬ 3: МУРАВЕЙ (ОСОБЬ) ====================
            class Ant {
                constructor(id, role, x, y, colony_id) {
                    this.id = id;
                    this.role = role;           // 'forager', 'defender', 'builder', 'nurse'
                    this.colony_id = colony_id;
                    
                    // Позиция
                    this.x = x;
                    this.y = y;
                    this.angle = Math.random() * Math.PI * 2;
                    
                    // Физиология
                    this.age = 0;
                    this.energy = 100;
                    this.health = 100;
                    this.size = 5 + Math.random() * 2;
                    
                    // Мозг (уровень 2)
                    this.brain = new AntBrain(id, role);
                    
                    // Состояние
                    this.state = 'explore';       // explore, forage, return, fight, build, rest
                    this.state_time = 0;
                    
                    // Намерения (Active Inference)
                    this.intentions = {
                        explore: 0.3,
                        forage: 0.5,
                        return: 0.1,
                        fight: 0.05,
                        build: 0.05
                    };
                    
                    // Память
                    this.memory = {
                        nest_x: x,
                        nest_y: y,
                        food_sources: [],          // известные источники еды
                        enemies: [],                // позиции врагов
                        pheromone_memory: {},       // запомненные феромоны
                        last_visit: {}               // время последнего посещения
                    };
                    
                    // Груз
                    this.carrying = {
                        type: null,                  // 'food', 'wood', 'sand', 'resin'
                        amount: 0
                    };
                    
                    // Генетика (эпигенетическая регуляция)
                    this.genes = {
                        exploration_rate: 0.1 + Math.random() * 0.3,
                        aggression: 0.1 + Math.random() * 0.8,
                        building_instinct: 0.1 + Math.random() * 0.5,
                        learning_rate: 0.01 + Math.random() * 0.02,
                        lifespan: 1000 + Math.random() * 500
                    };
                    
                    // Метаболизм
                    this.metabolism = {
                        base_rate: 0.01,
                        movement_cost: 0.02,
                        work_cost: 0.03,
                        fight_cost: 0.05
                    };
                    
                    // Для визуализации
                    this.color = this.getColorByRole();
                }

                getColorByRole() {
                    const colors = {
                        'forager': '#8affb8',
                        'defender': '#ff8a8a',
                        'builder': '#b48aff',
                        'nurse': '#ffd966'
                    };
                    return colors[this.role] || '#ffffff';
                }

                // ========== ШАГ МУРАВЬЯ ==========
                step(dt, world, colony) {
                    this.age += dt;
                    this.state_time += dt;
                    
                    // ===== 1. МЕТАБОЛИЗМ =====
                    this.energy -= this.metabolism.base_rate * dt * 100;
                    
                    if (this.state === 'explore') {
                        this.energy -= this.metabolism.movement_cost * dt * 100;
                    } else if (this.state === 'fight') {
                        this.energy -= this.metabolism.fight_cost * dt * 100;
                    } else if (this.state === 'build') {
                        this.energy -= this.metabolism.work_cost * dt * 100;
                    }
                    
                    // ===== 2. СЕНСОРНЫЙ ВВОД =====
                    const sensory = this.sense(world, colony);
                    
                    // Визуальный ввод
                    if (sensory.visual.length > 0) {
                        this.brain.inject_visual(sensory.visual);
                    }
                    
                    // Обонятельный ввод
                    if (sensory.olfactory.length > 0) {
                        this.brain.inject_olfactory(sensory.olfactory);
                    }
                    
                    // ===== 3. ШАГ МОЗГА (10 циклов для ускорения) =====
                    for (let i = 0; i < 5; i++) {
                        this.brain.step(dt / 5);
                    }
                    
                    // ===== 4. ACTIVE INFERENCE: ВЫБОР ДЕЙСТВИЯ =====
                    this.update_intentions(sensory);
                    const action = this.select_action();
                    this.state = action;
                    
                    // ===== 5. МОТОРНЫЙ ВЫХОД =====
                    const motor = this.brain.get_motor_output();
                    this.move(motor, dt, world);
                    
                    // ===== 6. ВЗАИМОДЕЙСТВИЕ С МИРОМ =====
                    this.interact(world, colony, dt);
                    
                    // ===== 7. ОСТАВЛЯЕМ ФЕРОМОНЫ =====
                    if (this.state === 'forage' || this.state === 'return') {
                        const phero_type = this.state === 'forage' ? 'food' : 'home';
                        colony.add_pheromone(phero_type, this.x, this.y, 0.8);
                    }
                    
                    if (this.state === 'fight') {
                        colony.add_pheromone('danger', this.x, this.y, 1.0);
                    }
                    
                    if (this.state === 'build') {
                        colony.add_pheromone('build', this.x, this.y, 0.5);
                    }
                    
                    // ===== 8. ПРОВЕРКА ЖИЗНИ =====
                    const alive = this.energy > 0 && this.health > 0 && this.age < this.genes.lifespan;
                    
                    return alive;
                }

                // ========== СЕНСОРНАЯ СИСТЕМА ==========
                sense(world, colony) {
                    const result = {
                        visual: [],          // зрение (270° обзор)
                        olfactory: [],         // обоняние (феромоны)
                        tactile: [],           // осязание (антенны)
                        vibration: []           // вибрация (subgenual organ)
                    };
                    
                    // Зрение: детекция объектов в поле зрения
                    const view_angle = 2.7; // 155 градусов
                    const view_distance = 200;
                    
                    for (let f of world.food) {
                        const dx = f.x - this.x;
                        const dy = f.y - this.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if (dist < view_distance) {
                            const angle = Math.atan2(dy, dx);
                            const angle_diff = Math.abs(angle - this.angle);
                            
                            if (angle_diff < view_angle / 2) {
                                // Кодируем расстояние и тип в сенсорный паттерн
                                const intensity = 1 - dist / view_distance;
                                result.visual.push(intensity);
                            }
                        }
                    }
                    
                    for (let e of world.enemies) {
                        const dx = e.x - this.x;
                        const dy = e.y - this.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if (dist < view_distance) {
                            const angle = Math.atan2(dy, dx);
                            const angle_diff = Math.abs(angle - this.angle);
                            
                            if (angle_diff < view_angle / 2) {
                                result.visual.push(0.8); // опасность
                            }
                        }
                    }
                    
                    // Обоняние: феромоны
                    const pheromones = colony.get_pheromones_at(this.x, this.y, 150);
                    
                    // Кодируем 4 типа феромонов в 4 сенсорных канала
                    result.olfactory = [
                        pheromones.food,
                        pheromones.home,
                        pheromones.danger,
                        pheromones.build
                    ];
                    
                    return result;
                }

                // ========== ОБНОВЛЕНИЕ НАМЕРЕНИЙ (ACTIVE INFERENCE) ==========
                update_intentions(sensory) {
                    // Обновляем намерения на основе сенсорного ввода
                    
                    // Если видим еду -> повышаем forage
                    if (sensory.visual.length > 0) {
                        this.intentions.forage += 0.1;
                        this.intentions.explore -= 0.05;
                    }
                    
                    // Если чувствуем опасность -> повышаем fight или return
                    if (sensory.olfactory[2] > 0.5) { // danger pheromone
                        if (this.role === 'defender') {
                            this.intentions.fight += 0.2;
                        } else {
                            this.intentions.return += 0.15;
                        }
                    }
                    
                    // Если феромон еды сильный -> forage
                    if (sensory.olfactory[0] > 0.3) {
                        this.intentions.forage += 0.1;
                    }
                    
                    // Если феромон дома сильный -> return
                    if (sensory.olfactory[1] > 0.5) {
                        this.intentions.return += 0.1;
                    }
                    
                    // Нормализация
                    let total = 0;
                    for (let k in this.intentions) {
                        total += this.intentions[k];
                    }
                    
                    for (let k in this.intentions) {
                        this.intentions[k] /= total;
                    }
                }

                // ========== ВЫБОР ДЕЙСТВИЯ ==========
                select_action() {
                    // Выбираем действие с максимальной вероятностью
                    let max_intention = 0;
                    let best_action = 'explore';
                    
                    for (let [action, prob] of Object.entries(this.intentions)) {
                        if (prob > max_intention) {
                            max_intention = prob;
                            best_action = action;
                        }
                    }
                    
                    return best_action;
                }

                // ========== ДВИЖЕНИЕ ==========
                move(motor, dt, world) {
                    // motor.legs содержит 72 значения (12 на ногу)
                    // Упрощенно: усредняем левые и правые ноги
                    
                    let left_sum = 0, right_sum = 0;
                    for (let i = 0; i < 36; i++) {
                        left_sum += motor.legs[i] || 0;
                    }
                    for (let i = 36; i < 72; i++) {
                        right_sum += motor.legs[i] || 0;
                    }
                    
                    const left = left_sum / 36;
                    const right = right_sum / 36;
                    
                    // Скорость и поворот
                    const speed = (left + right) * 3;
                    const turn = (right - left) * 0.5;
                    
                    this.angle += turn * dt * 10;
                    
                    // Движение
                    this.x += Math.cos(this.angle) * speed * dt * 50;
                    this.y += Math.sin(this.angle) * speed * dt * 50;
                    
                    // Границы мира
                    this.x = Math.max(10, Math.min(world.width - 10, this.x));
                    this.y = Math.max(10, Math.min(world.height - 10, this.y));
                }

                // ========== ВЗАИМОДЕЙСТВИЕ С МИРОМ ==========
                interact(world, colony, dt) {
                    // Сбор еды
                    if (this.state === 'forage' && !this.carrying.type) {
                        for (let f of world.food) {
                            const dist = Math.hypot(this.x - f.x, this.y - f.y);
                            if (dist < 15) {
                                const take = Math.min(5, f.amount);
                                f.amount -= take;
                                this.carrying = { type: 'food', amount: take };
                                this.state = 'return';
                                break;
                            }
                        }
                    }
                    
                    // Возврат в гнездо
                    if (this.state === 'return' && this.carrying.type) {
                        const dist_to_nest = Math.hypot(this.x - colony.nest_x, this.y - colony.nest_y);
                        if (dist_to_nest < 30) {
                            // Сдаем груз
                            if (this.carrying.type === 'food') {
                                colony.resources.food += this.carrying.amount;
                            } else if (this.carrying.type === 'wood') {
                                colony.resources.wood += this.carrying.amount;
                            } else if (this.carrying.type === 'sand') {
                                colony.resources.sand += this.carrying.amount;
                            }
                            
                            this.energy += 20;
                            this.carrying = { type: null, amount: 0 };
                            this.state = 'explore';
                        }
                    }
                    
                    // Бой с врагами
                    if (this.state === 'fight') {
                        for (let e of world.enemies) {
                            const dist = Math.hypot(this.x - e.x, this.y - e.y);
                            if (dist < 20) {
                                // Атака
                                e.health -= 0.1 * dt * 100 * (this.role === 'defender' ? 2 : 0.5);
                                
                                // Получение урона
                                if (Math.random() < 0.1 * dt * 100) {
                                    this.health -= 5;
                                }
                                
                                // Если враг умер
                                if (e.health <= 0) {
                                    world.enemies = world.enemies.filter(en => en !== e);
                                    this.energy += 30;
                                }
                            }
                        }
                    }
                    
                    // Стройка
                    if (this.state === 'build') {
                        const dist_to_nest = Math.hypot(this.x - colony.nest_x, this.y - colony.nest_y);
                        if (dist_to_nest < 100 && colony.resources.wood > 0 && colony.resources.sand > 0) {
                            // Расширение территории
                            colony.expand_territory(this.x, this.y, dt);
                            colony.resources.wood -= 0.01 * dt * 100;
                            colony.resources.sand -= 0.005 * dt * 100;
                        }
                    }
                }

                // ========== СБРОС ==========
                reset() {
                    this.energy = 100;
                    this.health = 100;
                    this.state = 'explore';
                    this.carrying = { type: null, amount: 0 };
                    this.brain = new AntBrain(this.id, this.role);
                }
            }

            // ==================== УРОВЕНЬ 4: КОЛОНИЯ (СУПЕР-ОРГАНИЗМ) ====================
            class Colony {
                constructor(id, nest_x, nest_y) {
                    this.id = id;
                    this.nest_x = nest_x;
                    this.nest_y = nest_y;
                    
                    // Муравьи
                    this.ants = [];
                    this.ant_count = 0;
                    
                    // Расплод
                    this.eggs = 0;
                    this.larvae = 0;
                    this.pupae = 0;
                    
                    // Ресурсы
                    this.resources = {
                        food: 1000,
                        wood: 500,
                        sand: 300,
                        resin: 100
                    };
                    
                    // Феромонное поле (4 типа + диффузия)
                    this.pheromones = {
                        food: [],      // [x, y, strength, age]
                        home: [],
                        danger: [],
                        build: [],
                        alarm: [],
                        trail: []
                    };
                    
                    // Территория (2D поле принадлежности)
                    this.territory = new Float32Array(SYSTEM_CONFIG.world.width * SYSTEM_CONFIG.world.height);
                    
                                        // Статистика
                    this.stats = {
                        born: 0,
                        died: 0,
                        food_collected: 0,
                        enemies_killed: 0,
                        constructions: 0,
                        territory_size: 0
                    };
                    
                    // Время
                    this.time = 0;
                    
                    // Генетический пул
                    this.gene_pool = {
                        exploration_rate: { mean: 0.2, std: 0.1 },
                        aggression: { mean: 0.3, std: 0.2 },
                        building_instinct: { mean: 0.2, std: 0.15 },
                        learning_rate: { mean: 0.015, std: 0.005 }
                    };
                    
                    // Инициализация начальных муравьев
                    this.init_ants(100);
                }

                // ========== ИНИЦИАЛИЗАЦИЯ МУРАВЬЕВ ==========
                init_ants(count) {
                    const roles = ['forager', 'forager', 'forager', 'defender', 'builder', 'nurse'];
                    
                    for (let i = 0; i < count; i++) {
                        const role = roles[Math.floor(Math.random() * roles.length)];
                        const angle = Math.random() * Math.PI * 2;
                        const dist = 20 + Math.random() * 30;
                        const x = this.nest_x + Math.cos(angle) * dist;
                        const y = this.nest_y + Math.sin(angle) * dist;
                        
                        const ant = new Ant(
                            `ant_${this.id}_${this.ants.length}`,
                            role,
                            x, y,
                            this.id
                        );
                        
                        // Наследуем гены из пула
                        this.apply_genetics(ant);
                        
                        this.ants.push(ant);
                        this.ant_count++;
                        this.stats.born++;
                    }
                }

                // ========== ГЕНЕТИЧЕСКОЕ НАСЛЕДОВАНИЕ ==========
                apply_genetics(ant) {
                    // Нормальное распределение вокруг среднего
                    ant.genes.exploration_rate = this.gaussian(
                        this.gene_pool.exploration_rate.mean,
                        this.gene_pool.exploration_rate.std
                    );
                    
                    ant.genes.aggression = this.gaussian(
                        this.gene_pool.aggression.mean,
                        this.gene_pool.aggression.std
                    );
                    
                    ant.genes.building_instinct = this.gaussian(
                        this.gene_pool.building_instinct.mean,
                        this.gene_pool.building_instinct.std
                    );
                    
                    ant.genes.learning_rate = this.gaussian(
                        this.gene_pool.learning_rate.mean,
                        this.gene_pool.learning_rate.std
                    );
                    
                    // Ограничения
                    ant.genes.exploration_rate = Math.max(0.01, Math.min(0.8, ant.genes.exploration_rate));
                    ant.genes.aggression = Math.max(0, Math.min(1, ant.genes.aggression));
                    ant.genes.building_instinct = Math.max(0, Math.min(0.8, ant.genes.building_instinct));
                    ant.genes.learning_rate = Math.max(0.001, Math.min(0.05, ant.genes.learning_rate));
                }

                gaussian(mean, std) {
                    // Box-Muller transform
                    let u = 0, v = 0;
                    while (u === 0) u = Math.random();
                    while (v === 0) v = Math.random();
                    
                    const z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
                    return mean + std * z;
                }

                // ========== ШАГ КОЛОНИИ ==========
                step(dt, world) {
                    this.time += dt;
                    
                    // ===== 1. ОБНОВЛЕНИЕ ФЕРОМОНОВ =====
                    this.update_pheromones(dt);
                    
                    // ===== 2. ОБНОВЛЕНИЕ ВСЕХ МУРАВЬЕВ =====
                    let alive_ants = [];
                    
                    for (let ant of this.ants) {
                        const alive = ant.step(dt, world, this);
                        
                        if (alive) {
                            alive_ants.push(ant);
                            
                            // Маркировка территории
                            const idx = Math.floor(ant.y) * SYSTEM_CONFIG.world.width + Math.floor(ant.x);
                            if (idx >= 0 && idx < this.territory.length) {
                                this.territory[idx] = Math.min(1.0, this.territory[idx] + 0.001 * dt * 100);
                            }
                        } else {
                            // Муравей умер
                            this.stats.died++;
                            
                            // Возвращаем ресурсы
                            this.resources.food += ant.energy * 0.5;
                        }
                    }
                    
                    this.ants = alive_ants;
                    this.ant_count = this.ants.length;
                    
                    // ===== 3. РАЗМНОЖЕНИЕ =====
                    this.reproduction(dt);
                    
                    // ===== 4. ОБНОВЛЕНИЕ ТЕРРИТОРИИ =====
                    this.update_territory(dt);
                    
                    // ===== 5. ОБНОВЛЕНИЕ ГЕНЕТИЧЕСКОГО ПУЛА =====
                    this.update_gene_pool();
                    
                    return this.ant_count;
                }

                // ========== ОБНОВЛЕНИЕ ФЕРОМОНОВ ==========
                update_pheromones(dt) {
                    const diffusion = SYSTEM_CONFIG.colony.pheromone.diffusion_coefficient * dt * 100;
                    const evaporation = SYSTEM_CONFIG.colony.pheromone.evaporation_rate * dt * 100;
                    
                    for (let type in this.pheromones) {
                        const new_pheromones = [];
                        
                        for (let p of this.pheromones[type]) {
                            // Старение и испарение
                            p.age += dt;
                            p.strength *= (1 - evaporation);
                            
                            // Простая диффузия (добавляем соседние точки)
                            if (p.strength > 0.05) {
                                new_pheromones.push(p);
                                
                                // Создаем扩散ию
                                for (let i = 0; i < 4; i++) {
                                    const angle = Math.random() * Math.PI * 2;
                                    const dx = Math.cos(angle) * 10 * diffusion;
                                    const dy = Math.sin(angle) * 10 * diffusion;
                                    
                                    new_pheromones.push({
                                        x: p.x + dx,
                                        y: p.y + dy,
                                        strength: p.strength * 0.3,
                                        age: p.age
                                    });
                                }
                            }
                        }
                        
                        // Ограничиваем количество
                        if (new_pheromones.length > 1000) {
                            new_pheromones.sort((a, b) => b.strength - a.strength);
                            this.pheromones[type] = new_pheromones.slice(0, 1000);
                        } else {
                            this.pheromones[type] = new_pheromones;
                        }
                    }
                }

                // ========== ДОБАВЛЕНИЕ ФЕРОМОНА ==========
                add_pheromone(type, x, y, strength) {
                    if (!this.pheromones[type]) return;
                    
                    this.pheromones[type].push({
                        x, y,
                        strength: Math.min(1.0, strength),
                        age: 0
                    });
                }

                // ========== ПОЛУЧЕНИЕ ФЕРОМОНОВ В ТОЧКЕ ==========
                get_pheromones_at(x, y, radius) {
                    const result = {
                        food: 0, home: 0, danger: 0, build: 0, alarm: 0, trail: 0
                    };
                    
                    for (let type in this.pheromones) {
                        for (let p of this.pheromones[type]) {
                            const dx = x - p.x;
                            const dy = y - p.y;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            
                            if (dist < radius) {
                                result[type] += p.strength * (1 - dist / radius);
                            }
                        }
                    }
                    
                    return result;
                }

                // ========== РАЗМНОЖЕНИЕ ==========
                reproduction(dt) {
                    // Развитие яиц
                    if (this.eggs > 0) {
                        const hatch_rate = 0.001 * dt * 100;
                        const hatched = Math.min(this.eggs, Math.floor(this.eggs * hatch_rate) + 1);
                        
                        this.eggs -= hatched;
                        this.larvae += hatched;
                    }
                    
                    // Развитие личинок
                    if (this.larvae > 0 && this.resources.food > 10) {
                        const grow_rate = 0.0005 * dt * 100;
                        const grown = Math.min(this.larvae, Math.floor(this.larvae * grow_rate) + 1);
                        
                        this.larvae -= grown;
                        this.pupae += grown;
                        this.resources.food -= grown * 2;
                    }
                    
                    // Появление взрослых
                    if (this.pupae > 0) {
                        const emerge_rate = 0.0003 * dt * 100;
                        const emerged = Math.min(this.pupae, Math.floor(this.pupae * emerge_rate) + 1);
                        
                        this.pupae -= emerged;
                        
                        // Создаем новых муравьев
                        for (let i = 0; i < emerged; i++) {
                            const roles = ['forager', 'forager', 'forager', 'defender', 'builder', 'nurse'];
                            const role = roles[Math.floor(Math.random() * roles.length)];
                            
                            const ant = new Ant(
                                `ant_${this.id}_${this.ants.length}`,
                                role,
                                this.nest_x + (Math.random() - 0.5) * 50,
                                this.nest_y + (Math.random() - 0.5) * 50,
                                this.id
                            );
                            
                            // Наследуем гены от родителей
                            if (this.ants.length > 0) {
                                const parent = this.ants[Math.floor(Math.random() * this.ants.length)];
                                ant.genes = { ...parent.genes };
                                
                                // Мутация
                                ant.genes.exploration_rate *= 0.9 + Math.random() * 0.2;
                                ant.genes.aggression *= 0.9 + Math.random() * 0.2;
                                ant.genes.building_instinct *= 0.9 + Math.random() * 0.2;
                                ant.genes.learning_rate *= 0.9 + Math.random() * 0.2;
                            } else {
                                this.apply_genetics(ant);
                            }
                            
                            this.ants.push(ant);
                            this.ant_count++;
                            this.stats.born++;
                        }
                    }
                    
                    // Производство новых яиц
                    if (this.resources.food > 200 && this.ant_count > 10) {
                        const egg_rate = 0.002 * dt * 100 * (this.ant_count / 100);
                        const new_eggs = Math.floor(egg_rate) + 1;
                        
                        this.eggs += new_eggs;
                        this.resources.food -= new_eggs * 5;
                    }
                }

                // ========== ОБНОВЛЕНИЕ ТЕРРИТОРИИ ==========
                update_territory(dt) {
                    // Постепенное затухание территории
                    const decay = SYSTEM_CONFIG.colony.territory_decay * dt * 100;
                    
                    for (let i = 0; i < this.territory.length; i += 100) {
                        this.territory[i] *= (1 - decay);
                    }
                    
                    // Вычисляем размер территории (пиксели с territory > 0.5)
                    let size = 0;
                    for (let i = 0; i < this.territory.length; i += 100) {
                        if (this.territory[i] > 0.5) size++;
                    }
                    
                    this.stats.territory_size = size * 100; // приблизительно
                }

                // ========== РАСШИРЕНИЕ ТЕРРИТОРИИ ==========
                expand_territory(x, y, dt) {
                    const idx = Math.floor(y) * SYSTEM_CONFIG.world.width + Math.floor(x);
                    if (idx >= 0 && idx < this.territory.length) {
                        this.territory[idx] = Math.min(1.0, this.territory[idx] + 0.01 * dt * 100);
                    }
                }

                // ========== ОБНОВЛЕНИЕ ГЕНЕТИЧЕСКОГО ПУЛА ==========
                update_gene_pool() {
                    if (this.ants.length === 0) return;
                    
                    // Вычисляем средние и стандартные отклонения генов
                    let sum_e = 0, sum_a = 0, sum_b = 0, sum_l = 0;
                    let sum_e2 = 0, sum_a2 = 0, sum_b2 = 0, sum_l2 = 0;
                    
                    for (let ant of this.ants) {
                        sum_e += ant.genes.exploration_rate;
                        sum_a += ant.genes.aggression;
                        sum_b += ant.genes.building_instinct;
                        sum_l += ant.genes.learning_rate;
                        
                        sum_e2 += ant.genes.exploration_rate * ant.genes.exploration_rate;
                        sum_a2 += ant.genes.aggression * ant.genes.aggression;
                        sum_b2 += ant.genes.building_instinct * ant.genes.building_instinct;
                        sum_l2 += ant.genes.learning_rate * ant.genes.learning_rate;
                    }
                    
                    const n = this.ants.length;
                    
                    this.gene_pool.exploration_rate.mean = sum_e / n;
                    this.gene_pool.aggression.mean = sum_a / n;
                    this.gene_pool.building_instinct.mean = sum_b / n;
