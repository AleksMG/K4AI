    class GameEngine {
        constructor() {
            this.eventBus = new EventBus();
            this.logger = null;
            this.safety = null;
            this.particleSystem = new ParticleSystem();
            
            this.canvas = null;
            this.ctx = null;
            this.occupancyCanvas = null;
            this.occCtx = null;
            
            this.width = 800;
            this.height = 600;
            
            this.worldBounds = { minX: 40, maxX: 760, minY: 40, maxY: 560 };
            this.obstacles = [];
            this.worldModel = null;
            this.spatialIndex = null;
            
            this.entities = [];
            this.projectiles = [];
            this.tankIdCounter = 0;
            this.projectileIdCounter = 0;
            
            this.running = false;
            this.paused = false;
            this.frameCount = 0;
            
            this.showOccupancy = false;
            this.showPredictions = false;
            this.showPaths = false;
            this.showSensors = false;
            
            this.stats = {
                startTime: 0,
                shots: 0,
                hits: 0,
                kills: 0,
                lastUIUpdate: 0,
                fps: 60,
                lastFrameTime: 0
            };
            
            this.ui = {};
            
            this.init();
        }

        init() {
            try {
                this.setupCanvas();
                this.setupLogger();
                this.setupSafety();
                this.setupWorld();
                this.setupEntities();
                this.setupUI();
                this.bindEvents();
                
                this.logger.info('Инициализация завершена', { version: '5.0' });
                this.render();
            } catch (error) {
                console.error('[GameEngine] Init error:', error);
                alert('Ошибка инициализации: ' + error.message);
            }
        }

        setupCanvas() {
            this.canvas = document.getElementById('mainCanvas');
            if (!this.canvas) throw new Error('Canvas not found');
            this.ctx = this.canvas.getContext('2d');
            if (!this.ctx) throw new Error('Cannot get 2D context');

            this.occupancyCanvas = document.getElementById('occupancyCanvas');
            if (this.occupancyCanvas) {
                this.occCtx = this.occupancyCanvas.getContext('2d');
                this.occupancyCanvas.width = 240;
                this.occupancyCanvas.height = 240;
            }

            const viewport = document.getElementById('viewport');
            if (viewport) {
                this.width = viewport.clientWidth;
                this.height = viewport.clientHeight;
                this.canvas.width = this.width;
                this.canvas.height = this.height;
            }
        }

        setupLogger() {
            const logContainer = document.getElementById('log-container');
            this.logger = new Logger(logContainer);
        }

        setupSafety() {
            this.safety = new SafetyMonitor(this.eventBus, this.logger);
        }

        setupWorld() {
            this.worldBounds = {
                minX: 40,
                maxX: this.width - 40,
                minY: 40,
                maxY: this.height - 40
            };

            this.obstacles = [];
            this.generateObstacles();

            this.worldModel = new WorldModel(this.worldBounds, this.obstacles);
            this.spatialIndex = new QuadTree({
                x: 0, y: 0, w: this.width, h: this.height
            }, 4);
        }

        setupEntities() {
            this.entities = [];
            this.projectiles = [];
            this.tankIdCounter = 0;
            this.projectileIdCounter = 0;

            for (let i = 0; i < 4; i++) {
                this.spawnTank();
            }
        }

        setupUI() {
            this.ui = {
                time: document.getElementById('stat-time'),
                fps: document.getElementById('stat-fps'),
                shots: document.getElementById('stat-shots'),
                hits: document.getElementById('stat-hits'),
                blueCount: document.getElementById('team-blue-count'),
                redCount: document.getElementById('team-red-count'),
                tracked: document.getElementById('wm-tracked'),
                uncertainty: document.getElementById('wm-uncertainty'),
                predictions: document.getElementById('wm-predictions'),
                kfTracks: document.getElementById('kf-tracks'),
                predictionsList: document.getElementById('predictions'),
                log: document.getElementById('log-container'),
                statusDot: document.getElementById('status-dot'),
                statusText: document.getElementById('status-text'),
                safetyStatus: document.getElementById('safety-status')
            };

            this.updateUI();
        }

        bindEvents() {
            const btnStart = document.getElementById('btn-start');
            const btnPause = document.getElementById('btn-pause');
            const btnReset = document.getElementById('btn-reset');
            const btnSpawn = document.getElementById('btn-spawn');
            const btnOccupancy = document.getElementById('btn-occupancy');
            const btnPredictions = document.getElementById('btn-predictions');
            const btnPaths = document.getElementById('btn-paths');
            const btnSensors = document.getElementById('btn-sensors');

            if (btnStart) btnStart.addEventListener('click', () => this.start());
            if (btnPause) btnPause.addEventListener('click', () => this.pause());
            if (btnReset) btnReset.addEventListener('click', () => this.reset());
            if (btnSpawn) btnSpawn.addEventListener('click', () => this.spawnRandomTank());
            if (btnOccupancy) btnOccupancy.addEventListener('click', () => this.toggleOccupancy());
            if (btnPredictions) btnPredictions.addEventListener('click', () => this.togglePredictions());
            if (btnPaths) btnPaths.addEventListener('click', () => this.togglePaths());
            if (btnSensors) btnSensors.addEventListener('click', () => this.toggleSensors());

            window.addEventListener('resize', () => this.handleResize());

            this.eventBus.on('tank:fire', (data) => this.handleTankFire(data));
            this.eventBus.on('tank:destroyed', (data) => this.handleTankDestroyed(data));
            this.eventBus.on('safety:emergency_stop', (data) => this.handleEmergency(data));

            this.logger.debug('События привязаны');
        }

        generateObstacles() {
            this.obstacles = [];
            const count = 10;
            const minRadius = 25;
            const maxRadius = 45;

            for (let i = 0; i < count; i++) {
                let valid = false;
                let attempts = 0;
                let center, radius;

                while (!valid && attempts < 50) {
                    center = Vector2.create(
                        Math.random() * (this.width - 150) + 75,
                        Math.random() * (this.height - 150) + 75
                    );
                    radius = Math.random() * (maxRadius - minRadius) + minRadius;
                    valid = true;

                    for (const obs of this.obstacles) {
                        if (center.dist(obs.center) < obs.radius + radius + 30) {
                            valid = false;
                            break;
                        }
                    }
                    attempts++;
                }

                if (valid) {
                    this.obstacles.push({ center, radius });
                }
            }

            this.logger.debug(`Сгенерировано препятствий: ${this.obstacles.length}`);
        }

        spawnTank() {
            const team = this.tankIdCounter % 2;
            const pos = Vector2.create(
                Math.random() * (this.width - 150) + 75,
                Math.random() * (this.height - 150) + 75
            );

            const entity = new TankEntity(this.tankIdCounter, pos, team, {});
            const ai = new TankAI(entity, this.eventBus, this.worldModel, this.logger);
            const renderer = new TankRenderer(entity);

            this.entities.push({ entity, ai, renderer });
            this.tankIdCounter++;

            this.logger.info(`Танк #${entity.id} создан`, { team: team + 1 });
        }

        spawnRandomTank() {
            this.spawnTank();
            this.showNotification('Новый танк развёрнут!');
        }

        handleTankFire(data) {
            if (!data || !data.position || !data.direction) return;
            const projectile = new Projectile(
                this.projectileIdCounter,
                data.position,
                data.direction,
                data.tankId,
                data.team,
                25
            );
            this.projectiles.push(projectile);
            this.stats.shots++;
            this.projectileIdCounter++;
        }

        handleTankDestroyed(data) {
            if (!data || !data.pos) return;
            this.particleSystem.emit(data.pos.x, data.pos.y, '#ff6600', 35, 5, 1.5);
            this.particleSystem.emit(data.pos.x, data.pos.y, '#ffff00', 25, 3, 1);
            this.stats.kills++;
        }

        handleEmergency(data) {
            this.paused = true;
            this.running = false;
            this.updateStatus('stopped');
            if (this.ui.safetyStatus) {
                this.ui.safetyStatus.textContent = '⚠ АВАРИЙНАЯ ОСТАНОВКА';
                this.ui.safetyStatus.className = 'safety-indicator warning';
            }
            this.logger.error('Аварийная остановка активирована', data);
        }

        start() {
            if (this.running && !this.paused) {
                return;
            }

            this.running = true;
            this.paused = false;
            this.stats.startTime = performance.now();
            this.stats.lastFrameTime = performance.now();
            this.safety.reset();
            this.updateStatus('running');
            this.updateButtonStates();
            this.loop();
            this.logger.info('Бой начался');
            this.showNotification('Бой начался!');
        }

        pause() {
            if (!this.running) return;

            this.paused = !this.paused;
            this.updateStatus(this.paused ? 'paused' : 'running');
            this.updateButtonStates();
            this.logger.info(this.paused ? 'Пауза' : 'Продолжение');

            if (!this.paused) {
                this.stats.lastFrameTime = performance.now();
                this.loop();
            }
        }

        reset() {
            this.running = false;
            this.paused = false;
            this.entities = [];
            this.projectiles = [];
            this.tankIdCounter = 0;
            this.projectileIdCounter = 0;
            this.particleSystem.clear();
            this.stats = {
                startTime: 0,
                shots: 0,
                hits: 0,
                kills: 0,
                lastUIUpdate: 0,
                fps: 60,
                lastFrameTime: 0
            };
            this.frameCount = 0;

            this.generateObstacles();
            this.worldModel.reset(this.obstacles);

            for (let i = 0; i < 4; i++) {
                this.spawnTank();
            }

            this.updateStatus('stopped');
            this.updateButtonStates();
            this.render();
            this.updateUI();
            this.logger.info('Сброс завершён');
            this.showNotification('Бой сброшен!');

            if (this.ui.safetyStatus) {
                this.ui.safetyStatus.textContent = '✓ Монитор безопасности: АКТИВЕН';
                this.ui.safetyStatus.className = 'safety-indicator';
            }
        }

        updateStatus(status) {
            if (this.ui.statusDot) {
                this.ui.statusDot.className = `status-dot ${status}`;
            }
            if (this.ui.statusText) {
                const statusText = {
                    'running': 'В БОЮ',
                    'paused': 'ПАУЗА',
                    'stopped': 'ОСТАНОВЛЕНО'
                };
                this.ui.statusText.textContent = statusText[status] || status;
            }
        }

        updateButtonStates() {
            const btnStart = document.getElementById('btn-start');
            const btnPause = document.getElementById('btn-pause');

            if (btnStart) {
                btnStart.disabled = this.running && !this.paused;
            }
            if (btnPause) {
                btnPause.disabled = !this.running;
            }
        }

        toggleOccupancy() {
            this.showOccupancy = !this.showOccupancy;
            if (this.occupancyCanvas) {
                this.occupancyCanvas.classList.toggle('active', this.showOccupancy);
            }
            const btn = document.getElementById('btn-occupancy');
            if (btn) btn.classList.toggle('active', this.showOccupancy);
            this.logger.debug(`Сетка занятости: ${this.showOccupancy ? 'ВКЛ' : 'ВЫКЛ'}`);
        }

        togglePredictions() {
            this.showPredictions = !this.showPredictions;
            const btn = document.getElementById('btn-predictions');
            if (btn) btn.classList.toggle('active', this.showPredictions);
            this.logger.debug(`Прогнозы: ${this.showPredictions ? 'ВКЛ' : 'ВЫКЛ'}`);
        }

        togglePaths() {
            this.showPaths = !this.showPaths;
            const btn = document.getElementById('btn-paths');
            if (btn) btn.classList.toggle('active', this.showPaths);
            this.logger.debug(`Пути: ${this.showPaths ? 'ВКЛ' : 'ВЫКЛ'}`);
        }

        toggleSensors() {
            this.showSensors = !this.showSensors;
            const btn = document.getElementById('btn-sensors');
            if (btn) btn.classList.toggle('active', this.showSensors);
            this.logger.debug(`Сенсоры: ${this.showSensors ? 'ВКЛ' : 'ВЫКЛ'}`);
        }

        showNotification(message) {
            const area = document.getElementById('notification-area');
            if (!area) return;

            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            area.appendChild(notification);

            setTimeout(() => {
                if (notification.parentNode) {
                    notification.remove();
                }
            }, 3000);
        }

        handleResize() {
            const viewport = document.getElementById('viewport');
            if (viewport) {
                this.width = viewport.clientWidth;
                this.height = viewport.clientHeight;
                if (this.canvas) {
                    this.canvas.width = this.width;
                    this.canvas.height = this.height;
                }
                this.worldBounds = {
                    minX: 40,
                    maxX: this.width - 40,
                    minY: 40,
                    maxY: this.height - 40
                };
                this.logger.debug('Размер изменён', { w: this.width, h: this.height });
            }
        }

        loop() {
            if (!this.running || this.paused) return;

            if (!this.safety.check()) {
                return;
            }

            const now = performance.now();
            const dt = Math.min((now - this.stats.lastFrameTime) / 1000, 0.1);
            this.stats.lastFrameTime = now;
            this.stats.fps = Math.round(1 / dt) || 60;

            this.safety.heartbeat();

            this.update(dt);
            this.render();

            if (now - this.stats.lastUIUpdate > 100) {
                this.updateUI();
                this.stats.lastUIUpdate = now;
            }

            this.frameCount++;
            requestAnimationFrame(() => this.loop());
        }

        update(dt) {
            const allEntities = this.entities.map(e => e.entity).filter(e => e);

            for (const { entity, ai } of this.entities) {
                if (ai && entity) {
                    ai.update(dt, allEntities, this.obstacles);
                }
                if (entity) {
                    entity.applyPhysics(dt, this.worldBounds, allEntities);
                    entity.updateTrail(this.frameCount);
                }
            }

            for (const proj of this.projectiles) {
                if (proj) {
                    proj.update(this.worldBounds);
                }
            }

            this.particleSystem.update(dt);
            this.checkCollisions();

            this.projectiles = this.projectiles.filter(p => p && p.alive);
        }

        // FIX: Полная проверка коллизии с line-circle intersection
        checkCollisions() {
            this.spatialIndex.clear();

            for (const { entity } of this.entities) {
                if (entity && entity.alive) {
                    this.spatialIndex.insert(entity);
                }
            }

            for (const proj of this.projectiles) {
                if (!proj || !proj.alive) continue;

                const searchRadius = proj.speed + 30;
                const range = {
                    x: Math.min(proj.pos.x, proj.prevPos.x) - searchRadius,
                    y: Math.min(proj.pos.y, proj.prevPos.y) - searchRadius,
                    w: Math.abs(proj.pos.x - proj.prevPos.x) + searchRadius * 2,
                    h: Math.abs(proj.pos.y - proj.prevPos.y) + searchRadius * 2
                };

                const nearby = this.spatialIndex.query(range);

                for (const entity of nearby) {
                    if (entity.id === proj.ownerId) continue;
                    if (entity.team === proj.team) continue;
                    if (!entity.alive) continue;

                    const hit = this._checkProjectileCollision(proj, entity);
                    
                    if (hit) {
                        proj.alive = false;
                        const destroyed = entity.takeDamage(proj.damage);
                        this.stats.hits++;

                        if (destroyed) {
                            const killer = this.entities.find(e => e.entity.id === proj.ownerId);
                            if (killer) killer.entity.addKill();
                            this.eventBus.emit('tank:destroyed', { pos: entity.pos });
                            this.logger.combat(`Танк #${entity.id} уничтожен`, { killer: proj.ownerId });
                        } else {
                            this.logger.combat(`Танк #${entity.id} получил урон`, { hp: entity.health });
                        }
                        break;
                    }
                }
            }
        }

        // FIX: Новый метод для проверки коллизии снаряда с танком
        _checkProjectileCollision(proj, entity) {
            const tankRadius = entity.config.radius;
            const projRadius = proj.radius || 4;
            const combinedRadius = tankRadius + projRadius;

            // Проверка текущей позиции
            const distCurrent = proj.pos.dist(entity.pos);
            if (distCurrent < combinedRadius) return true;

            // Проверка предыдущей позиции
            const distPrev = proj.prevPos.dist(entity.pos);
            if (distPrev < combinedRadius) return true;

            // Line-circle collision: проверка отрезка движения
            const dx = proj.pos.x - proj.prevPos.x;
            const dy = proj.pos.y - proj.prevPos.y;
            const lenSq = dx * dx + dy * dy;
            
            if (lenSq > 0.0001) {
                const t = Math.max(0, Math.min(1, 
                    ((entity.pos.x - proj.prevPos.x) * dx + 
                     (entity.pos.y - proj.prevPos.y) * dy) / lenSq
                ));
                
                const closestX = proj.prevPos.x + t * dx;
                const closestY = proj.prevPos.y + t * dy;
                
                const distToLine = Math.hypot(entity.pos.x - closestX, entity.pos.y - closestY);
                
                if (distToLine < combinedRadius) return true;
            }

            return false;
        }

        render() {
            if (!this.ctx) return;

            this.ctx.fillStyle = '#1a1f2e';
            this.ctx.fillRect(0, 0, this.width, this.height);

            this.drawGrid();
            this.drawObstacles();
            this.drawOccupancyViz();
            this.drawEntities();
            this.drawProjectiles();
            this.drawParticles();
        }

        drawGrid() {
            this.ctx.strokeStyle = 'rgba(100, 255, 218, 0.06)';
            this.ctx.lineWidth = 1;

            for (let x = 0; x < this.width; x += 50) {
                this.ctx.beginPath();
                this.ctx.moveTo(x, 0);
                this.ctx.lineTo(x, this.height);
                this.ctx.stroke();
            }

            for (let y = 0; y < this.height; y += 50) {
                this.ctx.beginPath();
                this.ctx.moveTo(0, y);
                this.ctx.lineTo(this.width, y);
                this.ctx.stroke();
            }
        }

        drawObstacles() {
            for (const obs of this.obstacles) {
                const gradient = this.ctx.createRadialGradient(
                    obs.center.x, obs.center.y, 0,
                    obs.center.x, obs.center.y, obs.radius
                );
                gradient.addColorStop(0, '#3a4a5a');
                gradient.addColorStop(1, '#1a2a3a');

                this.ctx.fillStyle = gradient;
                this.ctx.beginPath();
                this.ctx.arc(obs.center.x, obs.center.y, obs.radius, 0, Math.PI * 2);
                this.ctx.fill();

                this.ctx.strokeStyle = 'rgba(100, 255, 218, 0.2)';
                this.ctx.lineWidth = 2;
                this.ctx.stroke();
            }
        }

        drawOccupancyViz() {
            if (!this.showOccupancy || !this.occCtx) return;
            if (this.entities.length === 0) return;

            const firstAI = this.entities[0].ai;
            if (firstAI && firstAI.worldModel && firstAI.worldModel.occupancyGrid) {
                this.occCtx.clearRect(0, 0, 240, 240);
                firstAI.worldModel.occupancyGrid.draw(this.occCtx, 240, 240);
            }
        }

        drawEntities() {
            for (const { entity, renderer } of this.entities) {
                if (renderer && entity) {
                    renderer.draw(this.ctx);
                }
            }
        }

        drawProjectiles() {
            for (const proj of this.projectiles) {
                if (proj) {
                    proj.draw(this.ctx);
                }
            }
        }

        drawParticles() {
            this.particleSystem.draw(this.ctx);
        }

        updateUI() {
            if (this.stats.startTime > 0 && this.ui.time) {
                const elapsed = Math.floor((performance.now() - this.stats.startTime) / 1000);
                const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const s = (elapsed % 60).toString().padStart(2, '0');
                this.ui.time.textContent = `${m}:${s}`;
            }

            if (this.ui.fps) this.ui.fps.textContent = this.stats.fps;
            if (this.ui.shots) this.ui.shots.textContent = this.stats.shots;
            if (this.ui.hits) this.ui.hits.textContent = this.stats.hits;

            let blueCount = 0;
            let redCount = 0;
            for (const { entity } of this.entities) {
                if (entity && entity.alive) {
                    if (entity.team === 0) blueCount++;
                    else redCount++;
                }
            }
            if (this.ui.blueCount) this.ui.blueCount.textContent = blueCount;
            if (this.ui.redCount) this.ui.redCount.textContent = redCount;

            this.updateWorldModelUI();
            this.updateSafetyUI();
        }

        updateWorldModelUI() {
            if (this.entities.length === 0 || !this.entities[0].ai) return;

            const wm = this.entities[0].ai.worldModel;
            if (!wm) return;

            if (this.ui.tracked) {
                this.ui.tracked.textContent = wm.trackedObjects.size;
            }

            let totalUncertainty = 0;
            let trackedCount = 0;
            let totalPredictions = 0;

            for (const track of wm.trackedObjects.values()) {
                if (track.kf && track.kf.isValid()) {
                    totalUncertainty += track.kf.getUncertainty();
                    trackedCount++;
                }
                if (track.predictions) {
                    totalPredictions += Object.keys(track.predictions).length;
                }
            }

            if (this.ui.uncertainty) {
                const avgUncertainty = trackedCount > 0 ? totalUncertainty / trackedCount : 0;
                this.ui.uncertainty.textContent = avgUncertainty.toFixed(1) + '%';
            }

            if (this.ui.predictions) {
                this.ui.predictions.textContent = totalPredictions;
            }

            this.updateKFTracksUI(wm);
            this.updatePredictionsUI(wm);
        }

        updateKFTracksUI(worldModel) {
            if (!worldModel || !this.ui.kfTracks) return;

            const container = this.ui.kfTracks;
            const tracks = Array.from(worldModel.trackedObjects.entries());

            if (tracks.length === 0 && container.children.length === 0) return;

            container.innerHTML = '';

            for (const [id, track] of tracks) {
                if (!track.kf || !track.kf.isValid()) continue;

                const pos = track.kf.getPosition();
                const vel = track.kf.getVelocity();
                const cov = track.kf.getUncertainty();

                const div = document.createElement('div');
                div.className = 'track-item';
                div.innerHTML = `
                    <div class="track-header ${track.team === 0 ? 'blue' : 'red'}">
                        <span>Трек #${id}</span>
                        <span>Команда ${track.team + 1}</span>
                    </div>
                    <div class="track-data">
                        Позиция: (${pos.x.toFixed(1)}, ${pos.y.toFixed(1)})<br>
                        Скорость: (${vel.x.toFixed(2)}, ${vel.y.toFixed(2)})<br>
                        Ковариация: ${cov.toFixed(2)}
                    </div>
                `;
                container.appendChild(div);
            }
        }

        updatePredictionsUI(worldModel) {
            if (!worldModel || !this.ui.predictionsList) return;

            const container = this.ui.predictionsList;
            const tracks = Array.from(worldModel.trackedObjects.entries());
            
            const validTracks = tracks.filter(t => t[1].mostLikely);

            if (validTracks.length === 0 && container.children.length === 0) return;

            container.innerHTML = '';

            for (const [id, track] of validTracks) {
                if (!track.mostLikely) continue;

                const probPercent = (track.probabilities[track.mostLikely.hypothesis] * 100).toFixed(1);

                const div = document.createElement('div');
                div.className = 'prediction-item';
                div.innerHTML = `
                    <div class="track-header ${track.team === 0 ? 'blue' : 'red'}">
                        <span>Объект #${id}</span>
                        <span class="prediction-prob">${probPercent}%</span>
                    </div>
                    <div class="prediction-hypothesis">
                        ${this.getHypothesisName(track.mostLikely.hypothesis)}
                    </div>
                    <div class="track-data">
                        Точек траектории: ${track.mostLikely.trajectory.length}
                    </div>
                `;
                container.appendChild(div);
            }
        }

        getHypothesisName(hypothesis) {
            const names = {
                'straight': '→ Прямо',
                'left': '↺ Влево',
                'right': '↻ Вправо',
                'stop': '⏹ Стоп',
                'reverse': '↩ Назад'
            };
            return names[hypothesis] || hypothesis;
        }

        updateSafetyUI() {
            if (!this.ui.safetyStatus) return;
            if (!this.safety) return;

            if (this.safety.isActive()) {
                this.ui.safetyStatus.textContent = '⚠ АВАРИЙНАЯ ОСТАНОВКА';
                this.ui.safetyStatus.className = 'safety-indicator warning';
            } else {
                const status = this.safety.getStatus();
                const timeSince = (status.timeSinceUpdate / 1000).toFixed(2);
                this.ui.safetyStatus.textContent = `✓ Монитор безопасности: АКТИВЕН (${timeSince}с)`;
                this.ui.safetyStatus.className = 'safety-indicator';
            }
        }
    }

    // ============================================
    // 🚀 INITIALIZATION
    // ============================================

    (function() {
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                window.gameInstance = new GameEngine();
            });
        } else {
            window.gameInstance = new GameEngine();
        }
    })();
    </script>
</body>
