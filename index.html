          <div class="stat-label">Max Combo</div>
          <div class="stat-value" id="globalMaxCombo">0</div>
        </div>
      </div>

      <div class="generation-badge" id="generationInfo">
        Generation #1 - Elite 4
      </div>

      <div class="fighter-list" id="fighterList"></div>

      <div class="evolution-controls">
        <button class="evo-btn" id="newGenBtn">New Generation</button>
        <button class="evo-btn primary" id="tournamentBtn">Tournament</button>
      </div>
      <button class="evo-btn" id="saveBrainsBtn">Save Champions</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ========== НОВАЯ НЕЙРОСЕТЬ С ОБУЧЕНИЕМ ==========
    class NeuralNetwork {
      constructor(inputSize = 32, hidden1Size = 64, hidden2Size = 32, outputSize = 12) {
        this.inputSize = inputSize;
        this.hidden1Size = hidden1Size;
        this.hidden2Size = hidden2Size;
        this.outputSize = outputSize;
        
        // Xavier/He initialization
        this.W1 = this.randomMatrix(hidden1Size, inputSize, inputSize);
        this.b1 = new Array(hidden1Size).fill(0.1);
        this.W2 = this.randomMatrix(hidden2Size, hidden1Size, hidden1Size);
        this.b2 = new Array(hidden2Size).fill(0.1);
        this.W3 = this.randomMatrix(outputSize, hidden2Size, hidden2Size);
        this.b3 = new Array(outputSize).fill(0.1);
        
        // ===== НОВОЕ: ПАМЯТЬ ДЛЯ ОБУЧЕНИЯ =====
        this.memory = [];                // Replay buffer
        this.memorySize = 1000;           // Храним 1000 ситуаций
        this.learningRate = 0.01;         // Скорость обучения
        this.discountFactor = 0.95;       // Важность будущих наград
        this.epsilon = 0.2;                // Exploration rate
        this.epsilonDecay = 0.999;         // Уменьшаем exploration
        
        // ===== НОВОЕ: ПАМЯТЬ КОМБО =====
        this.comboMemory = [];             // Запоминаем успешные комбо
        this.minComboReward = 3;            // Минимальная награда для запоминания
        
        // Кэш для обратного распространения
        this.lastInput = null;
        this.lastH1 = null;
        this.lastH2 = null;
        this.lastOutput = null;
      }

      randomMatrix(rows, cols, fanIn) {
        const matrix = [];
        const scale = Math.sqrt(2.0 / fanIn);
        for (let i = 0; i < rows; i++) {
          matrix[i] = [];
          for (let j = 0; j < cols; j++) {
            matrix[i][j] = (Math.random() * 2 - 1) * scale;
          }
        }
        return matrix;
      }

      relu(x) { return Math.max(0, x); }
      
      softmax(arr) {
        const max = Math.max(...arr);
        const exps = arr.map(x => Math.exp(x - max));
        const sum = exps.reduce((a, b) => a + b);
        return exps.map(x => x / sum);
      }

      forward(input) {
        this.lastInput = input;
        
        // Layer 1
        this.lastH1 = [];
        for (let i = 0; i < this.hidden1Size; i++) {
          let sum = this.b1[i];
          for (let j = 0; j < this.inputSize; j++) {
            sum += this.W1[i][j] * input[j];
          }
          this.lastH1[i] = this.relu(sum);
        }

        // Layer 2
        this.lastH2 = [];
        for (let i = 0; i < this.hidden2Size; i++) {
          let sum = this.b2[i];
          for (let j = 0; j < this.hidden1Size; j++) {
            sum += this.W2[i][j] * this.lastH1[j];
          }
          this.lastH2[i] = this.relu(sum);
        }

        // Output
        this.lastOutput = [];
        for (let i = 0; i < this.outputSize; i++) {
          let sum = this.b3[i];
          for (let j = 0; j < this.hidden2Size; j++) {
            sum += this.W3[i][j] * this.lastH2[j];
          }
          this.lastOutput[i] = sum;
        }

        return this.softmax(this.lastOutput);
      }

      // ===== НОВОЕ: ВЫБОР ДЕЙСТВИЯ (ε-greedy) =====
      chooseAction(state) {
        if (Math.random() < this.epsilon) {
          // Exploration: случайное действие
          return Math.floor(Math.random() * this.outputSize);
        } else {
          // Exploitation: лучшее действие
          const output = this.forward(state);
          let best = 0;
          for (let i = 1; i < output.length; i++) {
            if (output[i] > output[best]) best = i;
          }
          return best;
        }
      }

      // ===== НОВОЕ: ЗАПОМИНАНИЕ ОПЫТА =====
      remember(state, action, reward, nextState, done = false) {
        this.memory.push({
          state: [...state],
          action,
          reward,
          nextState: [...nextState],
          done
        });
        
        if (this.memory.length > this.memorySize) {
          this.memory.shift();
        }
        
        // Уменьшаем exploration
        this.epsilon *= this.epsilonDecay;
        this.epsilon = Math.max(0.05, this.epsilon);
      }

      // ===== НОВОЕ: ОБУЧЕНИЕ НА ОПЫТЕ (Q-learning) =====
      learn(batchSize = 32) {
        if (this.memory.length < batchSize) return;
        
        // Берем случайный batch из памяти
        const batch = [];
        for (let i = 0; i < batchSize; i++) {
          const idx = Math.floor(Math.random() * this.memory.length);
          batch.push(this.memory[idx]);
        }
        
        for (const exp of batch) {
          // Текущее Q-значение
          const currentQ = this.forward(exp.state)[exp.action];
          
          // Целевое Q-значение (Bellman equation)
          let targetQ;
          if (exp.done) {
            targetQ = exp.reward;
          } else {
            const nextQ = this.forward(exp.nextState);
            const maxNextQ = Math.max(...nextQ);
            targetQ = exp.reward + this.discountFactor * maxNextQ;
          }
          
          // Ошибка
          const error = targetQ - currentQ;
          
          // Обратное распространение
          this.backward(exp.state, exp.action, error);
        }
      }

      // ===== НОВОЕ: ОБРАТНОЕ РАСПРОСТРАНЕНИЕ =====
      backward(state, action, error) {
        const outputGrad = error * this.learningRate;
        
        // Обновляем W3 и b3
        for (let i = 0; i < this.hidden2Size; i++) {
          this.W3[action][i] += outputGrad * this.lastH2[i];
        }
        this.b3[action] += outputGrad;
        
        // Градиент для скрытого слоя 2
        const hidden2Grad = [];
        for (let i = 0; i < this.hidden2Size; i++) {
          hidden2Grad[i] = outputGrad * this.W3[action][i] * (this.lastH2[i] > 0 ? 1 : 0.01);
        }
        
        // Обновляем W2 и b2
        for (let i = 0; i < this.hidden2Size; i++) {
          for (let j = 0; j < this.hidden1Size; j++) {
            this.W2[i][j] += hidden2Grad[i] * this.lastH1[j] * 0.5;
          }
          this.b2[i] += hidden2Grad[i] * 0.5;
        }
      }

      // ===== НОВОЕ: ЗАПОМИНАНИЕ УДАЧНЫХ КОМБО =====
      rememberCombo(sequence, reward) {
        if (sequence.length < 2 || reward < this.minComboReward) return;
        
        this.comboMemory.push({
          sequence: [...sequence],
          reward,
          count: 1
        });
        
        // Оставляем только лучшие комбо
        this.comboMemory.sort((a, b) => b.reward - a.reward);
        if (this.comboMemory.length > 20) {
          this.comboMemory.pop();
        }
      }

      // ===== НОВОЕ: ПРЕДЛОЖЕНИЕ КОМБО =====
      suggestCombo(lastActions) {
        if (lastActions.length < 1 || this.comboMemory.length === 0) return null;
        
        const lastMove = lastActions[lastActions.length - 1];
        const possible = this.comboMemory.filter(c => c.sequence[0] === lastMove);
        
        if (possible.length === 0) return null;
        
        // Выбираем лучшее комбо
        possible.sort((a, b) => b.reward - a.reward);
        return possible[0].sequence[1];
      }

      crossover(other) {
        const child = new NeuralNetwork();
        
        for(let i=0; i<this.W1.length; i++) {
          for(let j=0; j<this.W1[i].length; j++) {
            child.W1[i][j] = Math.random() < 0.5 ? this.W1[i][j] : other.W1[i][j];
          }
        }
        
        for(let i=0; i<this.W2.length; i++) {
          for(let j=0; j<this.W2[i].length; j++) {
            child.W2[i][j] = Math.random() < 0.5 ? this.W2[i][j] : other.W2[i][j];
          }
        }
        
        for(let i=0; i<this.W3.length; i++) {
          for(let j=0; j<this.W3[i].length; j++) {
            child.W3[i][j] = Math.random() < 0.5 ? this.W3[i][j] : other.W3[i][j];
          }
        }
        
        // Наследуем комбо память
        child.comboMemory = [...this.comboMemory, ...other.comboMemory]
          .sort((a, b) => b.reward - a.reward)
          .slice(0, 20);
        
        child.mutate(0.05);
        return child;
      }

      mutate(rate) {
        for(let i=0; i<this.W1.length; i++) {
          for(let j=0; j<this.W1[i].length; j++) {
            if (Math.random() < rate) {
              this.W1[i][j] += (Math.random() - 0.5) * 0.3;
            }
          }
        }
        
        for(let i=0; i<this.W2.length; i++) {
          for(let j=0; j<this.W2[i].length; j++) {
            if (Math.random() < rate) {
              this.W2[i][j] += (Math.random() - 0.5) * 0.3;
            }
          }
        }
        
        for(let i=0; i<this.W3.length; i++) {
          for(let j=0; j<this.W3[i].length; j++) {
            if (Math.random() < rate) {
              this.W3[i][j] += (Math.random() - 0.5) * 0.3;
            }
          }
        }
      }

      clone() {
        const cl = new NeuralNetwork();
        for(let i=0; i<this.W1.length; i++) {
          for(let j=0; j<this.W1[i].length; j++) cl.W1[i][j] = this.W1[i][j];
        }
        for(let i=0; i<this.W2.length; i++) {
          for(let j=0; j<this.W2[i].length; j++) cl.W2[i][j] = this.W2[i][j];
        }
        for(let i=0; i<this.W3.length; i++) {
          for(let j=0; j<this.W3[i].length; j++) cl.W3[i][j] = this.W3[i][j];
        }
        cl.b1 = [...this.b1]; cl.b2 = [...this.b2]; cl.b3 = [...this.b3];
        cl.comboMemory = [...this.comboMemory];
        return cl;
      }

      toJSON() { 
        return { 
          W1: this.W1, b1: this.b1, W2: this.W2, b2: this.b2, W3: this.W3, b3: this.b3,
          comboMemory: this.comboMemory 
        }; 
      }
      
      fromJSON(json) { 
        this.W1 = json.W1; this.b1 = json.b1; this.W2 = json.W2; this.b2 = json.b2; 
        this.W3 = json.W3; this.b3 = json.b3; this.comboMemory = json.comboMemory || [];
      }
    }

    // === CONFIGURATION ===
    const CONFIG = {
      RANGE: 55,
      JUST_DEFEND_WINDOW: 180,
      BLOCK_COOLDOWN: 400,
      COMBO_WINDOW: 800,
      JUMP_FORCE: -12,
      GRAVITY: 0.6,
      DASH_SPEED: 9,
      GROUND_Y: 320
    };

    // === ATTACK DATABASE ===
    const ATTACKS = {
      jab: { name: 'Jab', damage: 4, startup: 6, active: 3, recovery: 8, hitstun: 12, knockback: 2, level: 'high', move: 'hand' },
      straight: { name: 'Straight', damage: 7, startup: 10, active: 4, recovery: 12, hitstun: 16, knockback: 4, level: 'high', move: 'hand' },
      hook: { name: 'Hook', damage: 9, startup: 12, active: 5, recovery: 14, hitstun: 18, knockback: 5, level: 'mid', move: 'hand' },
      uppercut: { name: 'Uppercut', damage: 11, startup: 14, active: 5, recovery: 18, hitstun: 22, knockback: 3, level: 'mid', launch: true, move: 'hand' },
      lowKick: { name: 'Low Kick', damage: 5, startup: 10, active: 4, recovery: 12, hitstun: 14, knockback: 3, level: 'low', move: 'leg' },
      midKick: { name: 'Mid Kick', damage: 8, startup: 13, active: 5, recovery: 16, hitstun: 18, knockback: 6, level: 'mid', move: 'leg' },
      highKick: { name: 'High Kick', damage: 10, startup: 15, active: 6, recovery: 20, hitstun: 20, knockback: 7, level: 'high', move: 'leg' },
      sweep: { name: 'Sweep', damage: 4, startup: 14, active: 6, recovery: 18, hitstun: 25, knockback: 2, level: 'low', trip: true, move: 'leg' },
      spinKick: { name: 'Spin Kick', damage: 13, startup: 18, active: 8, recovery: 24, hitstun: 24, knockback: 10, level: 'mid', spin: true, move: 'leg' }
    };

    // === COMBO SEQUENCES ===
    const COMBOS = {
      basic: ['jab', 'straight'],
      boxer: ['jab', 'jab', 'straight', 'hook'],
      kickboxer: ['lowKick', 'midKick', 'highKick'],
      finisher: ['jab', 'hook', 'uppercut'],
      heavy: ['straight', 'spinKick'],
      trip: ['lowKick', 'sweep']
    };

    // === AI STYLES ===
    const AI_STYLES = {
      balanced: { preferredRange: [50, 90], comboChance: 0.4, whiffPunish: 0.5, defensiveReaction: 0.4 },
      aggressor: { preferredRange: [30, 60], comboChance: 0.6, whiffPunish: 0.3, defensiveReaction: 0.2 },
      counter: { preferredRange: [60, 100], comboChance: 0.5, whiffPunish: 0.8, defensiveReaction: 0.7 },
      combo: { preferredRange: [40, 70], comboChance: 0.85, whiffPunish: 0.4, defensiveReaction: 0.3 },
      defensive: { preferredRange: [70, 120], comboChance: 0.3, whiffPunish: 0.6, defensiveReaction: 0.8 }
    };

    // === BASE FIGHTER CLASS ===
    class BaseFighter {
      constructor(x, facingRight, color, name) {
        this.x = x;
        this.y = CONFIG.GROUND_Y;
        this.vx = 0;
        this.vy = 0;
        this.facingRight = facingRight;
        this.color = color;
        this.name = name;
        
        this.hp = 100;
        this.maxHp = 100;
        this.state = 'idle';
        this.grounded = true;
        
        this.currentAttack = null;
        this.attackFrame = 0;
        this.attackPhase = 'none';
        this.hasHit = false;
        
        this.blocking = false;
        this.blockTimer = 0;
        this.justDefended = false;
        this.blockCooldown = 0;
        
        this.hitstun = 0;
        this.invincible = 0;
        this.knockedDown = false;
        this.getUpTimer = 0;
        
        this.animFrame = 0;
        this.spinAngle = 0;
        this.energyPulse = 0;
        
        this.hitCount = 0;
        this.comboCount = 0;
        this.maxCombo = 0;
        this.lastHitTime = 0;
        this.damageDealt = 0;
        this.fightsWon = 0;
        this.fightsLost = 0;
      }

      updateBase() {
        if (this.hitstun > 0) this.hitstun--;
        if (this.invincible > 0) this.invincible--;
        if (this.blockCooldown > 0) this.blockCooldown--;
        
        this.energyPulse += 0.1;
        
        if (this.knockedDown) {
          this.getUpTimer--;
          if (this.getUpTimer <= 0) {
            this.knockedDown = false;
            this.state = 'idle';
          }
        }
        
        if (this.state === 'attacking') {
          this.attackFrame++;
          const atk = ATTACKS[this.currentAttack];
          const totalFrames = atk.startup + atk.active + atk.recovery;
          
          if (this.attackFrame <= atk.startup) {
            this.attackPhase = 'startup';
          } else if (this.attackFrame <= atk.startup + atk.active) {
            this.attackPhase = 'active';
          } else {
            this.attackPhase = 'recovery';
            this.hasHit = false;
          }
          
          if (atk.spin) {
            const progress = this.attackFrame / totalFrames;
            this.spinAngle = progress * Math.PI * 2 * (this.facingRight ? 1 : -1);
          }
          
          if (this.attackFrame > totalFrames) {
            this.state = 'idle';
            this.currentAttack = null;
            this.attackPhase = 'none';
            this.spinAngle = 0;
          }
        }
        
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.88;
        
        if (!this.grounded) {
          this.vy += CONFIG.GRAVITY;
        }
        
        if (this.y >= CONFIG.GROUND_Y) {
          this.y = CONFIG.GROUND_Y;
          this.vy = 0;
          this.grounded = true;
        }
        
        this.x = Math.max(40, Math.min(860, this.x));
        this.animFrame++;
      }

      resolveCollision(opponent) {
        const minDist = 45;
        const dx = opponent.x - this.x;
        const dist = Math.abs(dx);
        
        if (dist < minDist && dist > 0) {
          const overlap = minDist - dist;
          const push = dx > 0 ? -1 : 1;
          this.x += push * overlap * 0.5;
          opponent.x -= push * overlap * 0.5;
        }
      }

      startAttack(name) {
        const atk = ATTACKS[name];
        if (!atk) return;
        
        this.state = 'attacking';
        this.currentAttack = name;
        this.attackFrame = 0;
        this.attackPhase = 'startup';
        this.hasHit = false;
        this.vx *= 0.3;
        this.blocking = false;
        
        this.x += (this.facingRight ? 1 : -1) * 5;
      }

      getHitbox() {
        if (this.state !== 'attacking' || this.attackPhase !== 'active') return null;
        
        const atk = ATTACKS[this.currentAttack];
        const dir = this.facingRight ? 1 : -1;
        
        let y = this.y - 50;
        if (atk.level === 'high') y = this.y - 75;
        if (atk.level === 'low') y = this.y - 15;
        
        return { x: this.x + dir * CONFIG.RANGE, y: y, w: 30, h: 20 };
      }

      getHurtbox() {
        return { x: this.x, y: this.y - 45, w: 35, h: 70 };
      }

      takeHit(attacker, attack) {
        if (this.invincible > 0) return false;
        
        if (this.blocking && this.blockTimer < CONFIG.JUST_DEFEND_WINDOW && !this.justDefended) {
          this.justDefended = true;
          this.blocking = false;
          this.blockTimer = 0;
          
          spawnEffect('parry', this.x, this.y - 50, '#ffffff');
          shake(3, 5);
          this.invincible = 15;
          return false;
        }
        
        const dir = attacker.facingRight ? 1 : -1;
        this.hp = Math.max(0, this.hp - attack.damage);
        this.hitstun = attack.hitstun;
        this.invincible = 10;
        this.vx = dir * attack.knockback;
        
        if (attack.launch) {
          this.vy = -8;
          this.grounded = false;
        }
        
        if (attack.trip) {
          this.knockedDown = true;
          this.getUpTimer = 50;
          this.vx = dir * 5;
        }
        
        spawnParticles(this.x, this.y - 50, this.color, attack.damage > 8 ? 15 : 8);
        spawnEffect('hit', this.x, this.y - 50, this.color);
        spawnEffect('spark', this.x + dir * 30, this.y - 50, '#ffffff');
        
        if (attack.damage > 10) {
          shake(8, 12);
          game.slowmo = 10;
        }
        
        // Награда атакующему (НЕ ЗА УРОН, А ЗА ПОПАДАНИЕ!)
        attacker.lastReward += 2;
        
        // Награда за комбо
        attacker.comboCount++;
        if (attacker.comboCount >= 2) {
          attacker.lastReward += attacker.comboCount * 2;
        }
        
        attacker.maxCombo = Math.max(attacker.maxCombo, attacker.comboCount);
        attacker.lastHitTime = game.frame;
        
        // Урон не растет - он фиксирован!
        attacker.damageDealt += attack.damage; // просто статистика
        
        return true;
      }

      draw() {
        ctx.save();
        
        // Energy aura
        const pulseScale = 1 + Math.sin(this.energyPulse) * 0.05;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 1;
        ctx.globalAlpha = 0.15;
        ctx.beginPath();
        ctx.arc(this.x, this.y - 50, 50 * pulseScale, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
        
        // Dash trail
        if (Math.abs(this.vx) > 5) {
          for (let i = 1; i <= 3; i++) {
            ctx.globalAlpha = 0.3 / i;
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 3;
            this.drawBody(this.x - this.vx * i * 2, this.y, 0, 0);
          }
          ctx.globalAlpha = 1;
        }
        
        if (this.hitstun > 0 && Math.floor(this.hitstun / 3) % 2 === 0) {
          ctx.globalAlpha = 0.5;
        }
        if (this.invincible > 0 && Math.floor(this.invincible / 2) % 2 === 0) {
          ctx.globalAlpha = 0.3;
        }
        
        if (this.knockedDown) {
          this.drawKnockedDown();
          ctx.restore();
          return;
        }
        
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 20;
        
        if (this.spinAngle !== 0) {
          ctx.translate(this.x, this.y - 50);
          ctx.rotate(this.spinAngle);
          ctx.translate(-this.x, -(this.y - 50));
        }
        
        this.drawBody(this.x, this.y, this.animFrame, this.blocking ? 15 : 0);
        
        if (this.blocking) {
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(this.x, this.y - 50, 38, 0, Math.PI * 2);
          ctx.stroke();
        }
        
        if (this.state === 'attacking' && this.attackPhase === 'active') {
          this.drawAttackEffect();
        }
        
        ctx.restore();
      }
      
      drawBody(x, y, frame, crouch) {
        const breathe = Math.sin(frame * 0.08) * 2;
        const headY = y - 80 + crouch + breathe;
        
        // Head
        ctx.beginPath();
        ctx.arc(x, headY, 15, 0, Math.PI * 2);
        ctx.stroke();
        
        // Body
        ctx.beginPath();
        ctx.moveTo(x, headY + 15);
        ctx.lineTo(x, y - 25 + crouch);
        ctx.stroke();
        
        this.drawLimbs(x, y, crouch, breathe, frame);
      }
      
      drawLimbs(x, y, crouch, breathe, frame) {
        const dir = this.facingRight ? 1 : -1;
        const shoulderY = y - 70 + crouch;
        const hipY = y - 25 + crouch;
        
        if (this.state === 'attacking') {
          const atk = ATTACKS[this.currentAttack];
          const extend = this.attackPhase === 'active' ? 1 : (this.attackPhase === 'startup' ? 0.5 : 0.2);
          
          if (atk.move === 'hand') {
            let targetY = y - 55;
            if (atk.level === 'high') targetY = y - 75;
            if (atk.level === 'low') targetY = y - 30;
            
            ctx.beginPath();
            ctx.moveTo(x, shoulderY);
            ctx.lineTo(x + dir * CONFIG.RANGE * extend, targetY);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x, shoulderY);
            ctx.lineTo(x - dir * 15, shoulderY + 20);
            ctx.stroke();
          } else {
            ctx.beginPath();
            ctx.moveTo(x, shoulderY);
            ctx.lineTo(x - dir * 18, shoulderY + 18);
            ctx.lineTo(x - dir * 12, shoulderY + 30);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x, shoulderY);
            ctx.lineTo(x + dir * 12, shoulderY + 20);
            ctx.stroke();
          }
          
          if (atk.move === 'leg') {
            let kickY = y - 50;
            if (atk.level === 'high') kickY = y - 70;
            if (atk.level === 'low') kickY = y - 10;
            
            ctx.beginPath();
            ctx.moveTo(x, hipY);
            ctx.lineTo(x + dir * CONFIG.RANGE * extend, kickY);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(x, hipY);
            ctx.lineTo(x - dir * 12, y);
            ctx.stroke();
          } else {
            ctx.beginPath();
            ctx.moveTo(x, hipY);
            ctx.lineTo(x - 10, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, hipY);
            ctx.lineTo(x + 10, y);
            ctx.stroke();
          }
        } else if (this.blocking) {
          ctx.beginPath();
          ctx.moveTo(x, shoulderY);
          ctx.lineTo(x + dir * 8, y - 60 + crouch);
          ctx.moveTo(x, shoulderY);
          ctx.lineTo(x - dir * 8, y - 60 + crouch);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(x, hipY);
          ctx.lineTo(x - 12, y);
          ctx.moveTo(x, hipY);
          ctx.lineTo(x + 12, y);
          ctx.stroke();
        } else {
          const sway = Math.sin(frame * 0.1) * 3;
          
          ctx.beginPath();
          ctx.moveTo(x, shoulderY);
          ctx.quadraticCurveTo(x + dir * 18 + sway, shoulderY + 15, x + dir * 12, shoulderY + 25);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(x, shoulderY);
          ctx.quadraticCurveTo(x - dir * 18 - sway, shoulderY + 15, x - dir * 12, shoulderY + 25);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(x, hipY);
          ctx.lineTo(x - 10 - sway, y);
          ctx.stroke();
          
          ctx.beginPath();
          ctx.moveTo(x, hipY);
          ctx.lineTo(x + 10 + sway, y);
          ctx.stroke();
        }
      }

      drawAttackEffect() {
        const atk = ATTACKS[this.currentAttack];
        if (!atk) return;
        
        ctx.globalAlpha = 0.6 + Math.random() * 0.3;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.shadowBlur = 30;
        ctx.shadowColor = '#ffffff';
        
        // Attack arc
        ctx.beginPath();
        ctx.arc(this.x, this.y - 50, CONFIG.RANGE + 10, 
          this.facingRight ? -0.6 : Math.PI + 0.6,
          this.facingRight ? 0.6 : Math.PI - 0.6
        );
        ctx.stroke();
        
        // Impact spark
        const sparkX = this.x + (this.facingRight ? 1 : -1) * CONFIG.RANGE;
        for (let i = 0; i < 4; i++) {
          const angle = Math.random() * Math.PI * 2;
          const dist = 10 + Math.random() * 15;
          ctx.beginPath();
          ctx.moveTo(sparkX, this.y - 50);
          ctx.lineTo(sparkX + Math.cos(angle) * dist, this.y - 50 + Math.sin(angle) * dist);
          ctx.stroke();
        }
        
        ctx.globalAlpha = 1;
      }

      drawKnockedDown() {
        const dir = this.facingRight ? 1 : -1;
        
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 4;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15;
        
        ctx.translate(this.x + dir * 10, this.y - 20);
        ctx.rotate(dir * 0.3);
        
        ctx.beginPath();
        ctx.arc(dir * 25, -5, 14, 0, Math.PI * 2);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(dir * 11, -5);
        ctx.lineTo(-dir * 25, 5);
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(dir * 5, 0);
        ctx.lineTo(dir * 20, 18);
        ctx.moveTo(-dir * 15, 5);
        ctx.lineTo(-dir * 30, 20);
        ctx.moveTo(dir * 5, -10);
        ctx.lineTo(dir * 22, -15);
        ctx.moveTo(-dir * 12, -2);
        ctx.lineTo(-dir * 28, -18);
        ctx.stroke();
      }
    }

    // === NEURAL FIGHTER ===
    class NeuralFighter extends BaseFighter {
      constructor(x, facingRight, color, name, brain = null) {
        super(x, facingRight, color, name);
        this.brain = brain || new NeuralNetwork();
        this.actionTimer = 0;
        this.currentAction = 'idle';
        this.actionHistory = [];
        this.lastState = null;
        this.lastAction = null;
        this.lastReward = 0;
        this.totalReward = 0;
      }

      getSensors(opponent) {
        const dx = opponent.x - this.x;
        const dy = opponent.y - this.y;
        const dist = Math.abs(dx);
        
        return [
          this.hp / 100,
          opponent.hp / 100,
          this.x / 900,
          opponent.x / 900,
          (this.y - CONFIG.GROUND_Y) / 100,
          (opponent.y - CONFIG.GROUND_Y) / 100,
          this.vx / 10,
          this.vy / 10,
          opponent.vx / 10,
          opponent.vy / 10,
          dist / 500,
          Math.atan2(dy, dx) / Math.PI,
          this.facingRight ? 1 : 0,
          (opponent.x > this.x) === this.facingRight ? 1 : 0,
          this.state === 'attacking' ? 1 : 0,
          this.attackPhase === 'active' ? 1 : 0,
          opponent.state === 'attacking' ? 1 : 0,
          opponent.attackPhase === 'active' ? 1 : 0,
          this.hitstun > 0 ? 1 : 0,
          opponent.hitstun > 0 ? 1 : 0,
          this.blocking ? 1 : 0,
          opponent.blocking ? 1 : 0,
          this.grounded ? 0 : 1,
          opponent.grounded ? 0 : 1,
          this.comboCount / 5,
          opponent.comboCount / 5,
          game.timer / 99,
          this.actionHistory.length > 0 ? this.actionHistory[this.actionHistory.length-1] / 12 : 0,
          this.actionHistory.length > 1 ? this.actionHistory[this.actionHistory.length-2] / 12 : 0,
          this.actionHistory.length > 2 ? this.actionHistory[this.actionHistory.length-3] / 12 : 0,
          this.actionHistory.length > 3 ? this.actionHistory[this.actionHistory.length-4] / 12 : 0,
          Math.random()
        ];
      }

      update(opponent) {
        this.updateBase();
        
        if (this.hitstun <= 0 && !this.knockedDown && this.state === 'idle') {
          this.runNeuralAI(opponent);
        }
        
        this.resolveCollision(opponent);
        
        if (this.state === 'idle' && this.hitstun <= 0 && !this.knockedDown) {
          this.facingRight = opponent.x > this.x;
        }
        
        // Учимся каждые 10 кадров
        if (game.frame % 10 === 0 && this.brain.memory.length > 32) {
          this.brain.learn(32);
        }
      }

      runNeuralAI(opponent) {
        this.actionTimer--;
        
        if (this.actionTimer <= 0) {
          const sensors = this.getSensors(opponent);
          
          // Сохраняем состояние ДО действия
          this.lastState = sensors;
          
          // Выбираем действие (ε-greedy)
          const actionIndex = this.brain.chooseAction(sensors);
          
          // Пытаемся продолжить комбо
          const combo = this.brain.suggestCombo(this.actionHistory);
          if (combo !== null && Math.random() < 0.7) {
            const attackKeys = Object.keys(ATTACKS);
            const comboIndex = attackKeys.indexOf(combo);
            if (comboIndex !== -1 && comboIndex < 9) {
              this.executeDecision(comboIndex, opponent);
              this.lastAction = comboIndex;
              this.actionHistory.push(comboIndex);
              this.actionTimer = 5 + Math.floor(Math.random() * 10);
              return;
            }
          }
          
          // Обычное действие
          this.executeDecision(actionIndex, opponent);
          this.lastAction = actionIndex;
          this.actionHistory.push(actionIndex);
          if (this.actionHistory.length > 10) this.actionHistory.shift();
          
          this.actionTimer = 5 + Math.floor(Math.random() * 10);
        }
      }

      executeDecision(index, opponent) {
        const attackKeys = Object.keys(ATTACKS);
        const dir = opponent.x > this.x ? 1 : -1;
        
        if (index < 9) {
          this.startAttack(attackKeys[index]);
        } else if (index === 9) {
          if (Math.abs(opponent.x - this.x) > 150) {
            this.vx = dir * CONFIG.DASH_SPEED;
          } else {
            this.vx = dir * 3;
          }
        } else if (index === 10) {
          if (this.grounded) {
             this.vy = CONFIG.JUMP_FORCE;
             this.vx = -dir * 4;
          }
        } else if (index === 11) {
          if (this.blockCooldown <= 0) {
            this.blocking = true;
            this.blockTimer = 0;
            this.justDefended = false;
            setTimeout(() => {
              if (!this.justDefended) {
                this.blocking = false;
                this.blockCooldown = CONFIG.BLOCK_COOLDOWN;
              }
            }, CONFIG.JUST_DEFEND_WINDOW);
          }
        }
      }

      // Запоминаем результат действия
      rememberReward() {
        if (this.lastState && this.lastAction !== null) {
          const nextState = this.getSensors(fighter2); // текущее состояние после действия
          this.brain.remember(this.lastState, this.lastAction, this.lastReward, nextState);
          this.totalReward += this.lastReward;
          this.lastReward = 0;
        }
      }
    }

    // === CLASSIC FIGHTER ===
    class ClassicFighter extends BaseFighter {
      constructor(x, facingRight, color, name, style, aggression) {
        super(x, facingRight, color, name);
        this.aiStyle = AI_STYLES[style];
        this.aiAggression = parseFloat(aggression);
        this.aiThinkTimer = 0;
        this.aiAction = null;
        this.currentCombo = null;
        this.comboStep = 0;
        this.whiffDetected = false;
        this.lastOpponentState = 'idle';
      }

      update(opponent) {
        this.updateBase();
        
        // Combo continuation
        if (this.currentCombo && this.state === 'idle') {
          if (this.comboStep < this.currentCombo.length) {
            const nextAttack = this.currentCombo[this.comboStep];
            this.startAttack(nextAttack);
            this.comboStep++;
          } else {
            this.currentCombo = null;
            this.comboStep = 0;
          }
        }
        
        if (this.hitstun <= 0 && !this.knockedDown && this.state === 'idle') {
          this.runAI(opponent);
        }
        
        this.resolveCollision(opponent);
        
        if (this.state === 'idle' && this.hitstun <= 0 && !this.knockedDown) {
          this.facingRight = opponent.x > this.x;
        }
      }

      runAI(opponent) {
        this.aiThinkTimer--;
        
        if (opponent.state === 'attacking' && opponent.attackPhase === 'recovery') {
          if (this.lastOpponentState === 'active') {
            this.whiffDetected = true;
          }
        }
        this.lastOpponentState = opponent.attackPhase;
        
        if (this.aiThinkTimer <= 0) {
          this.aiThinkTimer = 3 + Math.floor(Math.random() * 4);
          
          const dist = Math.abs(this.x - opponent.x);
          const inRange = dist < CONFIG.RANGE + 15;
          const opponentAttacking = opponent.state === 'attacking' && opponent.attackPhase === 'active';
          const opponentRecovery = opponent.state === 'attacking' && opponent.attackPhase === 'recovery';
          
          let action = 'idle';
          
          if (this.whiffDetected && opponentRecovery && Math.random() < this.aiStyle.whiffPunish) {
            action = 'punish';
            this.whiffDetected = false;
          } else if (opponentAttacking && Math.random() < this.aiStyle.defensiveReaction) {
            action = 'react';
          } else if (inRange && this.hitstun <= 0) {
            if (Math.random() < this.aiAggression) {
              if (Math.random() < this.aiStyle.comboChance && !this.currentCombo) {
                action = 'startCombo';
              } else {
                action = 'attack';
              }
            } else if (Math.random() < 0.3) {
              action = 'backdash';
            }
          } else {
            const [minRange, maxRange] = this.aiStyle.preferredRange;
            
            if (dist < minRange) {
              action = Math.random() < 0.6 ? 'backdash' : 'attack';
            } else if (dist > maxRange) {
              action = Math.random() < 0.7 ? 'forward' : 'idle';
            } else {
              action = Math.random() < 0.3 ? 'forward' : 'idle';
            }
          }
          
          this.aiAction = action;
        }
        
        this.executeAIAction(opponent);
      }

      executeAIAction(opponent) {
        const moveSpeed = 3;
        const dir = opponent.x > this.x ? 1 : -1;
        
        switch (this.aiAction) {
          case 'forward':
            if (Math.abs(opponent.x - this.x) > 150 && this.grounded) {
                this.vx = dir * CONFIG.DASH_SPEED;
            } else {
                this.vx = dir * moveSpeed;
            }
            break;
            
          case 'backdash':
            if (this.grounded) {
                this.vx = -dir * moveSpeed * 1.2;
                if (Math.random() < 0.3) this.vy = CONFIG.JUMP_FORCE;
            }
            break;
            
          case 'attack':
            this.pickSingleAttack(opponent);
            this.aiAction = null;
            break;
            
          case 'startCombo':
            this.startCombo();
            this.aiAction = null;
            break;
            
          case 'punish':
            this.startAttack('uppercut');
            this.aiAction = null;
            this.whiffDetected = false;
            break;
            
          case 'react':
            this.attemptJustDefend();
            this.aiAction = null;
            break;
        }
      }

      pickSingleAttack(opponent) {
        const attacks = ['jab', 'straight', 'hook', 'lowKick', 'midKick'];
        const attack = attacks[Math.floor(Math.random() * attacks.length)];
        this.startAttack(attack);
      }

      startCombo() {
        const comboNames = Object.keys(COMBOS);
        const combo = COMBOS[comboNames[Math.floor(Math.random() * comboNames.length)]];
        this.currentCombo = [...combo];
        this.comboStep = 0;
      }

      attemptJustDefend() {
        if (this.blockCooldown > 0) return;
        
        this.blocking = true;
        this.blockTimer = 0;
        this.justDefended = false;
        
        setTimeout(() => {
          if (!this.justDefended) {
            this.blocking = false;
            this.blockCooldown = CONFIG.BLOCK_COOLDOWN;
          }
        }, CONFIG.JUST_DEFEND_WINDOW);
      }
    }

    // === GAME STATE ===
    const game = {
      running: false,
      timer: 99,
      round: 1,
      frame: 0,
      slowmo: 0,
      shake: { x: 0, y: 0, time: 0 }
    };

    const particles = [];
    const effects = [];
    const bgParticles = [];
    const bgLines = [];

    // Initialize background elements
    for (let i = 0; i < 40; i++) {
      bgParticles.push({
        x: Math.random() * 900,
        y: Math.random() * 420,
        size: 1 + Math.random() * 2,
        speed: 0.2 + Math.random() * 0.5,
        opacity: 0.2 + Math.random() * 0.4
      });
    }

    for (let i = 0; i < 15; i++) {
      bgLines.push({
        y: Math.random() * 420,
        speed: 0.5 + Math.random() * 1,
        opacity: 0.1 + Math.random() * 0.2
      });
    }

    // === EFFECTS ===
    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 3 + Math.random() * 7;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 4,
          life: 1,
          color,
          size: 2 + Math.random() * 5,
          type: 'circle'
        });
      }
    }

    function spawnEffect(type, x, y, color) {
      effects.push({ type, x, y, life: 1, color, frame: 0 });
    }

    function shake(intensity, duration) {
      game.shake = { x: intensity, y: intensity, time: duration };
    }

    function updateEffects() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.25;
        p.life -= 0.025;
        if (p.life <= 0) particles.splice(i, 1);
      }
      
      for (let i = effects.length - 1; i >= 0; i--) {
        effects[i].life -= 0.04;
        effects[i].frame++;
        if (effects[i].life <= 0) effects.splice(i, 1);
      }
      
      if (game.shake.time > 0) {
        game.shake.time--;
        game.shake.x = (Math.random() - 0.5) * game.shake.x;
        game.shake.y = (Math.random() - 0.5) * game.shake.y;
      }
    }

    function drawEffects() {
      // Particles
      for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      
      // Effects
      for (const e of effects) {
        ctx.globalAlpha = e.life;
        ctx.strokeStyle = e.color;
        ctx.lineWidth = 3;
        ctx.shadowColor = e.color;
        ctx.shadowBlur = 15;
        
        if (e.type === 'hit') {
          const size = 45 + (1 - e.life) * 30;
          ctx.beginPath();
          for (let i = 0; i < 8; i++) {
            const a = (i / 8) * Math.PI * 2 + e.frame * 0.1;
            const r = i % 2 === 0 ? size : size * 0.3;
            const px = e.x + Math.cos(a) * r;
            const py = e.y + Math.sin(a) * r;
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.stroke();
        } else if (e.type === 'parry') {
          ctx.beginPath();
          ctx.arc(e.x, e.y, 35 * (2 - e.life), 0, Math.PI * 2);
          ctx.stroke();
        } else if (e.type === 'spark') {
          for (let i = 0; i < 6; i++) {
            const angle = (i / 6) * Math.PI * 2 + e.frame * 0.2;
            const dist = 15 + (1 - e.life) * 25;
            ctx.beginPath();
            ctx.moveTo(e.x, e.y);
            ctx.lineTo(e.x + Math.cos(angle) * dist, e.y + Math.sin(angle) * dist);
            ctx.stroke();
          }
        }
      }
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    // === BACKGROUND ===
    function drawBackground() {
      // Base gradient
      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, '#03030a');
      grad.addColorStop(0.5, '#080815');
      grad.addColorStop(1, '#0a0a18');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Grid
      ctx.strokeStyle = 'rgba(40, 60, 100, 0.08)';
      ctx.lineWidth = 1;
      
      const gridSize = 60;
      const offsetX = (game.frame * 0.3) % gridSize;
      
      for (let x = -offsetX; x < canvas.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      
      for (let y = 0; y < canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
      
      // Horizontal scan lines
      for (const line of bgLines) {
        line.y += line.speed;
        if (line.y > canvas.height) line.y = -10;
        
        ctx.globalAlpha = line.opacity;
        ctx.strokeStyle = '#00ffcc';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, line.y);
        ctx.lineTo(canvas.width, line.y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      
      // Floating particles
      for (const p of bgParticles) {
        p.y -= p.speed;
        if (p.y < 0) {
          p.y = canvas.height;
          p.x = Math.random() * canvas.width;
        }
        
        ctx.globalAlpha = p.opacity;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      
      // Moon
      ctx.fillStyle = '#ffffee';
      ctx.shadowColor = '#ffffdd';
      ctx.shadowBlur = 50;
      ctx.beginPath();
      ctx.arc(780, 50, 25, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      
      // Silhouette mountains
      ctx.fillStyle = '#060610';
      ctx.beginPath();
      ctx.moveTo(0, 320);
      ctx.lineTo(150, 240);
      ctx.lineTo(300, 280);
      ctx.lineTo(500, 200);
      ctx.lineTo(700, 260);
      ctx.lineTo(900, 220);
      ctx.lineTo(900, 420);
      ctx.lineTo(0, 420);
      ctx.fill();
      
      // Ground
      const groundGrad = ctx.createLinearGradient(0, 320, 0, 420);
      groundGrad.addColorStop(0, '#0a0a14');
      groundGrad.addColorStop(1, '#050508');
      ctx.fillStyle = groundGrad;
      ctx.fillRect(0, 320, canvas.width, 100);
      
      // Ground lines
      ctx.strokeStyle = 'rgba(0, 255, 200, 0.05)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 12; i++) {
        const y = 325 + i * 8;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
      
      // Center line
      ctx.strokeStyle = 'rgba(255, 170, 0, 0.15)';
      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(450, 320);
      ctx.lineTo(450, 420);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // === COLLISION ===
    function checkHit(attacker, defender) {
      if (attacker.state !== 'attacking' || attacker.attackPhase !== 'active') return false;
      if (attacker.hasHit) return false;
      
      const hitbox = attacker.getHitbox();
      const hurtbox = defender.getHurtbox();
      
      if (!hitbox || !hurtbox) return false;
      
      const dx = Math.abs(hitbox.x - hurtbox.x);
      const dy = Math.abs(hitbox.y - hurtbox.y);
      
      return dx < (hitbox.w + hurtbox.w) / 2 && dy < (hitbox.h + hurtbox.h) / 2;
    }

    // === UI ===
    function updateUI() {
      if (fighter1) document.getElementById('hp1').style.width = `${fighter1.hp}%`;
      if (fighter2) document.getElementById('hp2').style.width = `${fighter2.hp}%`;
      document.getElementById('timer').textContent = Math.ceil(game.timer);
      
      if (fighter1 && fighter1.comboCount > 2) showCombo(1, fighter1.comboCount, fighter1.color);
      if (fighter2 && fighter2.comboCount > 2) showCombo(2, fighter2.comboCount, fighter2.color);
    }

    function showCombo(side, count, color) {
      const el = document.getElementById('combo' + side);
      el.textContent = count + ' COMBO!';
      el.style.color = color;
      el.style.textShadow = `0 0 20px ${color}`;
      el.style.left = side === 1 ? '20%' : '80%';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 600);
    }

    function announce(text, type) {
      const el = document.getElementById('announce');
      const textEl = document.getElementById('announceText');
      textEl.textContent = text;
      textEl.className = 'announce-text ' + type;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1800);
    }

    function showResult(winner) {
      const screen = document.getElementById('resultScreen');
      const title = document.getElementById('resultTitle');
      
      title.textContent = winner.name.toUpperCase() + ' WINS';
      title.className = 'result-title ' + (winner.color === '#ff2244' ? 'red' : 'blue');
      
      document.getElementById('finalHits1').textContent = fighter1.hitCount;
      document.getElementById('maxCombo1').textContent = fighter1.maxCombo;
      document.getElementById('finalHits2').textContent = fighter2.hitCount;
      document.getElementById('maxCombo2').textContent = fighter2.maxCombo;
      
      tournament.updateUI();
      screen.classList.add('show');
    }

    // === TOURNAMENT SYSTEM ===
    class Tournament {
      constructor() {
        this.fighters = [];
        this.generation = 1;
        this.populationSize = 8;
        this.champions = [];
        this.generationHistory = [];
        
        this.loadFromStorage();
        if(this.fighters.length === 0) this.initPopulation();
      }

      initPopulation() {
        this.fighters = [];
        for (let i = 0; i < this.populationSize; i++) {
          const brain = new NeuralNetwork();
          const fighter = {
            id: i,
            name: `Neural #${i + 1}`,
            brain: brain,
            wins: 0,
            losses: 0,
            hits: 0,
            maxCombo: 0,
            generation: this.generation
          };
          this.fighters.push(fighter);
        }
        this.updateUI();
      }

      runTournament() {
        this.fighters.forEach(f => {
          f.wins = 0;
          f.losses = 0;
          f.hits = 0;
          f.maxCombo = 0;
        });

        for (let i = 0; i < this.fighters.length; i++) {
          for (let j = i + 1; j < this.fighters.length; j++) {
            const result = this.simulateFight(this.fighters[i], this.fighters[j]);
            
            if (result.winner === i) {
              this.fighters[i].wins++;
              this.fighters[j].losses++;
            } else {
              this.fighters[j].wins++;
              this.fighters[i].losses++;
            }
            
            this.fighters[i].hits += result.hits1;
            this.fighters[j].hits += result.hits2;
            
            this.fighters[i].maxCombo = Math.max(this.fighters[i].maxCombo, result.combo1);
            this.fighters[j].maxCombo = Math.max(this.fighters[j].maxCombo, result.combo2);
          }
        }

        this.fighters.sort((a, b) => b.wins - a.wins);
        
        // Сохраняем историю
        this.generationHistory.push({
          gen: this.generation,
          best: this.fighters[0].name,
          wins: this.fighters[0].wins,
          avgHits: this.fighters.reduce((a, f) => a + f.hits, 0) / this.fighters.length
        });
        
        if (this.fighters.length > 0) {
          this.champions.push({
            name: this.fighters[0].name,
            wins: this.fighters[0].wins,
            generation: this.generation
          });
        }
        
        this.evolve();
        return this.fighters;
      }

      simulateFight(f1, f2) {
        const fighter1 = new NeuralFighter(250, true, '#ff2244', f1.name, f1.brain.clone());
        const fighter2 = new NeuralFighter(650, false, '#00ffcc', f2.name, f2.brain.clone());
        
        let hits1 = 0;
        let hits2 = 0;
        let combo1 = 0;
        let combo2 = 0;
        
        for (let i = 0; i < 600; i++) {
          fighter1.update(fighter2);
          fighter2.update(fighter1);
          
          if (checkHit(fighter1, fighter2)) {
            if (fighter2.takeHit(fighter1, ATTACKS[fighter1.currentAttack])) {
              fighter1.hasHit = true;
              hits1++;
              combo1 = Math.max(combo1, fighter1.comboCount);
            }
          }
          
          if (checkHit(fighter2, fighter1)) {
            if (fighter1.takeHit(fighter2, ATTACKS[fighter2.currentAttack])) {
              fighter2.hasHit = true;
              hits2++;
              combo2 = Math.max(combo2, fighter2.comboCount);
            }
          }
        }
        
        const winner = hits1 > hits2 ? 0 : 1;
        
        return { winner, hits1, hits2, combo1, combo2 };
      }

      evolve() {
        const elite = this.fighters.slice(0, 2);
        const newFighters = [];
        
        // Сохраняем элиту
        elite.forEach(e => {
          newFighters.push({
            id: newFighters.length,
            name: `Elite #${e.id + 1}`,
            brain: e.brain.clone(),
            wins: 0,
            losses: 0,
            hits: 0,
            maxCombo: 0,
            generation: this.generation + 1
          });
        });
        
        // Создаем детей от элиты
        for (let i = 0; i < this.populationSize - 2; i++) {
          const parent1 = elite[Math.floor(Math.random() * elite.length)];
          const parent2 = elite[Math.floor(Math.random() * elite.length)];
          
          const childBrain = parent1.brain.crossover(parent2.brain);
          
          newFighters.push({
            id: newFighters.length,
            name: `Neural #${i + 3}`,
            brain: childBrain,
            wins: 0,
            losses: 0,
            hits: 0,
            maxCombo: 0,
            generation: this.generation + 1
          });
        }
        
        this.fighters = newFighters;
        this.generation++;
        
        this.updateUI();
      }

      updateUI() {
        document.getElementById('genCount').textContent = this.generation;
        document.getElementById('fighterCount').textContent = this.fighters.length;
        
        let totalHits = 0;
        let maxCombo = 0;
        this.fighters.forEach(f => {
          totalHits += f.hits;
          maxCombo = Math.max(maxCombo, f.maxCombo);
        });
        
        document.getElementById('avgHits').textContent = Math.round(totalHits / this.fighters.length);
        document.getElementById('globalMaxCombo').textContent = maxCombo;
        document.getElementById('generationInfo').textContent = `Generation #${this.generation} - Elite ${this.fighters.length}`;
        
        const list = document.getElementById('fighterList');
        list.innerHTML = '';
        
        this.fighters.forEach((f, index) => {
          const div = document.createElement('div');
          div.className = 'fighter-entry' + (index < 2 ? ' selected' : '');
          div.innerHTML = `
            <div class="fighter-info">
              <span class="fighter-name">${f.name}</span>
              <div class="fighter-stats">
                <span>W:${f.wins}</span>
                <span>L:${f.losses}</span>
                <span>HITS:${f.hits}</span>
              </div>
            </div>
            <div class="fighter-score">${f.wins * 100}</div>
          `;
          list.appendChild(div);
        });
        
        this.updateNeuralSelect();
      }

      updateNeuralSelect() {
        const select1 = document.getElementById('neuralFighter1');
        const select2 = document.getElementById('neuralFighter2');
        
        select1.innerHTML = '';
        select2.innerHTML = '';
        
        this.fighters.forEach((f, index) => {
          const option1 = document.createElement('option');
          option1.value = index;
          option1.textContent = `${f.name} (W:${f.wins})`;
          select1.appendChild(option1);
          
          const option2 = document.createElement('option');
          option2.value = index;
          option2.textContent = `${f.name} (W:${f.wins})`;
          select2.appendChild(option2);
        });
      }

      saveToStorage() {
        const data = {
          generation: this.generation,
          fighters: this.fighters.map(f => ({
            name: f.name,
            brain: f.brain.toJSON(),
            wins: f.wins,
            generation: f.generation
          })),
          champions: this.champions,
          history: this.generationHistory
        };
        localStorage.setItem('neuralTournament', JSON.stringify(data));
      }

      loadFromStorage() {
        const data = localStorage.getItem('neuralTournament');
        if (data) {
          const parsed = JSON.parse(data);
          this.generation = parsed.generation;
          this.champions = parsed.champions || [];
          this.generationHistory = parsed.history || [];
          
          this.fighters = parsed.fighters.map((f, i) => {
            const brain = new NeuralNetwork();
            brain.fromJSON(f.brain);
            return {
              id: i,
              name: f.name,
              brain: brain,
              wins: f.wins,
              losses: 0,
              hits: 0,
              maxCombo: 0,
              generation: f.generation
            };
          });
          
          this.updateUI();
        }
      }
    }

    // === GAME INIT ===
    let fighter1 = null;
    let fighter2 = null;
    let f1Index = 0;
    let f2Index = 1;
    let timerInterval = null;
    let tournament = null;

    tournament = new Tournament();

    function initGame() {
      const type1 = document.getElementById('fighterType1').value;
      const type2 = document.getElementById('fighterType2').value;
      
      if (type1 === 'neural') {
        f1Index = parseInt(document.getElementById('neuralFighter1').value) || 0;
        const neuralData = tournament.fighters[f1Index];
        const brain = neuralData.brain.clone();
        fighter1 = new NeuralFighter(250, true, '#ff2244', neuralData.name, brain);
        document.getElementById('fighterName1').textContent = neuralData.name;
        document.getElementById('tactic1').textContent = 'Neural';
      } else {
        const style1 = document.getElementById('style1').value;
        const aggr1 = document.getElementById('aggression1').value;
        fighter1 = new ClassicFighter(250, true, '#ff2244', 'Scorpion', style1, aggr1);
        document.getElementById('fighterName1').textContent = 'Scorpion';
        document.getElementById('tactic1').textContent = style1.toUpperCase();
      }
      
      if (type2 === 'neural') {
        f2Index = parseInt(document.getElementById('neuralFighter2').value) || 1;
        const neuralData = tournament.fighters[f2Index];
        const brain = neuralData.brain.clone();
        fighter2 = new NeuralFighter(650, false, '#00ffcc', neuralData.name, brain);
        document.getElementById('fighterName2').textContent = neuralData.name;
        document.getElementById('tactic2').textContent = 'Neural';
      } else {
        const style2 = document.getElementById('style2').value;
        const aggr2 = document.getElementById('aggression2').value;
        fighter2 = new ClassicFighter(650, false, '#00ffcc', 'Frost', style2, aggr2);
        document.getElementById('fighterName2').textContent = 'Frost';
        document.getElementById('tactic2').textContent = style2.toUpperCase();
      }
      
      game.running = false;
      game.timer = 99;
      game.frame = 0;
      
      particles.length = 0;
      effects.length = 0;
      
      document.getElementById('resultScreen').classList.remove('show');
      document.getElementById('hp1').style.width = '100%';
      document.getElementById('hp2').style.width = '100%';
    }

    function startFight() {
      initGame();
      
      document.getElementById('menuScreen').classList.add('hidden');
      
      setTimeout(() => announce('ROUND ' + game.round, 'fight'), 500);
      setTimeout(() => announce('FIGHT!', 'fight'), 1500);
      setTimeout(() => {
        game.running = true;
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
          if (game.running && game.timer > 0) {
            game.timer -= 1;
            if (game.timer <= 0) {
              endRound(fighter1.hp >= fighter2.hp ? fighter1 : fighter2);
            }
          }
        }, 1000);
      }, 2000);
    }

    function endRound(winner) {
      game.running = false;
      if (timerInterval) clearInterval(timerInterval);
      
      // Финальные награды
      if (fighter1 instanceof NeuralFighter) {
        fighter1.brain.remember(
          fighter1.lastState || new Array(32).fill(0),
          fighter1.lastAction || 0,
          winner === fighter1 ? 100 : -50,
          new Array(32).fill(0),
          true
        );
        fighter1.brain.learn(32);
      }
      
      if (fighter2 instanceof NeuralFighter) {
        fighter2.brain.remember(
          fighter2.lastState || new Array(32).fill(0),
          fighter2.lastAction || 0,
          winner === fighter2 ? 100 : -50,
          new Array(32).fill(0),
          true
        );
        fighter2.brain.learn(32);
      }
      
      setTimeout(() => announce('K.O.!', 'ko'), 300);
      setTimeout(() => showResult(winner), 1500);
    }

    // === GAME LOOP ===
    function gameLoop() {
      requestAnimationFrame(gameLoop);
      
      if (game.running) {
        if (game.slowmo > 0) {
          game.slowmo--;
          if (game.frame % 3 !== 0) return;
        }
        
        if (fighter1 && fighter2) {
          fighter1.update(fighter2);
          fighter2.update(fighter1);
          
          // Запоминаем награды
          if (fighter1 instanceof NeuralFighter) fighter1.rememberReward();
          if (fighter2 instanceof NeuralFighter) fighter2.rememberReward();
          
          if (game.frame - fighter1.lastHitTime > CONFIG.COMBO_WINDOW / 16) fighter1.comboCount = 0;
          if (game.frame - fighter2.lastHitTime > CONFIG.COMBO_WINDOW / 16) fighter2.comboCount = 0;
          
          if (checkHit(fighter1, fighter2)) {
            if (fighter2.takeHit(fighter1, ATTACKS[fighter1.currentAttack])) {
              fighter1.hasHit = true;
            }
          }
          
          if (checkHit(fighter2, fighter1)) {
            if (fighter1.takeHit(fighter2, ATTACKS[fighter2.currentAttack])) {
              fighter2.hasHit = true;
            }
          }
          
          if (fighter1.hp <= 0 || fighter2.hp <= 0) {
            endRound(fighter1.hp <= 0 ? fighter2 : fighter1);
          }
        }
        
        updateEffects();
        updateUI();
      }
      
      ctx.save();
      if (game.shake.time > 0) {
        ctx.translate(game.shake.x, game.shake.y);
      }
      
      drawBackground();
      drawEffects();
      
      if (fighter1 && fighter2) {
        const sorted = [fighter1, fighter2].sort((a, b) => a.y - b.y);
        sorted.forEach(f => f.draw());
      }
      
      ctx.restore();
      
      game.frame++;
    }

    // === EVENT LISTENERS ===
    document.getElementById('startBtn').addEventListener('click', startFight);
    
    document.getElementById('rematchBtn').addEventListener('click', () => {
      game.round++;
      startFight();
    });
    
    document.getElementById('menuBtn').addEventListener('click', () => {
      game.round = 1;
      document.getElementById('menuScreen').classList.remove('hidden');
      document.getElementById('resultScreen').classList.remove('show');
    });

    document.getElementById('fighterType1').addEventListener('change', (e) => {
      const classic = document.getElementById('classicControls1');
      const neural = document.getElementById('neuralControls1');
      if (e.target.value === 'neural') {
        classic.style.display = 'none';
        neural.style.display = 'block';
      } else {
        classic.style.display = 'block';
        neural.style.display = 'none';
      }
    });

    document.getElementById('fighterType2').addEventListener('change', (e) => {
      const classic = document.getElementById('classicControls2');
      const neural = document.getElementById('neuralControls2');
      if (e.target.value === 'neural') {
        classic.style.display = 'none';
        neural.style.display = 'block';
      } else {
        classic.style.display = 'block';
        neural.style.display = 'none';
      }
    });

    document.getElementById('newGenBtn').addEventListener('click', () => {
      tournament.evolve();
    });

    document.getElementById('tournamentBtn').addEventListener('click', () => {
      tournament.runTournament();
      announce('TOURNAMENT COMPLETE!', 'fight');
    });

    document.getElementById('saveBrainsBtn').addEventListener('click', () => {
      tournament.saveToStorage();
      announce('CHAMPIONS SAVED!', 'fight');
    });

    // Start
    initGame();
    gameLoop();
  </script>
</body>
  </html>
