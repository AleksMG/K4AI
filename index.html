                    this.gene_pool.learning_rate.mean = sum_l / n;
                    
                    this.gene_pool.exploration_rate.std = Math.sqrt((sum_e2 / n) - (this.gene_pool.exploration_rate.mean ** 2));
                    this.gene_pool.aggression.std = Math.sqrt((sum_a2 / n) - (this.gene_pool.aggression.mean ** 2));
                    this.gene_pool.building_instinct.std = Math.sqrt((sum_b2 / n) - (this.gene_pool.building_instinct.mean ** 2));
                    this.gene_pool.learning_rate.std = Math.sqrt((sum_l2 / n) - (this.gene_pool.learning_rate.mean ** 2));
                }

                // ========== ПОЛУЧИТЬ СТАТИСТИКУ ==========
                get_stats() {
                    return {
                        ant_count: this.ant_count,
                        eggs: this.eggs,
                        larvae: this.larvae,
                        pupae: this.pupae,
                        resources: { ...this.resources },
                        stats: { ...this.stats },
                        gene_pool: { ...this.gene_pool },
                        territory_size: this.stats.territory_size
                    };
                }
            }

            // ==================== МИР (ЭКОСИСТЕМА) ====================
            class World {
                constructor() {
                    this.width = SYSTEM_CONFIG.world.width;
                    this.height = SYSTEM_CONFIG.world.height;
                    
                    // Еда
                    this.food = [];
                    
                    // Враги (другие насекомые, хищники)
                    this.enemies = [];
                    
                    // Препятствия
                    this.obstacles = [];
                    
                    // Погода
                    this.weather = {
                        temperature: 20,
                        humidity: 60,
                        season: 'summer',
                        time_of_day: 0  // 0-1
                    };
                    
                    // Время
                    this.time = 0;
                    
                    // Инициализация
                    this.init();
                }

                init() {
                    // Создаем еду
                    for (let i = 0; i < 50; i++) {
                        this.food.push({
                            x: 200 + Math.random() * (this.width - 400),
                            y: 100 + Math.random() * (this.height - 200),
                            amount: 50 + Math.random() * 100,
                            type: Math.random() > 0.7 ? 'protein' : 'sugar',
                            regeneration_rate: 0.001
                        });
                    }
                    
                    // Создаем врагов
                    for (let i = 0; i < 5; i++) {
                        this.enemies.push({
                            x: 100 + Math.random() * (this.width - 200),
                            y: 100 + Math.random() * (this.height - 200),
                            health: 100,
                            damage: 10,
                            speed: 1,
                            type: 'beetle',
                            aggression: 0.5 + Math.random() * 0.5
                        });
                    }
                    
                    // Создаем препятствия (камни, корни)
                    for (let i = 0; i < 20; i++) {
                        this.obstacles.push({
                            x: 100 + Math.random() * (this.width - 200),
                            y: 100 + Math.random() * (this.height - 200),
                            radius: 10 + Math.random() * 30,
                            type: 'rock'
                        });
                    }
                }

                // ========== ШАГ МИРА ==========
                step(dt) {
                    this.time += dt;
                    
                    // ===== 1. ОБНОВЛЕНИЕ ПОГОДЫ =====
                    this.update_weather(dt);
                    
                    // ===== 2. ДВИЖЕНИЕ ВРАГОВ =====
                    for (let e of this.enemies) {
                        // Случайное блуждание с тенденцией к центру
                        e.x += (Math.random() - 0.5) * e.speed * dt * 50;
                        e.y += (Math.random() - 0.5) * e.speed * dt * 50;
                        
                        // Границы
                        e.x = Math.max(20, Math.min(this.width - 20, e.x));
                        e.y = Math.max(20, Math.min(this.height - 20, e.y));
                        
                        // Восстановление здоровья
                        e.health = Math.min(100, e.health + 0.01 * dt * 100);
                    }
                    
                    // ===== 3. РЕГЕНЕРАЦИЯ ЕДЫ =====
                    for (let f of this.food) {
                        if (f.amount < 100) {
                            f.amount += f.regeneration_rate * dt * 100;
                        }
                        f.amount = Math.min(150, f.amount);
                    }
                    
                    // ===== 4. ПОЯВЛЕНИЕ НОВЫХ ВРАГОВ =====
                    if (this.enemies.length < 10 && Math.random() < 0.001 * dt * 100) {
                        this.enemies.push({
                            x: 50 + Math.random() * (this.width - 100),
                            y: 50 + Math.random() * (this.height - 100),
                            health: 100,
                            damage: 10,
                            speed: 1,
                            type: 'beetle',
                            aggression: 0.5 + Math.random() * 0.5
                        });
                    }
                    
                    // ===== 5. ПОЯВЛЕНИЕ НОВОЙ ЕДЫ =====
                    if (this.food.length < 30 && Math.random() < 0.002 * dt * 100) {
                        this.food.push({
                            x: 100 + Math.random() * (this.width - 200),
                            y: 100 + Math.random() * (this.height - 200),
                            amount: 30 + Math.random() * 70,
                            type: Math.random() > 0.7 ? 'protein' : 'sugar',
                            regeneration_rate: 0.001
                        });
                    }
                }

                // ========== ОБНОВЛЕНИЕ ПОГОДЫ ==========
                update_weather(dt) {
                    // Время суток (0-1)
                    this.weather.time_of_day = (this.weather.time_of_day + dt * 0.01) % 1;
                    
                    // Сезонные изменения
                    const day_of_year = (this.time / 86400) % 365;
                    
                    if (day_of_year < 90) {
                        this.weather.season = 'spring';
                        this.weather.temperature = 10 + Math.sin(day_of_year / 90 * Math.PI) * 10;
                    } else if (day_of_year < 180) {
                        this.weather.season = 'summer';
                        this.weather.temperature = 20 + Math.sin((day_of_year - 90) / 90 * Math.PI) * 10;
                    } else if (day_of_year < 270) {
                        this.weather.season = 'autumn';
                        this.weather.temperature = 20 - Math.sin((day_of_year - 180) / 90 * Math.PI) * 10;
                    } else {
                        this.weather.season = 'winter';
                        this.weather.temperature = 5 - Math.sin((day_of_year - 270) / 95 * Math.PI) * 5;
                    }
                    
                    // Дневные колебания
                    const daily_variation = Math.sin(this.weather.time_of_day * Math.PI * 2) * 5;
                    this.weather.temperature += daily_variation;
                    
                    // Влажность (обратно пропорциональна температуре)
                    this.weather.humidity = 80 - this.weather.temperature * 1.5 + Math.random() * 10;
                    this.weather.humidity = Math.max(20, Math.min(95, this.weather.humidity));
                }

                // ========== ПОЛУЧИТЬ ЛОКАЛЬНЫЕ УСЛОВИЯ ==========
                get_local_conditions(x, y) {
                    return {
                        temperature: this.weather.temperature,
                        humidity: this.weather.humidity,
                        light: Math.sin(this.weather.time_of_day * Math.PI) * 0.8 + 0.2,
                        season: this.weather.season
                    };
                }

                // ========== ПРОВЕРКА КОЛЛИЗИИ С ПРЕПЯТСТВИЯМИ ==========
                check_collision(x, y) {
                    for (let obs of this.obstacles) {
                        const dx = x - obs.x;
                        const dy = y - obs.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if (dist < obs.radius) {
                            return true;
                        }
                    }
                    return false;
                }

                // ========== ПОЛУЧИТЬ БЛИЖАЙШУЮ ЕДУ ==========
                get_nearest_food(x, y) {
                    let nearest = null;
                    let min_dist = Infinity;
                    
                    for (let f of this.food) {
                        if (f.amount > 0) {
                            const dist = Math.hypot(x - f.x, y - f.y);
                            if (dist < min_dist) {
                                min_dist = dist;
                                nearest = f;
                            }
                        }
                    }
                    
                    return { food: nearest, distance: min_dist };
                }
            }

            // ==================== ВИЗУАЛИЗАЦИЯ ====================
            class Renderer {
                constructor() {
                    this.canvases = {
                        neural: document.getElementById('neuralCanvas'),
                        ant: document.getElementById('antCanvas'),
                        colony: document.getElementById('colonyCanvas'),
                        global: document.getElementById('globalCanvas')
                    };
                    
                    this.ctx = {};
                    for (let [name, canvas] of Object.entries(this.canvases)) {
                        if (canvas) {
                            this.ctx[name] = canvas.getContext('2d');
                        }
                    }
                    
                    this.colors = {
                        background: '#03050a',
                        grid: '#1a2a3a',
                        food: '#8affb8',
                        danger: '#ff5e7d',
                        home: '#5e9eff',
                        build: '#c05eff',
                        forager: '#8affb8',
                        defender: '#ff8a8a',
                        builder: '#b48aff',
                        nurse: '#ffd966'
                    };
                    
                    this.last_time = performance.now();
                    this.fps = 60;
                }

                // ========== ОТРИСОВКА НЕЙРОННОГО АНСАМБЛЯ ==========
                drawNeural(brain) {
                    if (!this.ctx.neural || !brain) return;
                    
                    const ctx = this.ctx.neural;
                    const canvas = this.canvases.neural;
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Фон
                    ctx.fillStyle = this.colors.background;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // Сетка
                    ctx.strokeStyle = this.colors.grid;
                    ctx.lineWidth = 0.5;
                    
                    for (let x = 0; x < canvas.width; x += 50) {
                        ctx.beginPath();
                        ctx.moveTo(x, 0);
                        ctx.lineTo(x, canvas.height);
                        ctx.stroke();
                    }
                    
                    for (let y = 0; y < canvas.height; y += 50) {
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(canvas.width, y);
                        ctx.stroke();
                    }
                    
                    // Собираем все нейроны из всех ансамблей
                    const all_neurons = [];
                    
                    const ensembles = [
                        brain.visual?.lamina,
                        brain.visual?.medulla,
                        brain.visual?.lobula,
                        brain.visual?.lobula_plate,
                        brain.antennal?.glomeruli,
                        brain.antennal?.projection_neurons,
                        brain.antennal?.local_neurons,
                        brain.mushroom?.kenyon_cells,
                        brain.mushroom?.gamma_lobe,
                        brain.mushroom?.alpha_lobe,
                        brain.mushroom?.beta_lobe,
                        brain.central?.ellipsoid_body,
                        brain.central?.fan_shaped_body,
                        brain.central?.noduli,
                        brain.central?.protocerebral_bridge,
                        brain.motor?.leg_motoneurons,
                        brain.motor?.mandible_motoneurons,
                        brain.motor?.cpg
                    ];
                    
                    for (let e of ensembles) {
                        if (e && e.neurons) {
                            all_neurons.push(...e.neurons);
                        }
                    }
                    
                    // Рисуем синапсы (только каждый 100-й для производительности)
                    if (brain.connections) {
                        ctx.lineWidth = 0.3;
                        
                        for (let i = 0; i < brain.connections.length; i += 100) {
                            const s = brain.connections[i];
                            if (s && s.pre && s.post) {
                                const alpha = Math.min(0.3, Math.abs(s.weight) * 0.2);
                                ctx.strokeStyle = s.weight > 0 
                                    ? `rgba(0, 255, 170, ${alpha})`
                                    : `rgba(255, 100, 100, ${alpha})`;
                                
                                ctx.beginPath();
                                ctx.moveTo(s.pre.x / 2, s.pre.y / 2);
                                ctx.lineTo(s.post.x / 2, s.post.y / 2);
                                ctx.stroke();
                            }
                        }
                    }
                    
                    // Рисуем нейроны
                    for (let n of all_neurons) {
                        const x = n.x / 2;
                        const y = n.y / 2;
                        
                        if (x < 0 || x > canvas.width || y < 0 || y > canvas.height) continue;
                        
                        // Цвет по типу
                        ctx.fillStyle = n.color;
                        
                        // Размер по активности
                        const size = 2 + n.activity * 4;
                        
                        // Свечение при спайке
                        if (n.spiked) {
                            ctx.shadowColor = n.color;
                            ctx.shadowBlur = 15;
                        }
                        
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.shadowBlur = 0;
                    }
                    
                    // Текст
                    ctx.fillStyle = '#8ab3ff';
                    ctx.font = '10px JetBrains Mono';
                    ctx.fillText(`Нейронов: ${all_neurons.length}`, 10, 20);
                    ctx.fillText(`Синапсов: ${brain.connections?.length || 0}`, 10, 35);
                    ctx.fillText(`Firing rate: ${(brain.global_firing_rate || 0).toFixed(1)} Hz`, 10, 50);
                    ctx.fillText(`Свободная энергия: ${(brain.free_energy || 0).toExponential(2)}`, 10, 65);
                }

                // ========== ОТРИСОВКА МУРАВЬЯ ==========
                drawAnt(ant, world) {
                    if (!this.ctx.ant || !ant) return;
                    
                    const ctx = this.ctx.ant;
                    const canvas = this.canvases.ant;
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Рисуем мир с точки зрения муравья
                    ctx.save();
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    
                    // Поворот в направлении взгляда
                    ctx.rotate(-ant.angle);
                    
                    // Область обзора
                    const viewDistance = 300;
                    
                    // Туман войны (градиент)
                    const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, viewDistance);
                    gradient.addColorStop(0, 'rgba(0,0,0,0)');
                    gradient.addColorStop(0.6, 'rgba(0,5,15,0.3)');
                    gradient.addColorStop(1, '#03050a');
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(-viewDistance, -viewDistance, viewDistance * 2, viewDistance * 2);
                    
                    // Рисуем объекты в поле зрения
                    // Еда
                    for (let f of world.food) {
                        const dx = f.x - ant.x;
                        const dy = f.y - ant.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if (dist < viewDistance) {
                            const angle = Math.atan2(dy, dx);
                            const angleDiff = Math.abs(angle - 0); // относительно поворота
                            
                            if (angleDiff < 1.5) { // ~85 градусов
                                const intensity = 1 - dist / viewDistance;
                                ctx.fillStyle = `rgba(138, 255, 184, ${intensity})`;
                                
                                ctx.beginPath();
                                ctx.arc(dx, dy, 5 + f.amount / 20, 0, Math.PI * 2);
                                ctx.fill();
                            }
                        }
                    }
                    
                    // Враги
                    for (let e of world.enemies) {
                        const dx = e.x - ant.x;
                        const dy = e.y - ant.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if (dist < viewDistance) {
                            ctx.fillStyle = '#ff5e7d';
                            ctx.beginPath();
                            ctx.arc(dx, dy, 10, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                    
                    ctx.restore();
                    
                    // Информация о муравье
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '10px JetBrains Mono';
                    ctx.fillText(`Муравей ${ant.id} | ${ant.role}`, 10, 20);
                    ctx.fillText(`Энергия: ${Math.floor(ant.energy)}% | Здоровье: ${Math.floor(ant.health)}%`, 10, 35);
                    ctx.fillText(`Состояние: ${ant.state}`, 10, 50);
                    
                    if (ant.carrying.type) {
                        ctx.fillText(`Несет: ${ant.carrying.type} (${ant.carrying.amount})`, 10, 65);
                    }
                    
                    // Intentions
                    ctx.fillStyle = '#5e9eff';
                    ctx.fillText('Намерения:', 10, 85);
                    let y = 100;
                    for (let [action, prob] of Object.entries(ant.intentions)) {
                        ctx.fillStyle = '#8a9fc0';
                        ctx.fillText(`${action}: ${(prob * 100).toFixed(1)}%`, 10, y);
                        y += 15;
                    }
                }

                // ========== ОТРИСОВКА КОЛОНИИ ==========
                drawColony(colony, world) {
                    if (!this.ctx.colony) return;
                    
                    const ctx = this.ctx.colony;
                    const canvas = this.canvases.colony;
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // Фон
                    ctx.fillStyle = '#0a121f';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    // Территория (heatmap)
                    for (let y = 0; y < canvas.height; y += 5) {
                        for (let x = 0; x < canvas.width; x += 5) {
                            const idx = y * world.width + x;
                            if (idx < colony.territory.length && colony.territory[idx] > 0.1) {
                                const val = colony.territory[idx];
                                ctx.fillStyle = `rgba(80, 120, 255, ${val * 0.2})`;
                                ctx.fillRect(x, y, 5, 5);
                            }
                        }
                    }
                    
                    // Феромоны
                    for (let type of ['food', 'home', 'danger', 'build']) {
                        for (let p of colony.pheromones[type] || []) {
                            if (type === 'food') ctx.fillStyle = `rgba(138, 255, 184, ${p.strength * 0.3})`;
                            if (type === 'home') ctx.fillStyle = `rgba(94, 158, 255, ${p.strength * 0.3})`;
                            if (type === 'danger') ctx.fillStyle = `rgba(255, 94, 125, ${p.strength * 0.3})`;
                            if (type === 'build') ctx.fillStyle = `rgba(192, 94, 255, ${p.strength * 0.3})`;
                            
                            ctx.beginPath();
                            ctx.arc(p.x, p.y, 15 * p.strength, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                    
                    // Гнездо
                    ctx.fillStyle = '#8b7355';
                    ctx.beginPath();
                    ctx.arc(colony.nest_x, colony.nest_y, 40, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.strokeStyle = '#cdb38c';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '10px JetBrains Mono';
                    ctx.fillText(`ГНЕЗДО`, colony.nest_x - 30, colony.nest_y - 50);
                    
                    // Еда
                    for (let f of world.food) {
                        ctx.fillStyle = '#8affb8';
                        ctx.beginPath();
                        ctx.arc(f.x, f.y, 3 + f.amount / 30, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    
                    // Враги
                    for (let e of world.enemies) {
                        ctx.fillStyle = '#ff5e7d';
                        ctx.beginPath();
                        ctx.arc(e.x, e.y, 12, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#ffffff';
                        ctx.font = '8px monospace';
                        ctx.fillText(`⚔️${Math.floor(e.health)}`, e.x - 15, e.y - 20);
                    }
                    
                    // Муравьи
                    for (let ant of colony.ants) {
                        ctx.fillStyle = ant.color;
                        ctx.beginPath();
                        ctx.arc(ant.x, ant.y, 3, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // Индикатор состояния
                        if (ant.state === 'carry' || ant.carrying.type) {
                            ctx.fillStyle = '#8affb8';
                            ctx.fillRect(ant.x - 5, ant.y - 10, 10, 2);
                        }
                        if (ant.state === 'fight') {
                            ctx.fillStyle = '#ff5e7d';
                            ctx.fillRect(ant.x - 5, ant.y - 10, 10, 2);
                        }
                    }
                }

                // ========== ОТРИСОВКА ГЛОБАЛЬНОЙ ДИНАМИКИ ==========
                drawGlobal(colony, world) {
                    if (!this.ctx.global) return;
                    
                    const ctx = this.ctx.global;
                    const canvas = this.canvases.global;
                    
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // График роста колонии
                    ctx.strokeStyle = '#8affb8';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    
                    const stats = colony.get_stats();
                    
                    ctx.fillStyle = '#5e9eff';
                    ctx.font = '10px JetBrains Mono';
                    ctx.fillText(`Колония #${colony.id}`, 10, 20);
                    ctx.fillText(`Муравьев: ${stats.ant_count}`, 10, 35);
                    ctx.fillText(`Яйца: ${stats.eggs} | Личинки: ${stats.larvae} | Куколки: ${stats.pupae}`, 10, 50);
                    ctx.fillText(`Еда: ${Math.floor(stats.resources.food)} | Древесина: ${Math.floor(stats.resources.wood)}`, 10, 65);
                    ctx.fillText(`Песок: ${Math.floor(stats.resources.sand)} | Смола: ${Math.floor(stats.resources.resin)}`, 10, 80);
                    ctx.fillText(`Территория: ${Math.floor(stats.territory_size)} px²`, 10, 95);
                    ctx.fillText(`Рождено: ${stats.stats.born} | Погибло: ${stats.stats.died}`, 10, 110);
                    
                    // Погода
                    ctx.fillStyle = '#ffd966';
                    ctx.fillText(`Погода: ${world.weather.season}, ${Math.floor(world.weather.temperature)}°C, ${Math.floor(world.weather.humidity)}%`, 10, 130);
                    
                    // Генетический пул
                    ctx.fillStyle = '#c05eff';
                    ctx.fillText(`Генетика:`, 10, 150);
                    ctx.fillText(`  exploration: ${stats.gene_pool.exploration_rate.mean.toFixed(3)} ± ${stats.gene_pool.exploration_rate.std.toFixed(3)}`, 10, 165);
                    ctx.fillText(`  aggression: ${stats.gene_pool.aggression.mean.toFixed(3)} ± ${stats.gene_pool.aggression.std.toFixed(3)}`, 10, 180);
                    ctx.fillText(`  building: ${stats.gene_pool.building_instinct.mean.toFixed(3)} ± ${stats.gene_pool.building_instinct.std.toFixed(3)}`, 10, 195);
                }

                // ========== ОБНОВЛЕНИЕ FPS ==========
                updateFPS() {
                    const now = performance.now();
                    const delta = now - this.last_time;
                    this.fps = Math.round(1000 / delta);
                    this.last_time = now;
                    
                    return this.fps;
                }
            }

            // ==================== ГЛАВНЫЙ КОНТРОЛЛЕР ====================
            class SimulationController {
                constructor() {
                    // Компоненты
                    this.world = new World();
                    this.colony = new Colony('main', 500, 300);
                    this.renderer = new Renderer();
                    
                    // Состояние
                    this.running = true;
                    this.paused = false;
                    this.speed = 1.0;
                    this.time = 0;
                    this.tick = 0;
                    
                    // Выбранный муравей
                    this.selected_ant = this.colony.ants[0] || null;
                    
                    // История для графиков
                    this.history = {
                        ant_count: [],
                        resources: [],
                        time: []
                    };
                    
                    // UI элементы
                    this.statusBar = document.getElementById('statusBar');
                    this.statusElements = {
                        freeEnergy: document.getElementById('globalFreeEnergy'),
                        ltp: document.getElementById('globalLTP'),
                        ltd: document.getElementById('globalLTD'),
                        pheromones: document.getElementById('globalPheromones'),
                        swarm: document.getElementById('globalSwarm'),
                        tick: document.getElementById('globalTick'),
                        time: document.getElementById('globalTime'),
                        antCount: document.getElementById('globalAntCount')
                    };
                    
                    // Запуск
                    this.initUI();
                    this.loop();
                }

                initUI() {
                    // Кнопки управления
                    const toolbar = document.querySelector('.toolbar');
                    if (toolbar) {
                        toolbar.innerHTML = `
                            <div class="tool-btn" id="btnPlayPause">⏸️</div>
                            <div class="tool-btn" id="btnSpeed1">1x</div>
                            <div class="tool-btn" id="btnSpeed2">2x</div>
                            <div class="tool-btn" id="btnSpeed4">4x</div>
                            <div class="tool-btn" id="btnReset">↺</div>
                            <div class="tool-btn" id="btnAddAnt">🐜</div>
                            <div class="tool-btn" id="btnAddFood">🍎</div>
                            <div class="tool-btn" id="btnAddEnemy">⚔️</div>
                        `;
                        
                        document.getElementById('btnPlayPause').onclick = () => {
                            this.paused = !this.paused;
                            document.getElementById('btnPlayPause').innerText = this.paused ? '▶️' : '⏸️';
                        };
                        
                        document.getElementById('btnSpeed1').onclick = () => { this.speed = 1.0; };
                        document.getElementById('btnSpeed2').onclick = () => { this.speed = 2.0; };
                        document.getElementById('btnSpeed4').onclick = () => { this.speed = 4.0; };
                        
                        document.getElementById('btnReset').onclick = () => {
                            this.reset();
                        };
                        
                        document.getElementById('btnAddAnt').onclick = () => {
                            this.colony.init_ants(5);
                        };
                        
                        document.getElementById('btnAddFood').onclick = () => {
                            this.world.food.push({
                                x: 200 + Math.random() * 600,
                                y: 100 + Math.random() * 300,
                                amount: 100,
                                type: 'sugar',
                                regeneration_rate: 0.001
                            });
                        };
                        
                        document.getElementById('btnAddEnemy').onclick = () => {
                            this.world.enemies.push({
                                x: 200 + Math.random() * 600,
                                y: 100 + Math.random() * 300,
                                health: 100,
                                damage: 10,
                                speed: 1,
                                type: 'beetle',
                                aggression: 0.8
                            });
                        };
                    }
                    
                    // Клик по канвасу для выбора муравья
                    const colonyCanvas = document.getElementById('colonyCanvas');
                    if (colonyCanvas) {
                        colonyCanvas.onclick = (e) => {
                            const rect = colonyCanvas.getBoundingClientRect();
                            const scaleX = colonyCanvas.width / rect.width;
                            const scaleY = colonyCanvas.height / rect.height;
                            
                            const x = (e.clientX - rect.left) * scaleX;
                            const y = (e.clientY - rect.top) * scaleY;
                            
                            // Ищем ближайшего муравья
                            let min_dist = 30;
                            let selected = null;
                            
                            for (let ant of this.colony.ants) {
                                const dist = Math.hypot(ant.x - x, ant.y - y);
                                if (dist < min_dist) {
                                    min_dist = dist;
                                    selected = ant;
                                }
                            }
                            
                            if (selected) {
                                this.selected_ant = selected;
                            }
                        };
                    }
                }

                // ========== ГЛАВНЫЙ ЦИКЛ ==========
                loop() {
                    if (!this.running) return;
                    
                    const dt = 0.016 * this.speed; // ~60 FPS base
                    
                    if (!this.paused) {
                        // Шаг мира
                        this.world.step(dt);
                        
                        // Шаг колонии
                        this.colony.step(dt, this.world);
                        
                        // Обновление времени
                        this.time += dt;
                        this.tick++;
                        
                        // Сохранение истории
                        if (this.tick % 100 === 0) {
                            this.history.ant_count.push(this.colony.ant_count);
                            this.history.resources.push(this.colony.resources.food);
                            this.history.time.push(this.time);
                            
                            if (this.history.ant_count.length > 100) {
                                this.history.ant_count.shift();
                                this.history.resources.shift();
                                this.history.time.shift();
                            }
                        }
                        
                        // Обновление UI
                        this.updateUI();
                    }
                    
                    // Отрисовка
                    this.render();
                    
                    // Следующий кадр
                    requestAnimationFrame(() => this.loop());
                }

                // ========== ОБНОВЛЕНИЕ UI ==========
                updateUI() {
                    const stats = this.colony.get_stats();
                    const fps = this.renderer.updateFPS();
                    
                    if (this.statusElements.freeEnergy) {
                        this.statusElements.freeEnergy.innerText = this.selected_ant?.brain.free_energy.toExponential(2) || '0';
                    }
                    
                    if (this.statusElements.ltp) {
                        this.statusElements.ltp.innerText = (stats.stats.born / (this.time + 1)).toFixed(2);
                    }
                    
                    if (this.statusElements.ltd) {
                        this.statusElements.ltd.innerText = (stats.stats.died / (this.time + 1)).toFixed(2);
                    }
                    
                    if (this.statusElements.pheromones) {
                        const p = this.colony.pheromones;
                        this.statusElements.pheromones.innerText = 
                            `food:${(p.food?.length || 0)} home:${(p.home?.length || 0)} danger:${(p.danger?.length || 0)}`;
                    }
                    
                    if (this.statusElements.swarm) {
                        this.statusElements.swarm.innerText = (stats.ant_count / 1000).toFixed(2);
                    }
                    
                    if (this.statusElements.tick) {
                        this.statusElements.tick.innerText = this.tick.toString();
                    }
                    
                    if (this.statusElements.time) {
                        const hours = Math.floor(this.time * 24) % 24;
                        const minutes = Math.floor(this.time * 1440) % 60;
                        const seconds = Math.floor(this.time * 86400) % 60;
                        this.statusElements.time.innerText = 
                            `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    }
                    
                    if (this.statusElements.antCount) {
                        this.statusElements.antCount.innerText = stats.ant_count.toString();
                    }
                }

                // ========== ОТРИСОВКА ==========
                render() {
                    // Панель 1: Нейронный ансамбль
                    if (this.selected_ant) {
                        this.renderer.drawNeural(this.selected_ant.brain);
                    } else if (this.colony.ants.length > 0) {
                        this.renderer.drawNeural(this.colony.ants[0].brain);
                    }
                    
                    // Панель 2: Выбранный муравей
                    if (this.selected_ant) {
                        this.renderer.drawAnt(this.selected_ant, this.world);
                    } else if (this.colony.ants.length > 0) {
                        this.renderer.drawAnt(this.colony.ants[0], this.world);
                    }
                    
                    // Панель 3: Колония
                    this.renderer.drawColony(this.colony, this.world);
                    
                    // Панель 4: Глобальная динамика
                    this.renderer.drawGlobal(this.colony, this.world);
                }

                // ========== СБРОС ==========
                reset() {
                    this.world = new World();
                    this.colony = new Colony('main', 500, 300);
                    this.selected_ant = this.colony.ants[0] || null;
                    this.time = 0;
                    this.tick = 0;
                    this.history = {
                        ant_count: [],
                        resources: [],
                        time: []
                    };
                }
            }

            // ==================== ЗАПУСК ====================
            window.onload = () => {
                // Создаем canvases, если их нет
                const mainGrid = document.getElementById('mainGrid');
                
                if (mainGrid && mainGrid.children.length === 0) {
                    mainGrid.innerHTML = `
                        <div class="panel"><div class="panel-header">🧠 НЕЙРОННЫЙ АНСАМБЛЬ <span>384k нейронов</span></div><div class="panel-content"><canvas id="neuralCanvas" width="800" height="400"></canvas></div></div>
                        <div class="panel"><div class="panel-header">🐜 ОСОБЬ #A-734 <span>фуражир</span></div><div class="panel-content"><canvas id="antCanvas" width="800" height="400"></canvas></div></div>
                        <div class="panel"><div class="panel-header">🏰 КОЛОНИЯ <span>1247 особей</span></div><div class="panel-content"><canvas id="colonyCanvas" width="800" height="400"></canvas></div></div>
                        <div class="panel"><div class="panel-header">🌍 ЭКОСИСТЕМА <span>распределенный интеллект</span></div><div class="panel-content"><canvas id="globalCanvas" width="800" height="400"></canvas></div></div>
                    `;
                }
                
                // Запуск
                window.simulation = new SimulationController();
            };
        })();
    </script>
</body>
</html>
